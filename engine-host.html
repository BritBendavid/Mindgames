<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JavaScript Chess Engine</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top, #2a2a2a 0%, #111 45%, #050505 100%);
      color: white;
      display: flex;
      justify-content: center;
      padding: 30px;
    }

    .container {
      display: flex;
      gap: 30px;
      align-items: flex-start;
    }

    .board-wrap {
      padding: 16px;
      background: linear-gradient(145deg, #3a2a1a, #120c07);
      border-radius: 18px;
      box-shadow:
        0 25px 60px rgba(0, 0, 0, 0.6),
        inset 0 0 0 2px rgba(255, 255, 255, 0.08);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(8, 74px);
      grid-template-rows: repeat(8, 74px);
      border: 3px solid #1b130d;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.55);
      overflow: hidden;
    }

    .square {
      width: 74px;
      height: 74px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      position: relative;
    }

    .light {
      background:
        radial-gradient(circle at 35% 25%, rgba(255,255,255,0.35), transparent 45%),
        #f0d9b5;
    }

    .dark {
      background:
        radial-gradient(circle at 35% 25%, rgba(255,255,255,0.16), transparent 45%),
        #b58863;
    }

    .square:hover {
      box-shadow: inset 0 0 0 4px rgba(255, 255, 255, 0.35);
    }

    .selected {
      box-shadow: inset 0 0 0 5px #f7e35f !important;
    }

    .legal-target::after {
      content: "";
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: rgba(30, 140, 50, 0.45);
      position: absolute;
      z-index: 1;
    }

    .capture-target::after {
      content: "";
      width: 58px;
      height: 58px;
      border-radius: 50%;
      border: 6px solid rgba(30, 140, 50, 0.45);
      position: absolute;
      z-index: 1;
      box-sizing: border-box;
    }

    .piece-img {
      width: 66px;
      height: 66px;
      object-fit: contain;
      position: relative;
      z-index: 2;
      filter:
        drop-shadow(0 5px 3px rgba(0, 0, 0, 0.45))
        drop-shadow(0 1px 0 rgba(255, 255, 255, 0.25));
      transition: transform 0.12s ease;
    }

    .square:hover .piece-img {
      transform: translateY(-2px) scale(1.04);
    }

    .panel {
      width: 410px;
      background: rgba(30, 30, 30, 0.96);
      padding: 22px;
      border-radius: 16px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 24px;
      letter-spacing: 0.4px;
    }

    h3 {
      margin-bottom: 8px;
    }

    button, input {
      font-size: 16px;
      padding: 10px;
      margin-top: 8px;
      width: 100%;
      box-sizing: border-box;
    }

    button {
      cursor: pointer;
      background: linear-gradient(#3b3b3b, #242424);
      color: white;
      border: 1px solid #555;
      border-radius: 8px;
    }

    button:hover {
      background: linear-gradient(#4a4a4a, #303030);
    }

    input {
      background: #101010;
      color: white;
      border: 1px solid #555;
      border-radius: 8px;
    }

    .info {
      margin-top: 15px;
      line-height: 1.6;
      font-size: 15px;
      color: #ddd;
    }

    .moves,
    .history {
      background: #101010;
      padding: 12px;
      border-radius: 8px;
      font-family: "Courier New", monospace;
      font-size: 14px;
      margin-top: 10px;
      white-space: pre-wrap;
      border: 1px solid rgba(255, 255, 255, 0.08);
      line-height: 1.5;
      overflow-y: auto;
    }

    .moves {
      max-height: 260px;
    }

    .history {
      min-height: 120px;
      max-height: 220px;
    }

    .note {
      margin-top: 12px;
      font-size: 13px;
      color: #aaa;
      line-height: 1.4;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="board-wrap">
      <div id="board" class="board"></div>
    </div>

    <div class="panel">
      <h1>JavaScript Chess Engine</h1>

      <button onclick="newGame()">New Game</button>
      <button onclick="engineMove()">Engine Move</button>
      <button onclick="playRandomMove()">Play Random Move</button>
      <button onclick="showBestMove()">Show Best Move</button>

      <input id="moveInput" placeholder="Enter move, e.g. e2e4 or a7a8n" />
      <button onclick="playTypedMove()">Play Move</button>

      <input id="fenInput" placeholder="Paste FEN here" />
      <button onclick="loadFenFromInput()">Load FEN</button>

      <div class="info">
        <div><strong>Side to move:</strong> <span id="sideToMove"></span></div>
        <div><strong>Evaluation:</strong> <span id="evaluation"></span></div>
        <div><strong>Move count:</strong> <span id="moveCount"></span></div>
        <div><strong>Status:</strong> <span id="status">Ready</span></div>
      </div>

      <h3>Generated Moves</h3>
      <div id="moves" class="moves"></div>

      <h3>Move History</h3>
      <div id="moveHistory" class="history"></div>

      <div class="note">
        Typed moves use coordinate input like e2e4. Promotions can be typed as a7a8q, a7a8r, a7a8b, or a7a8n.
      </div>
    </div>
  </div>

  <script src="./engine.js"></script>

  <script>
    const START_FEN =
      "rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1";

    const sanPieceLetters = {
      P: "",
      N: "N",
      B: "B",
      R: "R",
      Q: "Q",
      K: "K"
    };

    const uiEngine = new ChessEngine();

    let selectedSquare = null;
    let currentMoves = [];
    let moveHistory = [];

    function pieceImageUrl(piece) {
      return "https://lichess1.org/assets/piece/cburnett/" + piece + ".svg";
    }

    function newGame() {
      uiEngine.loadFEN(START_FEN);
      selectedSquare = null;
      moveHistory = [];
      updateUI();
      setStatus("New game loaded.");
    }

    function updateUI() {
      const gameStatus = uiEngine.getGameStatus();

      if (gameStatus.over) {
        currentMoves = [];
      } else {
        currentMoves = uiEngine.generateMoves();
      }

      drawBoard();
      updatePanel(gameStatus);
    }

    function drawBoard() {
      const boardDiv = document.getElementById("board");
      boardDiv.innerHTML = "";

      const legalTargets = selectedSquare === null
        ? []
        : currentMoves.filter(move => move.from === selectedSquare);

      for (let square = 0; square < 64; square++) {
        const row = Math.floor(square / 8);
        const col = square % 8;

        const squareDiv = document.createElement("div");

        squareDiv.classList.add("square");
        squareDiv.classList.add((row + col) % 2 === 0 ? "light" : "dark");

        if (square === selectedSquare) {
          squareDiv.classList.add("selected");
        }

        const targetMove = legalTargets.find(move => move.to === square);

        if (targetMove) {
          if (uiEngine.board[square] || targetMove.enPassant) {
            squareDiv.classList.add("capture-target");
          } else {
            squareDiv.classList.add("legal-target");
          }
        }

        const piece = uiEngine.board[square];

        if (piece) {
          const img = document.createElement("img");
          img.className = "piece-img";
          img.src = pieceImageUrl(piece);
          img.alt = piece;
          img.draggable = false;
          squareDiv.appendChild(img);
        }

        squareDiv.addEventListener("click", () => handleSquareClick(square));

        boardDiv.appendChild(squareDiv);
      }
    }

    function updatePanel(gameStatus) {
      document.getElementById("sideToMove").textContent =
        uiEngine.sideToMove === "w" ? "White" : "Black";

      document.getElementById("evaluation").textContent = uiEngine.evaluate();

      document.getElementById("moveCount").textContent = currentMoves.length;

      if (gameStatus.over) {
        document.getElementById("moves").textContent =
          "Game over — no legal moves available.";
      } else {
        document.getElementById("moves").textContent = formatGeneratedMoves();
      }

      document.getElementById("moveHistory").textContent = formatMoveHistory();

      document.getElementById("status").textContent = gameStatus.message;
    }

    function formatGeneratedMoves() {
      return currentMoves
        .map(move => moveToSAN(move, uiEngine))
        .join("\n");
    }

    function moveToSAN(move, engine = uiEngine) {
      const piece = engine.board[move.from];

      if (!piece) {
        return "";
      }

      const type = piece[1];
      const destination = engine.squareToCoord(move.to);

      if (move.castle) {
        const castleText = move.to % 8 === 6 ? "O-O" : "O-O-O";
        return castleText + getCheckOrMateSuffix(engine, move);
      }

      const capture = Boolean(engine.board[move.to]) || Boolean(move.enPassant);

      let san = "";

      if (type === "P") {
        if (capture) {
          san += engine.squareToCoord(move.from)[0] + "x";
        }

        san += destination;
      } else {
        san += sanPieceLetters[type];
        san += getDisambiguation(move, engine);

        if (capture) {
          san += "x";
        }

        san += destination;
      }

      if (move.promotion) {
        san += "=" + move.promotion;
      }

      san += getCheckOrMateSuffix(engine, move);

      return san;
    }

    function getDisambiguation(move, engine) {
      const piece = engine.board[move.from];

      if (!piece) return "";

      const type = piece[1];

      if (type === "P" || type === "K") {
        return "";
      }

      const fromCoord = engine.squareToCoord(move.from);
      const fromFile = fromCoord[0];
      const fromRank = fromCoord[1];

      const alternatives = engine.generateMoves().filter(otherMove => {
        if (otherMove.from === move.from) return false;
        if (otherMove.to !== move.to) return false;

        const otherPiece = engine.board[otherMove.from];

        return otherPiece === piece;
      });

      if (alternatives.length === 0) {
        return "";
      }

      const sameFile = alternatives.some(otherMove =>
        engine.squareToCoord(otherMove.from)[0] === fromFile
      );

      const sameRank = alternatives.some(otherMove =>
        engine.squareToCoord(otherMove.from)[1] === fromRank
      );

      if (!sameFile) {
        return fromFile;
      }

      if (!sameRank) {
        return fromRank;
      }

      return fromFile + fromRank;
    }

    function getCheckOrMateSuffix(engine, move) {
      const position = engine.clone();
      position.makeMove(move);

      const enemyColor = position.sideToMove;

      if (!position.isInCheck(enemyColor)) {
        return "";
      }

      const enemyLegalMoves = position.generateMoves();

      if (enemyLegalMoves.length === 0) {
        return "#";
      }

      return "+";
    }

    function choosePromotionMove(candidateMoves) {
      const promotionMoves = candidateMoves.filter(m => m.promotion);

      if (promotionMoves.length === 0) {
        return candidateMoves[0];
      }

      let choice = prompt("Promote to Q, R, B, or N:", "Q");

      if (!choice) {
        return null;
      }

      choice = choice.trim().toUpperCase();

      if (!["Q", "R", "B", "N"].includes(choice)) {
        alert("Invalid promotion. Use Q, R, B, or N.");
        return null;
      }

      return promotionMoves.find(m => m.promotion === choice) || null;
    }

    function playMoveAndRecord(move, labelPrefix = "Move played", extraText = "") {
      const san = moveToSAN(move, uiEngine);
      const color = uiEngine.sideToMove;
      const moveNumber =
        uiEngine.fullmoveNumber || Math.floor(moveHistory.length / 2) + 1;

      uiEngine.makeMove(move);

      moveHistory.push({
        number: moveNumber,
        color,
        san
      });

      selectedSquare = null;
      updateUI();

      const gameStatus = uiEngine.getGameStatus();
      let suffix = "";

      if (gameStatus.over) {
        suffix = " — " + gameStatus.message;
      } else if (gameStatus.type === "check") {
        suffix = " — " + gameStatus.message;
      }

      setStatus(labelPrefix + ": " + san + extraText + suffix);
    }

    function formatMoveHistory() {
      if (moveHistory.length === 0) {
        return "No moves played yet.";
      }

      const lines = [];
      let currentLine = "";

      for (const entry of moveHistory) {
        if (entry.color === "w") {
          if (currentLine) {
            lines.push(currentLine);
          }

          currentLine = entry.number + ". " + entry.san;
        } else {
          if (!currentLine) {
            lines.push(entry.number + "... " + entry.san);
          } else {
            currentLine += " " + entry.san;
            lines.push(currentLine);
            currentLine = "";
          }
        }
      }

      if (currentLine) {
        lines.push(currentLine);
      }

      return lines.join("\n");
    }

    function handleSquareClick(square) {
      const gameStatus = uiEngine.getGameStatus();

      if (gameStatus.over) {
        setStatus(gameStatus.message);
        return;
      }

      const piece = uiEngine.board[square];

      if (selectedSquare === null) {
        if (!piece) return;

        if (piece[0] !== uiEngine.sideToMove) {
          setStatus("That is not the side to move.");
          return;
        }

        selectedSquare = square;
        updateUI();
        return;
      }

      if (piece && piece[0] === uiEngine.sideToMove) {
        selectedSquare = square;
        updateUI();
        return;
      }

      const candidateMoves = currentMoves.filter(m =>
        m.from === selectedSquare && m.to === square
      );

      const move = choosePromotionMove(candidateMoves);

      if (move) {
        playMoveAndRecord(move, "Move played");
      } else {
        selectedSquare = null;
        updateUI();
        setStatus("Illegal or unavailable move.");
      }
    }

    function playTypedMove() {
      const gameStatus = uiEngine.getGameStatus();

      if (gameStatus.over) {
        setStatus(gameStatus.message);
        return;
      }

      const input = document.getElementById("moveInput");
      const text = input.value.trim().toLowerCase();

      if (text.length < 4) {
        setStatus("Enter a move like e2e4.");
        return;
      }

      const from = uiEngine.coordToSquare(text.slice(0, 2));
      const to = uiEngine.coordToSquare(text.slice(2, 4));
      const promotion = text.length >= 5 ? text[4].toUpperCase() : undefined;

      const candidateMoves = currentMoves.filter(m =>
        m.from === from &&
        m.to === to
      );

      let move = null;

      if (candidateMoves.some(m => m.promotion)) {
        if (promotion) {
          move = candidateMoves.find(m => m.promotion === promotion);
        } else {
          move = choosePromotionMove(candidateMoves);
        }
      } else {
        move = candidateMoves[0];
      }

      if (!move) {
        setStatus("Move not found in generated moves.");
        return;
      }

      input.value = "";
      playMoveAndRecord(move, "Move played");
    }

    function engineMove() {
      const gameStatus = uiEngine.getGameStatus();

      if (gameStatus.over) {
        setStatus(gameStatus.message);
        return;
      }

      const result = uiEngine.findBestMove(3);

      if (!result.move) {
        setStatus("No move found.");
        return;
      }

      playMoveAndRecord(
        result.move,
        "Engine played",
        " | Score: " + result.score
      );
    }

    function playRandomMove() {
      const gameStatus = uiEngine.getGameStatus();

      if (gameStatus.over) {
        setStatus(gameStatus.message);
        return;
      }

      const moves = uiEngine.generateMoves();

      if (moves.length === 0) {
        setStatus("No legal moves available.");
        return;
      }

      const randomIndex = Math.floor(Math.random() * moves.length);
      const move = moves[randomIndex];

      playMoveAndRecord(move, "Random move played");
    }

    function showBestMove() {
      const gameStatus = uiEngine.getGameStatus();

      if (gameStatus.over) {
        setStatus(gameStatus.message);
        return;
      }

      const result = uiEngine.findBestMove(3);

      if (!result.move) {
        setStatus("No best move found.");
        return;
      }

      const moveLabel = moveToSAN(result.move, uiEngine);

      setStatus(
        "Best move: " +
        moveLabel +
        " | Score: " +
        result.score
      );
    }

    function loadFenFromInput() {
      const fen = document.getElementById("fenInput").value.trim();

      if (!fen) {
        setStatus("Paste a FEN first.");
        return;
      }

      try {
        uiEngine.loadFEN(fen);
        selectedSquare = null;
        moveHistory = [];
        updateUI();
        setStatus("FEN loaded.");
      } catch (error) {
        setStatus("Could not load FEN.");
        console.error(error);
      }
    }

    function setStatus(message) {
      document.getElementById("status").textContent = message;
    }

    newGame();
  </script>
</body>
</html>
