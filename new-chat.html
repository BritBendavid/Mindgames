<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ChatGPT 500 Word Bot</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top left, #dbeafe, transparent 35%),
        radial-gradient(circle at bottom right, #e0e7ff, transparent 35%),
        #f8fafc;
      color: #111827;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .app {
      width: min(900px, 95vw);
      height: min(760px, 92vh);
      background: white;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 22px 70px rgba(15, 23, 42, 0.18);
      display: flex;
      flex-direction: column;
    }

    header {
      background: #111827;
      color: white;
      padding: 22px;
    }

    header h1 {
      margin: 0 0 6px;
      font-size: 1.45rem;
    }

    header p {
      margin: 0;
      color: #d1d5db;
      font-size: 0.95rem;
    }

    #chat {
      flex: 1;
      padding: 22px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: linear-gradient(#ffffff, #f9fafb);
    }

    .message {
      max-width: 75%;
      padding: 13px 15px;
      border-radius: 16px;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    .user {
      align-self: flex-end;
      background: #2563eb;
      color: white;
      border-bottom-right-radius: 5px;
    }

    .bot {
      align-self: flex-start;
      background: #e5e7eb;
      color: #111827;
      border-bottom-left-radius: 5px;
    }

    .system {
      align-self: center;
      background: #fff7ed;
      color: #9a3412;
      border: 1px solid #fed7aa;
      font-size: 0.82rem;
      max-width: 90%;
    }

    form {
      display: flex;
      gap: 10px;
      padding: 16px;
      border-top: 1px solid #e5e7eb;
      background: white;
    }

    input {
      flex: 1;
      border: 1px solid #d1d5db;
      border-radius: 999px;
      padding: 13px 16px;
      font-size: 1rem;
      outline: none;
    }

    input:focus {
      border-color: #2563eb;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 0 22px;
      background: #111827;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .small {
      padding: 10px 18px;
      border-top: 1px solid #e5e7eb;
      background: #f9fafb;
      color: #6b7280;
      font-size: 0.8rem;
    }

    .bot {
  display: flex;
  align-items: center;
  gap: 8px;
}

.replay-button {
  border: none;
  background: transparent;
  color: inherit;
  font-size: 1rem;
  cursor: pointer;
  padding: 2px 4px;
  border-radius: 6px;
}

.replay-button:hover {
  background: rgba(0, 0, 0, 0.08);
}

.header-button {
  margin-top: 12px;
  border: 1px solid #374151;
  background: #f9fafb;
  color: #111827;
  border-radius: 999px;
  padding: 8px 14px;
  font-weight: bold;
  cursor: pointer;
}

.header-button:hover {
  background: #e5e7eb;
}

.modal {
  position: fixed;
  inset: 0;
  background: rgba(15, 23, 42, 0.55);
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
  z-index: 1000;
}

.hidden {
  display: none;
}

.modal-content {
  width: min(700px, 95vw);
  max-height: 80vh;
  overflow: hidden;
  background: white;
  border-radius: 20px;
  box-shadow: 0 25px 80px rgba(0, 0, 0, 0.25);
  display: flex;
  flex-direction: column;
}

.modal-header {
  padding: 18px 20px;
  border-bottom: 1px solid #e5e7eb;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.modal-header h2 {
  margin: 0;
  font-size: 1.25rem;
}

.close-button {
  border: none;
  background: #f3f4f6;
  color: #111827;
  width: 34px;
  height: 34px;
  border-radius: 999px;
  font-size: 1.5rem;
  line-height: 1;
  cursor: pointer;
}

.close-button:hover {
  background: #e5e7eb;
}

.modal-info {
  margin: 0;
  padding: 14px 20px;
  color: #6b7280;
  border-bottom: 1px solid #e5e7eb;
}

#allowedWordsList {
  margin: 0;
  padding: 18px 32px;
  overflow-y: auto;
  columns: 3;
  column-gap: 36px;
}

#allowedWordsList li {
  break-inside: avoid;
  padding: 3px 0;
}

    .drafts-list {
  overflow-y: auto;
  padding: 18px 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.draft-card {
  border: 1px solid #e5e7eb;
  background: #f9fafb;
  border-radius: 14px;
  padding: 14px;
}

.draft-card h3 {
  margin: 0 0 8px;
  font-size: 1rem;
}

.draft-text {
  margin: 0 0 10px;
  white-space: pre-wrap;
  line-height: 1.45;
}

.bad-words {
  margin: 0;
  color: #991b1b;
  font-size: 0.9rem;
}

.inline-action-button {
  border: none;
  background: transparent;
  color: #2563eb;
  font-weight: bold;
  cursor: pointer;
  padding: 0;
  text-decoration: underline;
}
    
  </style>
</head>

<body>
  <div class="app">
    <header>
      <h1>ChatGPT 500 Word Bot</h1>
      <p>ChatGPT replies are checked before they appear.</p>

      <button id="allowedWordsButton" class="header-button" type="button">
         Show allowed words
      </button>
    </header>

    <main id="chat"></main>

    <form id="chatForm">
      <input id="userInput" autocomplete="off" placeholder="Say something..." />
      <button id="sendButton" type="submit">Send</button>
    </form>

    <div class="small">
      The browser calls Supabase. Supabase calls OpenAI. The word guard blocks bad replies.
    </div>
  </div>

  <div id="allowedWordsModal" class="modal hidden">
  <div class="modal-content">
    <div class="modal-header">
      <h2>Allowed Words</h2>
      <button id="closeAllowedWordsButton" class="close-button" type="button">×</button>
    </div>

    <p id="allowedWordsInfo" class="modal-info">
      Loading words...
    </p>

    <ol id="allowedWordsList"></ol>
  </div>
</div>

<div id="draftsModal" class="modal hidden">
  <div class="modal-content">
    <div class="modal-header">
      <h2>Rejected Drafts</h2>
      <button id="closeDraftsButton" class="close-button" type="button">×</button>
    </div>

    <p id="draftsInfo" class="modal-info">
      These drafts were blocked before the final message appeared.
    </p>

    <div id="draftsList" class="drafts-list"></div>
  </div>
</div>
  
  <script>
    const SUPABASE_URL = "https://tyzvxrlimbhmvmjenjxy.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_BdJd1R8Pkbggf5X_oOZL3w_DgoDyhNH";

    const chat = document.getElementById("chat");
    const form = document.getElementById("chatForm");
    const input = document.getElementById("userInput");
    const sendButton = document.getElementById("sendButton");

    const allowedWordsButton = document.getElementById("allowedWordsButton");
    const allowedWordsModal = document.getElementById("allowedWordsModal");
    const closeAllowedWordsButton = document.getElementById("closeAllowedWordsButton");
    const allowedWordsList = document.getElementById("allowedWordsList");
    const allowedWordsInfo = document.getElementById("allowedWordsInfo");

    const draftsModal = document.getElementById("draftsModal");
    const closeDraftsButton = document.getElementById("closeDraftsButton");
    const draftsList = document.getElementById("draftsList");
    const draftsInfo = document.getElementById("draftsInfo");

    const messages = [];

    let cachedAllowedWords = null;
    let latestRejectedDrafts = [];

    function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = `message ${type}`;

  const textSpan = document.createElement("span");
  textSpan.textContent = text;
  div.appendChild(textSpan);

  if (type === "bot") {
    const replayButton = document.createElement("button");
    replayButton.type = "button";
    replayButton.className = "replay-button";
    replayButton.textContent = "🔊";
    replayButton.title = "Hear again";

    replayButton.addEventListener("click", () => {
      speakText(text);
    });

    div.appendChild(replayButton);
  }

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

    function addSystemMessage(text) {
      addMessage(text, "system");
    }

    function speakText(text) {
      if (!("speechSynthesis" in window)) {
         addSystemMessage("Speech is not supported in this browser.");
         return;
      }

      window.speechSynthesis.cancel();

      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "en-US";
      utterance.rate = 0.9;
      utterance.pitch = 1;
      utterance.volume = 1;

      window.speechSynthesis.speak(utterance);
    }

    async function sendToBot(userText) {
      messages.push({
        role: "user",
        content: userText
      });

      const response = await fetch(`${SUPABASE_URL}/functions/v1/chat`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "apikey": SUPABASE_ANON_KEY,
          "Authorization": `Bearer ${SUPABASE_ANON_KEY}`
        },
        body: JSON.stringify({
          messages
        })
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.error || "Request failed");
      }

      messages.push({
        role: "assistant",
        content: data.reply
      });

      if (data.rejected) {
        addSystemMessage(
          `Guard rejected a draft because of: ${data.rejected.badWords.join(", ")}`
        );
      }

      if (data.tries > 1) {
  addGuardApprovalMessage(data.tries, data.rejectedDrafts || []);
}

      addMessage(data.reply, "bot");
      speakText(data.reply);
    }

    form.addEventListener("submit", async event => {
      event.preventDefault();

      const userText = input.value.trim();
      if (!userText) return;

      addMessage(userText, "user");
      input.value = "";
      sendButton.disabled = true;

      try {
        await sendToBot(userText);
      } catch (error) {
        addSystemMessage(error.message || "The bot could not answer right now.");
      } finally {
        sendButton.disabled = false;
        input.focus();
      }
    });

    async function loadAllowedWords() {
  if (cachedAllowedWords) {
    return cachedAllowedWords;
  }

  const response = await fetch(`${SUPABASE_URL}/functions/v1/chat`, {
    method: "GET",
    headers: {
      "apikey": SUPABASE_ANON_KEY,
      "Authorization": `Bearer ${SUPABASE_ANON_KEY}`
    }
  });

  const data = await response.json();

  if (!response.ok) {
    throw new Error(data.error || "Could not load allowed words.");
  }

  cachedAllowedWords = data.words;
  return cachedAllowedWords;
}

function renderAllowedWords(words) {
  allowedWordsList.innerHTML = "";

  allowedWordsInfo.textContent =
    `${words.length} words are allowed, listed in Leipzig frequency order.`;

  words.forEach(word => {
    const li = document.createElement("li");
    li.textContent = word;
    allowedWordsList.appendChild(li);
  });
}

async function openAllowedWordsModal() {
  allowedWordsModal.classList.remove("hidden");
  allowedWordsInfo.textContent = "Loading words...";
  allowedWordsList.innerHTML = "";

  try {
    const words = await loadAllowedWords();
    renderAllowedWords(words);
  } catch (error) {
    allowedWordsInfo.textContent = error.message || "Could not load words.";
  }
}

function closeAllowedWordsModal() {
  allowedWordsModal.classList.add("hidden");
}

function renderDrafts(drafts) {
  draftsList.innerHTML = "";

  if (!drafts || drafts.length === 0) {
    draftsInfo.textContent = "There are no rejected drafts for this reply.";
    return;
  }

  draftsInfo.textContent =
    `${drafts.length} draft${drafts.length === 1 ? "" : "s"} were rejected before approval.`;

  drafts.forEach((draft, index) => {
    const card = document.createElement("div");
    card.className = "draft-card";

    const title = document.createElement("h3");
    title.textContent = `Draft ${index + 1}`;

    const text = document.createElement("p");
    text.className = "draft-text";
    text.textContent = draft.text;

    const badWords = document.createElement("p");
    badWords.className = "bad-words";
    badWords.textContent = `Blocked words: ${draft.badWords.join(", ")}`;

    card.appendChild(title);
    card.appendChild(text);
    card.appendChild(badWords);

    draftsList.appendChild(card);
  });
}

function openDraftsModal(drafts) {
  latestRejectedDrafts = drafts || [];
  renderDrafts(latestRejectedDrafts);
  draftsModal.classList.remove("hidden");
}

function closeDraftsModal() {
  draftsModal.classList.add("hidden");
}

closeDraftsButton.addEventListener("click", closeDraftsModal);

draftsModal.addEventListener("click", event => {
  if (event.target === draftsModal) {
    closeDraftsModal();
  }
});

document.addEventListener("keydown", event => {
  if (event.key === "Escape") {
    closeDraftsModal();
  }
});

    function addGuardApprovalMessage(tries, rejectedDrafts) {
  const div = document.createElement("div");
  div.className = "message system";

  const text = document.createElement("span");
  text.textContent = `Guard approved the reply after ${tries} tries. `;

  const button = document.createElement("button");
  button.type = "button";
  button.className = "inline-action-button";
  button.textContent = "See drafts";

  button.addEventListener("click", () => {
    openDraftsModal(rejectedDrafts);
  });

  div.appendChild(text);
  div.appendChild(button);

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}
    
allowedWordsButton.addEventListener("click", openAllowedWordsModal);
closeAllowedWordsButton.addEventListener("click", closeAllowedWordsModal);

allowedWordsModal.addEventListener("click", event => {
  if (event.target === allowedWordsModal) {
    closeAllowedWordsModal();
  }
});

document.addEventListener("keydown", event => {
  if (event.key === "Escape") {
    closeAllowedWordsModal();
  }
});

    addMessage("hello there how are you today", "bot");
    
  </script>
</body>
</html>
