<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Language Chat</title>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #030303;
      --panel: rgba(255, 255, 255, 0.07);
      --text: #f8fafc;
      --muted: #9ca3af;
      --accent: #60a5fa;
      --translated: #facc15;
      --danger: #ef4444;
    }

    body {
  margin: 0;
  min-height: 100vh;
  background:
    radial-gradient(circle at top left, rgba(37, 99, 235, 0.18), transparent 30%),
    radial-gradient(circle at bottom right, rgba(250, 204, 21, 0.08), transparent 25%),
    var(--bg);
  color: var(--text);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

  /* Important: allow normal page scrolling */
  overflow-y: auto;
  overflow-x: hidden;
}

.app {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 24px;
  gap: 18px;
}

/* Header stays accessible at the top */
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 18px;
  flex-wrap: wrap;
  z-index: 5;
}

/* Chat history no longer traps scrolling */
.message-history {
  width: 100%;
  flex: 1;
  padding: 22px 4vw 130px;
  display: flex;
  flex-direction: column;
  gap: 28px;
  scroll-behavior: smooth;
}

/* Composer stays visible at the bottom */
.composer-shell {
  position: sticky;
  bottom: 0;
  display: flex;
  justify-content: center;
  z-index: 10;
  padding: 12px 0 4px;
  background:
    linear-gradient(
      to top,
      rgba(3, 3, 3, 0.98),
      rgba(3, 3, 3, 0.82),
      rgba(3, 3, 3, 0)
    );
}

    .brand h1 {
      margin: 0 0 4px;
      font-size: 1.05rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 800;
    }

    .brand p {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .control-card {
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 9px;
      backdrop-filter: blur(16px);
    }

    .control-card label {
      color: var(--muted);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    select {
      appearance: none;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text);
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      padding-right: 18px;
    }

    select option {
      background: #111827;
      color: white;
    }

    .select-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .select-wrap::after {
      content: "⌄";
      position: absolute;
      right: 0;
      color: var(--muted);
      pointer-events: none;
      transform: translateY(-2px);
    }

    .message-card {
      width: min(1100px, 100%);
      margin: 0 auto;
    }

    .user-card {
      display: flex;
      justify-content: flex-end;
    }

    .user-bubble {
      max-width: 760px;
      background: rgba(255, 255, 255, 0.12);
      color: #e5e7eb;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 22px;
      padding: 16px 20px;
      font-size: 1.05rem;
      line-height: 1.45;
    }

    .bot-card {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 14px;
    }

    .bot-words {
      color: white;
      font-size: clamp(2rem, 5vw, 4.8rem);
      line-height: 1.22;
      font-weight: 800;
      letter-spacing: -0.055em;
    }

    .word-unit {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      vertical-align: top;
      margin: 0 0.13em 0.25em;
      cursor: pointer;
      border-radius: 12px;
      transition: color 160ms ease;
    }

    .main-word {
      display: inline-block;
    }

    .word-unit:hover .main-word {
  color: var(--accent);
}

.word-unit.active-word .main-word {
  color: var(--accent);
}

.word-unit.translated .main-word {
  color: var(--translated);
}

.translation {
  display: none;
  font-size: clamp(0.8rem, 1.3vw, 1.05rem);
  letter-spacing: normal;
  line-height: 1.1;
  font-weight: 600;
  color: var(--translated);
  margin-top: 0.25em;
  max-width: 180px;
  word-break: break-word;
}

.word-unit.translated .translation,
.word-unit.translating .translation {
  display: block;
}

    .thinking-card {
      color: #9ca3af;
      font-size: 1.1rem;
      font-weight: 600;
      text-align: center;
      padding: 20px;
    }

    form {
      width: min(960px, 100%);
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 999px;
      padding: 10px;
      backdrop-filter: blur(16px);
    }

    #userInput {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      color: white;
      font-size: 1.05rem;
      padding: 12px 10px;
      min-width: 0;
    }

    #userInput::placeholder {
      color: #6b7280;
    }

    .icon-button,
    .send-button {
      border: none;
      border-radius: 999px;
      height: 46px;
      cursor: pointer;
      font-weight: 800;
      transition: transform 160ms ease, background 160ms ease, opacity 160ms ease;
    }

    .icon-button {
      width: 46px;
      min-width: 46px;
      background: rgba(255, 255, 255, 0.12);
      color: white;
      font-size: 1.1rem;
    }

    .send-button {
      padding: 0 24px;
      background: white;
      color: black;
      font-size: 0.95rem;
    }

    .icon-button:hover,
    .send-button:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.2);
    }

    .send-button:hover {
      background: #e5e7eb;
    }

    .send-button:disabled,
    .icon-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .hidden {
  display: none !important;
}

.mode-card {
  gap: 12px;
}

.input-mode-toggle {
  display: inline-flex;
  background: rgba(255, 255, 255, 0.08);
  border-radius: 999px;
  padding: 3px;
}

.input-mode-option {
  border: none;
  border-radius: 999px;
  padding: 8px 13px;
  background: transparent;
  color: #9ca3af;
  font-weight: 800;
  cursor: pointer;
}

.input-mode-option.active {
  background: white;
  color: black;
}

.speech-shell {
  position: sticky;
  bottom: 0;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  padding: 18px 0 8px;
  background:
    linear-gradient(
      to top,
      rgba(3, 3, 3, 0.98),
      rgba(3, 3, 3, 0.82),
      rgba(3, 3, 3, 0)
    );
}

.speech-record-button {
  width: 104px;
  height: 104px;
  border-radius: 50%;
  border: 1px solid rgba(255, 255, 255, 0.24);
  background:
    radial-gradient(circle at 35% 25%, rgba(255, 255, 255, 0.22), transparent 28%),
    linear-gradient(145deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.05));
  color: white;
  font-size: 2.2rem;
  cursor: pointer;
  box-shadow:
    0 0 0 1px rgba(255, 255, 255, 0.08),
    0 20px 70px rgba(0, 0, 0, 0.45),
    inset 0 0 30px rgba(255, 255, 255, 0.05);
  transition:
    transform 160ms ease,
    background 160ms ease,
    box-shadow 160ms ease;
}

.speech-record-button:hover {
  transform: translateY(-2px) scale(1.02);
  box-shadow:
    0 0 0 1px rgba(255, 255, 255, 0.14),
    0 26px 80px rgba(0, 0, 0, 0.52),
    0 0 36px rgba(96, 165, 250, 0.16),
    inset 0 0 30px rgba(255, 255, 255, 0.06);
}

.speech-record-button.recording {
  background:
    radial-gradient(circle at 35% 25%, rgba(255, 255, 255, 0.24), transparent 28%),
    linear-gradient(145deg, rgba(239, 68, 68, 0.95), rgba(127, 29, 29, 0.95));
  animation: recordPulse 1.15s infinite;
}

.speech-record-button.processing {
  opacity: 0.72;
  cursor: wait;
}

.mic-symbol {
  display: inline-block;
  transform: translateY(2px);
}

.speech-status {
  color: #9ca3af;
  font-size: 0.95rem;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  font-weight: 800;
}

.speech-review-card {
  width: min(900px, 100%);
  margin: 0 auto;
  background: rgba(239, 68, 68, 0.09);
  border: 1px solid rgba(248, 113, 113, 0.28);
  border-radius: 24px;
  padding: 18px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.speech-review-title {
  color: #fecaca;
  font-weight: 900;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  font-size: 0.86rem;
}

.speech-review-text {
  color: white;
  font-size: 1.15rem;
  line-height: 1.5;
}

.speech-review-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.speech-review-button {
  border: none;
  border-radius: 999px;
  padding: 10px 15px;
  font-weight: 900;
  cursor: pointer;
}

.speech-review-button.primary {
  background: white;
  color: black;
}

.speech-review-button.secondary {
  background: rgba(255, 255, 255, 0.12);
  color: white;
}

.speech-review-card.perfect-card {
  background: rgba(34, 197, 94, 0.10);
  border: 1px solid rgba(187, 247, 208, 0.34);
}

.speech-review-card.perfect-card .speech-review-title {
  color: #bbf7d0;
}

.speech-review-card.perfect-card .correction-word-unit .main-word,
.speech-review-card.perfect-card .correction-word-unit .translation {
  color: #bbf7d0;
}

@keyframes recordPulse {
  0% {
    box-shadow:
      0 0 0 0 rgba(239, 68, 68, 0.55),
      0 20px 70px rgba(0, 0, 0, 0.45);
  }

  70% {
    box-shadow:
      0 0 0 18px rgba(239, 68, 68, 0),
      0 20px 70px rgba(0, 0, 0, 0.45);
  }

  100% {
    box-shadow:
      0 0 0 0 rgba(239, 68, 68, 0),
      0 20px 70px rgba(0, 0, 0, 0.45);
  }
}

    .system-message {
      position: fixed;
      left: 50%;
      bottom: 98px;
      transform: translateX(-50%);
      background: rgba(17, 24, 39, 0.94);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 0.9rem;
      z-index: 20;
      box-shadow: 0 16px 50px rgba(0, 0, 0, 0.35);
      max-width: min(700px, 90vw);
      text-align: center;
    }

    .user-bubble.user-annotated {
  background: rgba(255, 255, 255, 0.1);
}

.user-text-part {
  white-space: pre-wrap;
}

.user-foreign-part {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  vertical-align: top;
  margin: 0 0.12em 0.25em;
  color: #f87171;
  font-weight: 800;
}

.user-foreign-original {
  display: inline-block;
}

.user-foreign-translation {
  color: #fca5a5;
  font-size: 0.78em;
  line-height: 1.1;
  margin-top: 0.18em;
  font-weight: 700;
  max-width: 180px;
  word-break: break-word;
}

 .correction-layout {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 18px;
  align-items: start;
}

.correction-side-controls {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  padding-top: 4px;
}

.correction-text-zone {
  display: flex;
  flex-direction: column;
  gap: 14px;
  min-width: 0;
}

.correction-line {
  color: white;
  font-size: clamp(1.8rem, 4vw, 3.8rem);
  line-height: 1.22;
  font-weight: 800;
  letter-spacing: -0.055em;
}

.correction-word-unit {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  vertical-align: top;
  margin: 0 0.13em 0.25em;
  cursor: pointer;
  border-radius: 12px;
  transition: color 160ms ease;
}

.correction-word-unit .main-word {
  display: inline-block;
}

.correction-word-unit.native-word .main-word,
.correction-word-unit.native-word .translation {
  color: #bbf7d0;
}

.correction-word-unit.corrected-word .main-word,
.correction-word-unit.corrected-word .translation {
  color: #f87171;
}

/* Blue must override both green and red during click/slow playback */
.correction-word-unit.active-word .main-word,
.correction-word-unit.active-word .translation,
.correction-word-unit.native-word.active-word .main-word,
.correction-word-unit.native-word.active-word .translation,
.correction-word-unit.corrected-word.active-word .main-word,
.correction-word-unit.corrected-word.active-word .translation {
  color: var(--accent) !important;
}

.correction-word-unit:hover .main-word,
.correction-word-unit:hover .translation {
  color: var(--accent);
}

.correction-word-unit .translation {
  display: block;
  font-size: clamp(0.8rem, 1.3vw, 1.05rem);
  letter-spacing: normal;
  line-height: 1.1;
  font-weight: 700;
  color: #fca5a5;
  margin-top: 0.25em;
  max-width: 220px;
  word-break: break-word;
}

.correction-word-unit.multi-word-token .main-word {
  white-space: nowrap;
}

.message-audio-controls {
  display: inline-flex;
  align-items: center;
  gap: 14px;
  background: transparent;
  border: none;
  padding: 0;
  backdrop-filter: none;
}

.message-play-button,
.correction-play-button {
  width: 76px;
  height: 76px;
  border-radius: 50%;
  border: 1px solid rgba(255, 255, 255, 0.24);
  background:
    radial-gradient(circle at 35% 25%, rgba(255, 255, 255, 0.22), transparent 28%),
    linear-gradient(145deg, rgba(255, 255, 255, 0.17), rgba(255, 255, 255, 0.06));
  color: white;
  cursor: pointer;
  box-shadow:
    0 0 0 1px rgba(255, 255, 255, 0.08),
    0 18px 55px rgba(0, 0, 0, 0.42),
    inset 0 0 28px rgba(255, 255, 255, 0.05);
  transition:
    transform 160ms ease,
    box-shadow 160ms ease,
    opacity 160ms ease;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0;
}

.message-play-button:hover,
.correction-play-button:hover {
  transform: translateY(-2px) scale(1.03);
  box-shadow:
    0 0 0 1px rgba(255, 255, 255, 0.14),
    0 24px 70px rgba(0, 0, 0, 0.52),
    0 0 34px rgba(96, 165, 250, 0.18),
    inset 0 0 28px rgba(255, 255, 255, 0.06);
}

.message-play-button.loading,
.correction-play-button.loading {
  opacity: 0.65;
  cursor: wait;
}

.message-play-button.playing,
.correction-play-button.playing {
  /* Intentionally no color change while playing. */
}

.playback-icon {
  width: 28px;
  height: 28px;
  fill: currentColor;
  display: block;
}

.bot-message-row {
  width: 100%;
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  align-items: start;
  gap: 24px;
}

.bot-message-row .bot-words {
  min-width: 0;
}

.bot-message-row .message-audio-controls {
  justify-self: end;
  align-self: start;
  padding-top: 0.35rem;
}

.message-audio-panel {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  gap: 9px;
}

@media (max-width: 760px) {
  .bot-message-row {
    grid-template-columns: 1fr;
    gap: 14px;
  }

  .bot-message-row .message-audio-controls {
    justify-self: start;
  }
}
    
.message-audio-panel {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  gap: 9px;
}

.message-slow-toggle,
.correction-slow-toggle {
  border: none;
  border-radius: 999px;
  padding: 8px 16px;
  background: rgba(255, 255, 255, 0.12);
  color: #d1d5db;
  font-weight: 900;
  cursor: pointer;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.message-slow-toggle.active,
.correction-slow-toggle.active {
  background: white;
  color: black;
}

@media (max-width: 760px) {
  .correction-layout {
    grid-template-columns: 1fr;
  }

  .correction-side-controls {
    flex-direction: row;
    justify-content: flex-start;
  }
}

.correction-actions-row {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
}

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.42); }
      70% { box-shadow: 0 0 0 12px rgba(239, 68, 68, 0); }
      100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
    }

    @media (max-width: 760px) {
      .app {
        padding: 16px;
      }

      .top-bar {
        flex-direction: column;
      }

      .controls {
        width: 100%;
        justify-content: flex-start;
      }

      .control-card {
        width: 100%;
        justify-content: space-between;
      }

      .bot-words {
        font-size: clamp(2rem, 11vw, 4rem);
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <header class="top-bar">
      <div class="brand">
        <h1>Language Chat</h1>
        <p>Read, listen, click words, and learn in context.</p>
      </div>

      <div class="controls">
  <div class="control-card">
    <label for="languageSelect">Chat</label>
    <div class="select-wrap">
      <select id="languageSelect">
        <option value="English" selected>🇺🇸 English</option>
        <option value="Hebrew">🇮🇱 Hebrew</option>
        <option value="Spanish">🇪🇸 Spanish</option>

        <option value="German">🇩🇪 German</option>
        <option value="Arabic">🇸🇦 Arabic</option>
        <option value="Russian">🇷🇺 Russian</option>
        <option value="Italian">🇮🇹 Italian</option>
        <option value="Portuguese">🇵🇹 Portuguese</option>
        <option value="Chinese">🇨🇳 Chinese</option>
        <option value="Japanese">🇯🇵 Japanese</option>
        <option value="Korean">🇰🇷 Korean</option>
      </select>
    </div>
  </div>

  <div class="control-card">
    <label for="fluentLanguageSelect">Fluent</label>
    <div class="select-wrap">
      <select id="fluentLanguageSelect">
        <option value="English" selected>🇺🇸 English</option>
        <option value="Hebrew">🇮🇱 Hebrew</option>
        <option value="Spanish">🇪🇸 Spanish</option>
        <option value="French">🇫🇷 French</option>
        <option value="German">🇩🇪 German</option>
        <option value="Arabic">🇸🇦 Arabic</option>
        <option value="Russian">🇷🇺 Russian</option>
        <option value="Italian">🇮🇹 Italian</option>
        <option value="Portuguese">🇵🇹 Portuguese</option>
        <option value="Chinese">🇨🇳 Chinese</option>
        <option value="Japanese">🇯🇵 Japanese</option>
        <option value="Korean">🇰🇷 Korean</option>
      </select>
    </div>
  </div>

  <div class="control-card mode-card">
    <label>Mode</label>
    <div class="input-mode-toggle">
      <button id="writingModeButton" class="input-mode-option active" type="button">
        Writing
      </button>
      <button id="speechModeButton" class="input-mode-option" type="button">
        Speech
      </button>
    </div>
  </div>
</div>
    </header>

    <main id="messageHistory" class="message-history"></main>

    <div id="composerShell" class="composer-shell">
  <form id="chatForm" onsubmit="return false;">
    <input id="userInput" autocomplete="off" placeholder="Ask something..." />

    <button id="sendButton" class="send-button" type="button">
      Send
    </button>
  </form>
</div>

<div id="speechShell" class="speech-shell hidden">
  <button id="speechRecordButton" class="speech-record-button" type="button" title="Record speech">
    <span class="mic-symbol">🎤</span>
  </button>

  <div id="speechStatus" class="speech-status">
    Tap to speak
  </div>
</div>
  </div>

  <script>
  const SUPABASE_URL = "https://tyzvxrlimbhmvmjenjxy.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_BdJd1R8Pkbggf5X_oOZL3w_DgoDyhNH";

  const form = document.getElementById("chatForm");
const input = document.getElementById("userInput");
const sendButton = document.getElementById("sendButton");

const composerShell = document.getElementById("composerShell");
const speechShell = document.getElementById("speechShell");
const speechRecordButton = document.getElementById("speechRecordButton");
const speechStatus = document.getElementById("speechStatus");

const writingModeButton = document.getElementById("writingModeButton");
const speechModeButton = document.getElementById("speechModeButton");

const messageHistory = document.getElementById("messageHistory");
const languageSelect = document.getElementById("languageSelect");
const fluentLanguageSelect = document.getElementById("fluentLanguageSelect");

let inputMode = "writing";

  const messages = [];
  const translationCache = new Map();
  const wordClickTimers = new WeakMap();
  const messageState = new Map();
  const userMessageState = new Map();

  const WORD_DOUBLE_CLICK_DELAY = 260;

  let messageCounter = 0;
  let userMessageCounter = 0;

  let mediaRecorder = null;
  let recordedChunks = [];
  let isRecording = false;

function buildCorrectionPairsFromCorrectedTextAndParts(correctedText, parts) {
  const correctedWords = splitCorrectionTranslationWords(correctedText);
  const nativeWords = getNativeChatLanguageWordsFromParts(parts);

  /*
    We consume native words in order. This avoids making every repeated word green
    merely because it appeared once in the user's chat-language speech.
  */
  let nativeIndex = 0;

  return correctedWords.map(word => {
    const normalizedWord = normalizeCorrectionCompare(word);
    const expectedNativeWord = nativeWords[nativeIndex];

    const wasNative =
      expectedNativeWord &&
      normalizedWord === expectedNativeWord;

    if (wasNative) {
      nativeIndex++;
    }

    return {
      correctedWord: word,
      originalWord: "",
      wasTranslated: !wasNative
    };
  });
}

    function buildChatLanguageSuggestion(parts) {

      if (part.isChatLanguage === false && part.translation) {

    .join("")
    .replace(/\s+/g, " ")

function buildCorrectionWordPairs(parts) {
  const pairs = [];

  for (const part of parts) {
    if (!part) continue;

    if (part.isChatLanguage === false) {
      const wordTranslations = Array.isArray(part.wordTranslations)
        ? part.wordTranslations
        : [];

      if (wordTranslations.length) {
        for (const item of wordTranslations) {
          const original = String(item.original || "").trim();
          const translation = String(item.translation || "").trim();

          if (!translation) continue;

          /*
            Important:
            Do NOT split multi-word translations here.
            If one fluent-language word maps to multiple chat-language words,
            that whole translation should remain one token and be read together.
          */
          pairs.push({
            correctedWord: translation,
            originalWord: original,
            wasTranslated: true
          });
        }
      } else if (part.translation) {
        /*
          Fallback:
          If the backend did not provide wordTranslations,
          keep the full translated segment grouped.
        */
        pairs.push({
          correctedWord: String(part.translation || "").trim(),
          originalWord: String(part.text || "").trim(),
          wasTranslated: true
        });
      }
    } else {
      /*
        Native chat-language text can still be split into words,
        because those words were already spoken correctly.
      */
      const chatWords = splitCorrectionTranslationWords(part.text);

      for (const word of chatWords) {
        pairs.push({
          correctedWord: word,
          originalWord: "",
          wasTranslated: false

      }

  function getReadableError(error) {

    if (typeof error.details === "string") return error.details;

    try {

async function buildCorrectionWordSchedule(state) {
  const context = getAudioContext();
  const pause = getSlowPauseSeconds();

  await getCorrectionWordClips(state);

  const clipMap = state.wordClipMap || new Map();
  const schedule = [];
  let playhead = 0;

  for (const token of state.tokens || []) {
    const clip = clipMap.get(token.tokenId);

    if (!clip || !clip.audioBase64) {
      continue;
    }

    let audioBuffer;

    if (clip.audioBuffer) {
      audioBuffer = clip.audioBuffer;
    } else {
      const arrayBuffer = base64ToArrayBuffer(clip.audioBase64);
      const rawBuffer = await context.decodeAudioData(arrayBuffer);
      audioBuffer = trimAudioBufferSilence(rawBuffer);
      clip.audioBuffer = audioBuffer;
    }

    schedule.push({
      tokenId: token.tokenId,
      word: token.word,
      audioBuffer,
      duration: audioBuffer.duration,
      playStart: playhead,
      playEnd: playhead + audioBuffer.duration
    });

    playhead += audioBuffer.duration + pause;
  }

  return schedule;
}

  if (isSamePlayback(playButton, "correction", correctionId)) {
  stopAllSpeech();
  return;

  try {
    stopAllSpeech();
    setPlaybackButtonLoading(playButton);
    await unlockAudioContext();

    if (state.slow) {
      if (!state.wordSchedule) {
        state.wordSchedule = await buildCorrectionWordSchedule(state);
      }

      playCorrectionWordSchedule(state, playButton);
    } else {
      const speech = await getCorrectionFullSpeech(state);

      if (!speech.audioBuffer) {
        const arrayBuffer = base64ToArrayBuffer(speech.audioBase64);
        const context = getAudioContext();
        speech.audioBuffer = await context.decodeAudioData(arrayBuffer);
      }

      playFullAudioBuffer(speech.audioBuffer, playButton, "correction", correctionId);
    }
  } catch (error) {
    setPlaybackButtonStopped(playButton);
    showSystemMessage(getReadableError(error));
  }
}

function playCorrectionWordSchedule(state, button = null) {
  const context = getAudioContext();
  const playbackToken = currentPlaybackToken;
  const startAt = context.currentTime + 0.08;

  scheduledSources = [];

  if (button) {
    setPlaybackButtonPlaying(button, "correction", state.id);
  }

  const card = document.querySelector(`[data-correction-id="${state.id}"]`);
  const root = card || state.lineEl || document;

  const units = [...root.querySelectorAll(".correction-word-unit")];

  const unitsByTokenId = new Map(
    units
      .filter(unit => unit.dataset.tokenId)
      .map(unit => [unit.dataset.tokenId, unit])
  );

  units.forEach(unit => unit.classList.remove("active-word"));

  state.wordSchedule.forEach(item => {
    const source = context.createBufferSource();
    source.buffer = item.audioBuffer;
    source.connect(context.destination);

    source.start(startAt + item.playStart);
    scheduledSources.push(source);

    const unit = unitsByTokenId.get(item.tokenId);

    if (!unit) return;

    window.setTimeout(() => {
      if (playbackToken === currentPlaybackToken) {
        unit.classList.add("active-word");
      }
    }, Math.max(0, item.playStart * 1000 + 80));

    window.setTimeout(() => {
      if (playbackToken === currentPlaybackToken) {
        unit.classList.remove("active-word");
      }
    }, Math.max(0, item.playEnd * 1000 + 180));
  });

  const totalDuration =
    state.wordSchedule.length > 0
      ? state.wordSchedule[state.wordSchedule.length - 1].playEnd
      : 0;

  window.setTimeout(() => {
    if (playbackToken === currentPlaybackToken) {
      scheduledSources = [];

      units.forEach(unit => {
        unit.classList.remove("active-word");
      });

      if (button) {
        setPlaybackButtonStopped(button);
      }
    }
  }, totalDuration * 1000 + 1200);
}

    } catch {
      throw new Error(`${label} returned non-JSON response: ${rawText}`);
    }

    if (!response.ok) {
      throwApiError(data, `${label} failed with status ${response.status}`);
    }

    return data;
  }

  function base64ToArrayBuffer(base64) {
    const binary = atob(base64);
    const bytes = new Uint8Array(binary.length);

    for (let i = 0; i < binary.length; i++) {

    }

    return bytes.buffer;

  async function handleSpeechTranscript(transcript) {
  if (!transcript.trim()) return;

  const isCorrectionRetry = correctionRetryMode;
  correctionRetryMode = false;

  if (!isCorrectionRetry) {
    addUserMessage(transcript);

    /*
      The bot receives the original message immediately.
      Re-recording is only for practice.
    */
    pendingBackgroundBot = await prepareBotResponseInBackground(transcript);
  }

  let analysis;

  try {
    analysis = await analyzeUserMessageLanguageParts(transcript);
  } catch {
    await revealPreparedBotResponse(pendingBackgroundBot);
    pendingBackgroundBot = null;
    return;
  }

  const parts = analysis.parts || [];
  const correctedText = analysis.correctedText || transcript;

  if (!hasForeignLanguageParts(parts)) {
    const prepared = pendingBackgroundBot;

    activeSpeechCorrection = null;
    pendingBackgroundBot = null;

    await showPerfectCorrectionThenRevealBot({
      transcript,
      parts,
      correctedText,
      prepared
    });

    return;
  }

  const suggestion = correctedText;

  activeSpeechCorrection = {
    transcript,
    parts,
    suggestion,
    correctedText,
    prepared: pendingBackgroundBot
  };

  const correctionCard = addSpeechReviewCard({
    transcript,
    suggestion,
    parts,
    correctedText,
    isPerfect: false,
    onRetry: () => {
      setSpeechStatus("Recording");
    },
    onContinue: async () => {
      const prepared = activeSpeechCorrection?.prepared || pendingBackgroundBot;

      activeSpeechCorrection = null;
      pendingBackgroundBot = null;

      if (prepared) {
        await revealPreparedBotResponse(prepared);
      }
    }
  });

  const correctionId = correctionCard.dataset.correctionId;

  if (correctionId) {
    playCorrection(correctionId).catch(() => {});
  }
}

  function renderWordsIntoElement(text, container, messageId) {
    container.innerHTML = "";

    const parts = splitTextIntoParts(text);
    const speakableTokens = [];
    let tokenIndex = 0;

    for (const part of parts) {
      if (/^\s+$/.test(part)) {
        container.appendChild(document.createTextNode(" "));
        continue;
      }

      if (isClickableWord(part)) {
        const tokenId = `${messageId}-tok-${tokenIndex}`;

        const unit = document.createElement("span");
        unit.className = "word-unit";
        unit.dataset.word = part;
        unit.dataset.tokenId = tokenId;

        const mainWord = document.createElement("span");
        mainWord.className = "main-word";
        mainWord.textContent = part;

        const translation = document.createElement("span");
        translation.className = "translation";

        unit.appendChild(mainWord);
        unit.appendChild(translation);

        unit.addEventListener("click", () => {
          handleBotWordClick(unit, part, messageId, text);
        });

        container.appendChild(unit);

        speakableTokens.push({
          tokenId,
          word: part,
          sentence: text
        });

        tokenIndex++;
      } else {
        const punct = document.createElement("span");
        punct.className = "punct";
        punct.textContent = part;
        container.appendChild(punct);

  function trimAudioBufferSilence(audioBuffer, threshold = 0.012, paddingSeconds = 0.015) {
    const sampleRate = audioBuffer.sampleRate;
    const numberOfChannels = audioBuffer.numberOfChannels;
    const length = audioBuffer.length;

    let firstSound = 0;
    let lastSound = length - 1;

    function sampleIsSound(index) {
      for (let channel = 0; channel < numberOfChannels; channel++) {
        const data = audioBuffer.getChannelData(channel);
        if (Math.abs(data[index]) > threshold) return true;
      }
      return false;
    }

    while (firstSound < length && !sampleIsSound(firstSound)) firstSound++;
    while (lastSound > firstSound && !sampleIsSound(lastSound)) lastSound--;

    const paddingSamples = Math.floor(paddingSeconds * sampleRate);
    const start = Math.max(0, firstSound - paddingSamples);
    const end = Math.min(length, lastSound + paddingSamples);

    const trimmedLength = Math.max(1, end - start);
    const context = getAudioContext();

    const trimmedBuffer = context.createBuffer(
      numberOfChannels,
      trimmedLength,
      sampleRate
    );

    for (let channel = 0; channel < numberOfChannels; channel++) {
      const oldData = audioBuffer.getChannelData(channel);
      const newData = trimmedBuffer.getChannelData(channel);

      for (let i = 0; i < trimmedLength; i++) {
        newData[i] = oldData[start + i] || 0;
      }
    }

    return trimmedBuffer;
  }

  function getSlowPauseSeconds() {
    return 0.18;
  }

  async function buildIndividualWordScheduleForMessage(state) {
    const context = getAudioContext();
    const pause = getSlowPauseSeconds();

    await getWordClipsForMessage(state);

    const clipMap = state.wordClipMap || new Map();
    const schedule = [];
    let playhead = 0;

    for (const token of state.speakableTokens || []) {
      const clip = clipMap.get(token.tokenId);
      if (!clip || !clip.audioBase64) continue;

      let audioBuffer;

      if (clip.audioBuffer) {
        audioBuffer = clip.audioBuffer;
      } else {
        const arrayBuffer = base64ToArrayBuffer(clip.audioBase64);
        const rawBuffer = await context.decodeAudioData(arrayBuffer);
        audioBuffer = trimAudioBufferSilence(rawBuffer);
        clip.audioBuffer = audioBuffer;
      }

      schedule.push({
        tokenId: token.tokenId,
        word: token.word,
        audioBuffer,
        duration: audioBuffer.duration,
        playStart: playhead,
        playEnd: playhead + audioBuffer.duration
      });

      playhead += audioBuffer.duration + pause;
    }

    return schedule;
  }

  async function playSlowMessage(state, button = null) {
  await unlockAudioContext();

  if (!state.wordSchedule) {
    state.wordSchedule = await buildIndividualWordScheduleForMessage(state);
  }

  assignScheduleToVisibleWords(state.wordsEl, state.wordSchedule);
  playIndividualWordAudio(state.wordSchedule, state.wordsEl, button, "message", state.id);
}

  function clearActiveWords(container) {
    container.querySelectorAll(".word-unit").forEach(unit => {
      unit.classList.remove("active-word");
    });
  }

  function assignScheduleToVisibleWords(container, schedule) {
    const scheduleMap = new Map(
      schedule
        .filter(item => item && item.tokenId)
        .map(item => [item.tokenId, item])
    );

    const units = [...container.querySelectorAll(".word-unit")];

    units.forEach(unit => {
      const tokenId = unit.dataset.tokenId;
      const timing = scheduleMap.get(tokenId);

      if (timing) {
        unit.dataset.playStart = String(timing.playStart);
        unit.dataset.playEnd = String(timing.playEnd);
      } else {
        unit.dataset.playStart = "";
        unit.dataset.playEnd = "";
      }
    });
  }

  function playIndividualWordAudio(wordSchedule, wordsEl, button = null, type = null, id = null) {
  const context = getAudioContext();
  const playbackToken = currentPlaybackToken;
  const startAt = context.currentTime + 0.08;

  scheduledSources = [];

  if (button && type && id) {
    setPlaybackButtonPlaying(button, type, id);
  }

  wordSchedule.forEach(item => {
    const source = context.createBufferSource();
    source.buffer = item.audioBuffer;
    source.connect(context.destination);

    source.start(startAt + item.playStart);

    scheduledSources.push(source);
  });

  const visualStart = performance.now() + 80;

  function syncFrame() {
    if (playbackToken !== currentPlaybackToken) return;

    const elapsed = (performance.now() - visualStart) / 1000;
    const units = [...wordsEl.querySelectorAll(".word-unit")];

    for (const unit of units) {
      const start = Number(unit.dataset.playStart);
      const end = Number(unit.dataset.playEnd);

      if (!Number.isFinite(start) || !Number.isFinite(end)) {
        unit.classList.remove("active-word");
        continue;
      }

      if (elapsed >= start && elapsed <= end + 0.04) {
        unit.classList.add("active-word");
      } else {
        unit.classList.remove("active-word");
      }
    }

    const lastEnd =
      wordSchedule.length > 0
        ? wordSchedule[wordSchedule.length - 1].playEnd
        : 0;

    if (elapsed <= lastEnd + 0.5) {
      requestAnimationFrame(syncFrame);
    } else {
      clearActiveWords(wordsEl);
      if (button) {
        setPlaybackButtonStopped(button);
      }
    }
  }

  requestAnimationFrame(syncFrame);

  const totalDuration =
    wordSchedule.length > 0
      ? wordSchedule[wordSchedule.length - 1].playEnd
      : 0;

  setTimeout(() => {
    if (playbackToken === currentPlaybackToken) {
      scheduledSources = [];
      clearActiveWords(wordsEl);

      if (button) {
        setPlaybackButtonStopped(button);
      }
    }
  }, totalDuration * 1000 + 1000);
}

  function handleBotWordClick(unit, word, messageId, fallbackSentence) {
    const existingTimer = wordClickTimers.get(unit);

    if (existingTimer) {
      clearTimeout(existingTimer);
      wordClickTimers.delete(unit);

      const state = messageState.get(messageId);
      handleBotWordDoubleClick(unit, word, messageId, state?.text || fallbackSentence);
      return;
    }

    const timer = setTimeout(() => {
      wordClickTimers.delete(unit);
      handleBotWordSingleClick(unit, word, messageId);
    }, WORD_DOUBLE_CLICK_DELAY);

    wordClickTimers.set(unit, timer);
  }

  async function playPreloadedWord(unit, word, messageId) {
    stopAllSpeech();
    await unlockAudioContext();

    const state = messageState.get(messageId);
    if (!state) throw new Error("Could not find this message.");

    const tokenId = unit.dataset.tokenId;
    if (!tokenId) throw new Error("Could not find this word token.");

    await getWordClipsForMessage(state);

    const clip = state.wordClipMap?.get(tokenId);
    if (!clip || !clip.audioBase64) {
      throw new Error("This word recording is not ready yet.");
    }

    const context = getAudioContext();

    let audioBuffer;

    if (clip.audioBuffer) {
      audioBuffer = clip.audioBuffer;
    } else {
      const arrayBuffer = base64ToArrayBuffer(clip.audioBase64);
      const rawBuffer = await context.decodeAudioData(arrayBuffer);
      audioBuffer = trimAudioBufferSilence(rawBuffer);
      clip.audioBuffer = audioBuffer;
    }

    const source = context.createBufferSource();
    source.buffer = audioBuffer;
    source.connect(context.destination);

    scheduledSources = [source];

    source.start(context.currentTime + 0.04);

    return new Promise(resolve => {
      source.addEventListener("ended", () => {
        scheduledSources = [];
        resolve();
      });
    });
  }

  async function translateWordUnit(unit, word, sentence) {
    const cleanWord = word.trim();
    if (!cleanWord) return;

    const translationEl = unit.querySelector(".translation");
    const chatLanguage = languageSelect.value;
    const fluentLanguage = fluentLanguageSelect.value;

    const cacheKey = `${cleanWord}|${chatLanguage}|${fluentLanguage}|${sentence}`;

    unit.classList.add("translating");

    if (translationEl && !translationEl.textContent) {
      translationEl.textContent = "…";
    }

    if (translationCache.has(cacheKey)) {
      if (translationEl) translationEl.textContent = translationCache.get(cacheKey);

      unit.classList.remove("translating");
      unit.classList.add("translated");
      return;
    }

    try {
      const response = await fetch(`${SUPABASE_URL}/functions/v1/chat`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "apikey": SUPABASE_ANON_KEY,
          "Authorization": `Bearer ${SUPABASE_ANON_KEY}`
        },
        body: JSON.stringify({
          action: "translate-word",
          word: cleanWord,
          sentence,
          chatLanguage,
          fluentLanguage
        })
      });

      const data = await parseJsonResponse(response, "Translation");

      const translated = data.translation || "";
      translationCache.set(cacheKey, translated);

      if (translationEl) translationEl.textContent = translated;

      unit.classList.remove("translating");
      unit.classList.add("translated");
    } catch (error) {
      if (translationEl) translationEl.textContent = "failed";

      unit.classList.remove("translating");
      unit.classList.add("translated");
      showSystemMessage(getReadableError(error));
    }
  }

  async function sendToBot(userText) {
    messages.push({
      role: "user",
      content: userText
    });

    addUserMessage(userText);

    const thinkingCard = addThinkingMessage();

    const response = await fetch(`${SUPABASE_URL}/functions/v1/chat`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": SUPABASE_ANON_KEY,
        "Authorization": `Bearer ${SUPABASE_ANON_KEY}`
      },
      body: JSON.stringify({
        messages,
        language: languageSelect.value
      })
    });

    const data = await parseJsonResponse(response, "Chat");

    messages.push({
      role: "assistant",
      content: data.reply
    });

    const fullSpeechPromise = fetchFullSpeech(data.reply);
    const fullSpeech = await fullSpeechPromise;

    thinkingCard.remove();

    const botMessageId = addBotMessage(data.reply, {
      fullSpeech,
      fullSpeechPromise
    });

    const state = messageState.get(botMessageId);

    if (state) {
      state.wordClipsPromise = fetchIndividualWordSpeechForTokens(state.speakableTokens)
        .then(clips => {
          state.wordClips = clips;
          state.wordClipMap = new Map(
            clips
              .filter(clip => clip && clip.tokenId)
              .map(clip => [clip.tokenId, clip])
          );
          return clips;
        })
        .catch(() => null);

      playConversationalMessage(state).catch(error => {
        showSystemMessage(getReadableError(error));
      });
    }
  }

  async function handleSend() {
  await unlockAudio();

  const userText = input.value.trim();
  if (!userText) return;

  input.value = "";
  sendButton.disabled = true;

  try {
    await sendToBot(userText);
  } catch (error) {
    showSystemMessage(getReadableError(error));
  } finally {
    sendButton.disabled = false;
    input.focus();
  }
}

  function getBestRecordingMimeType() {
  const candidates = [
    "audio/webm;codecs=opus",
    "audio/webm",
    "audio/mp4;codecs=mp4a.40.2",
    "audio/mp4",
    "audio/ogg;codecs=opus",
    "audio/ogg"
  ];

  if (!window.MediaRecorder || !MediaRecorder.isTypeSupported) return "";

  for (const type of candidates) {
    if (MediaRecorder.isTypeSupported(type)) return type;
  }

  return "";
}

function getAudioFileExtension(mimeType) {
  const type = (mimeType || "").toLowerCase();

  if (type.includes("webm")) return "webm";
  if (type.includes("mp4")) return "mp4";
  if (type.includes("mpeg")) return "mp3";
  if (type.includes("mp3")) return "mp3";
  if (type.includes("wav")) return "wav";
  if (type.includes("ogg")) return "ogg";

  return "webm";
}

function getAudioFileName(mimeType) {
  return `recording.${getAudioFileExtension(mimeType)}`;
}

async function transcribeAudioBlob(audioBlob, mimeType) {
  if (!audioBlob || audioBlob.size < 1000) {
    throw new Error("The recording was too short or empty.");
  }

  const finalMimeType = mimeType || audioBlob.type || "audio/webm";
  const fileName = getAudioFileName(finalMimeType);

  const audioFile = new File([audioBlob], fileName, {
    type: finalMimeType
  });

  const formData = new FormData();
  formData.append("audio", audioFile);
  formData.append("chatLanguage", languageSelect.value);
  formData.append("fluentLanguage", fluentLanguageSelect.value);
  formData.append(
    "transcriptionPrompt",
    `The speaker may switch between languages, especially ${languageSelect.value} and ${fluentLanguageSelect.value}. Transcribe exactly what is spoken. Do not translate. Preserve mixed-language speech.`
  );

  const response = await fetch(`${SUPABASE_URL}/functions/v1/transcribe-audio`, {
    method: "POST",
    headers: {
      "apikey": SUPABASE_ANON_KEY,
      "Authorization": `Bearer ${SUPABASE_ANON_KEY}`
    },
    body: formData
  });

  const rawText = await response.text();

  let data;
  try {
    data = JSON.parse(rawText);
  } catch {
    throw new Error(`Transcription returned non-JSON response: ${rawText}`);
  }

  if (!response.ok) {
    throw new Error(
      data.error ||
      data.message ||
      data?.openai?.error?.message ||
      `Transcription failed with status ${response.status}`
    );
  }

  const transcript =
    data.text ||
    data.transcript ||
    data.transcription ||
    "";

  if (!transcript.trim()) {
    throw new Error("No transcript was returned.");
  }

  return transcript.trim();
}

async function startRecording() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    showSystemMessage("Audio recording is not supported in this browser.");
    return;
  }

  if (!window.MediaRecorder) {
    showSystemMessage("MediaRecorder is not supported in this browser.");
    return;
  }

  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

  recordedChunks = [];

  const mimeType = getBestRecordingMimeType();
  const options = mimeType ? { mimeType } : {};

  try {
    mediaRecorder = new MediaRecorder(stream, options);
  } catch {
    mediaRecorder = new MediaRecorder(stream);
  }

  mediaRecorder.addEventListener("dataavailable", event => {
    if (event.data && event.data.size > 0) {
      recordedChunks.push(event.data);
    }
  });

  mediaRecorder.addEventListener("start", () => {
    isRecording = true;

    speechRecordButton.classList.add("recording");
    speechRecordButton.classList.remove("processing");
    speechRecordButton.innerHTML = `<span class="mic-symbol">■</span>`;

    setSpeechStatus("Recording");
  });

  mediaRecorder.addEventListener("stop", async () => {
  speechRecordButton.disabled = true;
  speechRecordButton.classList.remove("recording");
  speechRecordButton.classList.add("processing");
  speechRecordButton.innerHTML = `<span class="mic-symbol">…</span>`;
  setSpeechStatus("Transcribing");

  try {
    const actualMimeType =
      mediaRecorder.mimeType ||
      mimeType ||
      recordedChunks[0]?.type ||
      "audio/webm";

    const audioBlob = new Blob(recordedChunks, {
      type: actualMimeType
    });

    const transcript = await transcribeAudioBlob(audioBlob, actualMimeType);

    if (inputMode === "speech") {
      setSpeechStatus("Checking language");

      await handleSpeechTranscript(transcript);

      setSpeechStatus("Tap to speak");
    } else {
      input.value = transcript;
      input.focus();
      setSpeechStatus("Tap to speak");
    }
  } catch (error) {
    showSystemMessage(getReadableError(error));
    setSpeechStatus("Tap to speak");
  } finally {
    stream.getTracks().forEach(track => track.stop());

    isRecording = false;
    resetSpeechButton();
  }
});

  mediaRecorder.start();
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state === "recording") {
    mediaRecorder.stop();
  }
}

async function handleSpeechRecordButtonClick(event) {
  event.preventDefault();
  event.stopPropagation();

  try {
    await unlockAudio();

    if (isRecording) {
      stopRecording();
    } else {
      await startRecording();
    }
  } catch (error) {
    showSystemMessage(getReadableError(error));

    isRecording = false;
    resetSpeechButton();
    setSpeechStatus("Tap to speak");
  }
}

  function attachUiHandlers() {
  if (form) {
    form.addEventListener("submit", event => {
      event.preventDefault();
      event.stopPropagation();
      return false;
    });
  }

  if (sendButton) {
    sendButton.addEventListener("click", event => {
      event.preventDefault();
      event.stopPropagation();

      handleSend().catch(error => {
        showSystemMessage(getReadableError(error));
      });
    });
  }

  if (input) {
    input.addEventListener("keydown", event => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();

        handleSend().catch(error => {
          showSystemMessage(getReadableError(error));
        });
      }
    });
  }

  if (writingModeButton) {
    writingModeButton.addEventListener("click", () => {
      setInputMode("writing");
    });
  }

  if (speechModeButton) {
    speechModeButton.addEventListener("click", () => {
      setInputMode("speech");
    });
  }

  if (speechRecordButton) {
    speechRecordButton.addEventListener("click", handleSpeechRecordButtonClick);
  }
}

  attachUiHandlers();
setInputMode("speech");
</script>
