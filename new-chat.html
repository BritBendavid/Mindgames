<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Language Chat</title>

  <style>
    * {
  box-sizing: border-box;
}

:root {
  --bg: #030303;
  --panel: rgba(255, 255, 255, 0.07);
  --text: #f8fafc;
  --muted: #9ca3af;
  --accent: #60a5fa;
  --translated: #facc15;
  --danger: #ef4444;
}

html {
  min-height: 100%;
}

body {
  margin: 0;
  min-height: 100vh;
  background:
    radial-gradient(circle at top left, rgba(37, 99, 235, 0.18), transparent 30%),
    radial-gradient(circle at bottom right, rgba(250, 204, 21, 0.08), transparent 25%),
    var(--bg);
  color: var(--text);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  overflow-y: auto;
  overflow-x: hidden;
}

button,
input,
select {
  font-family: inherit;
}

button {
  -webkit-tap-highlight-color: transparent;
}

.app {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 24px;
  gap: 18px;
}

.hidden {
  display: none !important;
}

/* Header */

.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: nowrap;
  z-index: 5;
  width: 100%;
}

.brand {
  display: flex;
  flex-direction: column;
  flex: 0 0 auto;
  min-width: max-content;
}

.brand h1 {
  margin: 0 0 4px;
  font-size: 1.05rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  font-weight: 800;
  white-space: nowrap;
}

.brand p {
  display: block;
  margin: 0;
  color: var(--muted);
  font-size: 0.9rem;
  white-space: nowrap;
}

.controls {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: nowrap;
  justify-content: flex-end;
  margin-left: auto;
  min-width: 0;
}

.control-card {
  background: var(--panel);
  border: 1px solid rgba(255, 255, 255, 0.12);
  border-radius: 18px;
  padding: 9px 11px;
  display: flex;
  align-items: center;
  gap: 8px;
  backdrop-filter: blur(16px);
  flex: 0 0 auto;
}

.control-card label {
  color: var(--muted);
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  white-space: nowrap;
}

/* Stacked Learn / Fluent selector */

.language-stack-card {
  flex-direction: column;
  align-items: stretch;
  gap: 12px;
  padding: 11px 13px;
}

.stacked-control-row {
  display: grid;
  grid-template-columns: 58px minmax(120px, 1fr);
  align-items: center;
  gap: 8px;
}

.stacked-control-row + .stacked-control-row {
  padding-top: 10px;
  border-top: 1px solid rgba(255, 255, 255, 0.10);
}

.stacked-control-row label {
  color: var(--muted);
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  white-space: nowrap;
}

.language-stack-card select {
  width: 100%;
}

select {
  appearance: none;
  border: none;
  outline: none;
  background: transparent;
  color: var(--text);
  font-size: 0.95rem;
  font-weight: 700;
  cursor: pointer;
  padding-right: 18px;
}

select option {
  background: #111827;
  color: white;
}

.select-wrap {
  position: relative;
  display: flex;
  align-items: center;
}

.select-wrap::after {
  content: "⌄";
  position: absolute;
  right: 0;
  color: var(--muted);
  pointer-events: none;
  transform: translateY(-2px);
}

/* Writing / Speech mode toggle */

.mode-card {
  gap: 12px;
}

.input-mode-toggle {
  display: inline-flex;
  background: rgba(255, 255, 255, 0.08);
  border-radius: 999px;
  padding: 3px;
}

.input-mode-option {
  border: none;
  border-radius: 999px;
  padding: 8px 13px;
  background: transparent;
  color: #9ca3af;
  font-weight: 800;
  cursor: pointer;
}

.input-mode-option.active {
  background: white;
  color: black;
}

/* Account card */

.account-card {
  min-height: 44px;
  flex: 0 0 auto;
}

.auth-open-button {
  border: none;
  border-radius: 999px;
  padding: 8px 12px;
  font-weight: 900;
  cursor: pointer;
  white-space: nowrap;
}

.auth-open-button {
  background: white;
  color: black;
}

.account-card {
  min-height: 44px;
  flex: 0 0 auto;
  position: relative;
}

.account-menu-wrap {
  position: relative;
  display: inline-flex;
  align-items: center;
}

.account-avatar-button {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  border: 1px solid rgba(255, 255, 255, 0.18);
  background:
    radial-gradient(circle at 35% 25%, rgba(255, 255, 255, 0.18), transparent 30%),
    linear-gradient(145deg, rgba(148, 163, 184, 0.28), rgba(71, 85, 105, 0.22));
  color: #e5e7eb;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow:
    0 12px 32px rgba(0, 0, 0, 0.32),
    inset 0 0 18px rgba(255, 255, 255, 0.04);
  transition:
    transform 160ms ease,
    box-shadow 160ms ease,
    border-color 160ms ease;
}

.account-avatar-button:hover {
  transform: translateY(-1px) scale(1.03);
  border-color: rgba(255, 255, 255, 0.3);
  box-shadow:
    0 16px 42px rgba(0, 0, 0, 0.42),
    0 0 24px rgba(148, 163, 184, 0.14),
    inset 0 0 18px rgba(255, 255, 255, 0.05);
}

.account-avatar-icon {
  width: 24px;
  height: 24px;
  fill: currentColor;
}

.account-dropdown {
  position: absolute;
  top: calc(100% + 10px);
  right: 0;
  width: 230px;
  background:
    radial-gradient(circle at top left, rgba(148, 163, 184, 0.14), transparent 34%),
    rgba(17, 24, 39, 0.98);
  border: 1px solid rgba(255, 255, 255, 0.14);
  border-radius: 18px;
  padding: 12px;
  z-index: 80;
  box-shadow: 0 22px 70px rgba(0, 0, 0, 0.5);
  backdrop-filter: blur(16px);
}

.account-dropdown::before {
  content: "";
  position: absolute;
  top: -6px;
  right: 15px;
  width: 12px;
  height: 12px;
  background: rgba(17, 24, 39, 0.98);
  border-left: 1px solid rgba(255, 255, 255, 0.14);
  border-top: 1px solid rgba(255, 255, 255, 0.14);
  transform: rotate(45deg);
}

.account-display-name {
  color: white;
  font-weight: 950;
  font-size: 0.96rem;
  line-height: 1.25;
  padding: 7px 8px 10px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.account-menu-logout {
  width: 100%;
  border: none;
  border-radius: 999px;
  padding: 10px 12px;
  background: rgba(255, 255, 255, 0.1);
  color: #e5e7eb;
  font-weight: 900;
  cursor: pointer;
  text-align: center;
}

.account-menu-logout:hover {
  background: rgba(255, 255, 255, 0.16);
  color: white;
}

/* Message area */

.message-history {
  width: 100%;
  flex: 1;
  padding: 22px 4vw 130px;
  display: flex;
  flex-direction: column;
  gap: 28px;
  scroll-behavior: smooth;
}

.message-card {
  width: min(1100px, 100%);
  margin: 0 auto;
}

.user-card {
  display: flex;
  justify-content: flex-end;
}

.user-bubble {
  max-width: 760px;
  background: rgba(255, 255, 255, 0.12);
  color: #e5e7eb;
  border: 1px solid rgba(255, 255, 255, 0.14);
  border-radius: 22px;
  padding: 16px 20px;
  font-size: 1.05rem;
  line-height: 1.45;
}

.user-bubble.user-annotated {
  background: rgba(255, 255, 255, 0.1);
}

.user-text-part {
  white-space: pre-wrap;
}

.user-foreign-part {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  vertical-align: top;
  margin: 0 0.12em 0.25em;
  color: #f87171;
  font-weight: 800;
}

.user-foreign-original {
  display: inline-block;
}

.user-foreign-translation {
  color: #fca5a5;
  font-size: 0.78em;
  line-height: 1.1;
  margin-top: 0.18em;
  font-weight: 700;
  max-width: 180px;
  word-break: break-word;
}

.bot-card {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 14px;
}

.bot-message-row {
  width: 100%;
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  align-items: start;
  gap: 24px;
}

.bot-words {
  color: white;
  font-size: clamp(2rem, 5vw, 4.8rem);
  line-height: 1.22;
  font-weight: 800;
  letter-spacing: -0.055em;
  min-width: 0;
}

.word-unit {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  vertical-align: top;
  margin: 0 0.13em 0.25em;
  cursor: pointer;
  border-radius: 12px;
  transition: color 160ms ease;
}

.main-word {
  display: inline-block;
}

.word-unit:hover .main-word {
  color: var(--accent);
}

.word-unit.active-word .main-word {
  color: var(--accent);
}

.word-unit.translated .main-word {
  color: var(--translated);
}

.translation {
  display: none;
  font-size: clamp(0.8rem, 1.3vw, 1.05rem);
  letter-spacing: normal;
  line-height: 1.1;
  font-weight: 600;
  color: var(--translated);
  margin-top: 0.25em;
  max-width: 180px;
  word-break: break-word;
}

.word-unit.translated .translation,
.word-unit.translating .translation {
  display: block;
}

.thinking-card {
  color: #9ca3af;
  font-size: 1.1rem;
  font-weight: 600;
  text-align: center;
  padding: 20px;
}

/* Composer */

.composer-shell {
  position: sticky;
  bottom: 0;
  display: flex;
  justify-content: center;
  z-index: 10;
  padding: 12px 0 4px;
  background:
    linear-gradient(
      to top,
      rgba(3, 3, 3, 0.98),
      rgba(3, 3, 3, 0.82),
      rgba(3, 3, 3, 0)
    );
}

form {
  width: min(960px, 100%);
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--panel);
  border: 1px solid rgba(255, 255, 255, 0.14);
  border-radius: 999px;
  padding: 10px;
  backdrop-filter: blur(16px);
}

#userInput {
  flex: 1;
  border: none;
  outline: none;
  background: transparent;
  color: white;
  font-size: 1.05rem;
  padding: 12px 10px;
  min-width: 0;
}

#userInput::placeholder {
  color: #6b7280;
}

.icon-button,
.send-button {
  border: none;
  border-radius: 999px;
  height: 46px;
  cursor: pointer;
  font-weight: 800;
  transition: transform 160ms ease, background 160ms ease, opacity 160ms ease;
}

.icon-button {
  width: 46px;
  min-width: 46px;
  background: rgba(255, 255, 255, 0.12);
  color: white;
  font-size: 1.1rem;
}

.send-button {
  padding: 0 24px;
  background: white;
  color: black;
  font-size: 0.95rem;
}

.icon-button:hover,
.send-button:hover {
  transform: translateY(-1px);
  background: rgba(255, 255, 255, 0.2);
}

.send-button:hover {
  background: #e5e7eb;
}

.send-button:disabled,
.icon-button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

/* Speech input mode */

.speech-shell {
  position: sticky;
  bottom: 0;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  padding: 18px 0 8px;
  background:
    linear-gradient(
      to top,
      rgba(3, 3, 3, 0.98),
      rgba(3, 3, 3, 0.82),
      rgba(3, 3, 3, 0)
    );
}

.speech-record-button {
  width: 104px;
  height: 104px;
  border-radius: 50%;
  border: 1px solid rgba(255, 255, 255, 0.24);
  background:
    radial-gradient(circle at 35% 25%, rgba(255, 255, 255, 0.22), transparent 28%),
    linear-gradient(145deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.05));
  color: white;
  font-size: 2.2rem;
  cursor: pointer;
  box-shadow:
    0 0 0 1px rgba(255, 255, 255, 0.08),
    0 20px 70px rgba(0, 0, 0, 0.45),
    inset 0 0 30px rgba(255, 255, 255, 0.05);
  transition:
    transform 160ms ease,
    background 160ms ease,
    box-shadow 160ms ease;
}

.speech-record-button:hover {
  transform: translateY(-2px) scale(1.02);
  box-shadow:
    0 0 0 1px rgba(255, 255, 255, 0.14),
    0 26px 80px rgba(0, 0, 0, 0.52),
    0 0 36px rgba(96, 165, 250, 0.16),
    inset 0 0 30px rgba(255, 255, 255, 0.06);
}

.speech-record-button.recording {
  background:
    radial-gradient(circle at 35% 25%, rgba(255, 255, 255, 0.24), transparent 28%),
    linear-gradient(145deg, rgba(239, 68, 68, 0.95), rgba(127, 29, 29, 0.95));
  animation: recordPulse 1.15s infinite;
}

.speech-record-button.processing {
  opacity: 0.72;
  cursor: wait;
}

.mic-symbol {
  display: inline-block;
  transform: translateY(2px);
}

.speech-status {
  color: #9ca3af;
  font-size: 0.95rem;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  font-weight: 800;
}

@keyframes recordPulse {
  0% {
    box-shadow:
      0 0 0 0 rgba(239, 68, 68, 0.55),
      0 20px 70px rgba(0, 0, 0, 0.45);
  }

  70% {
    box-shadow:
      0 0 0 18px rgba(239, 68, 68, 0),
      0 20px 70px rgba(0, 0, 0, 0.45);
  }

  100% {
    box-shadow:
      0 0 0 0 rgba(239, 68, 68, 0),
      0 20px 70px rgba(0, 0, 0, 0.45);
  }
}

/* Correction / Perfect cards */

.speech-review-card {
  width: min(900px, 100%);
  margin: 0 auto;
  background: rgba(239, 68, 68, 0.09);
  border: 1px solid rgba(248, 113, 113, 0.28);
  border-radius: 24px;
  padding: 18px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.speech-review-card.perfect-card {
  background: rgba(34, 197, 94, 0.10);
  border: 1px solid rgba(187, 247, 208, 0.34);
}

.speech-review-title {
  color: #fecaca;
  font-weight: 900;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  font-size: 0.86rem;
}

.speech-review-card.perfect-card .speech-review-title {
  color: #bbf7d0;
}

.speech-review-text {
  color: white;
  font-size: 1.15rem;
  line-height: 1.5;
}

.speech-review-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.correction-actions-row {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
}

.speech-review-button {
  border: none;
  border-radius: 999px;
  padding: 10px 15px;
  font-weight: 900;
  cursor: pointer;
}

.speech-review-button.primary {
  background: white;
  color: black;
}

.speech-review-button.secondary {
  background: rgba(255, 255, 255, 0.12);
  color: white;
}

.correction-layout {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 18px;
  align-items: start;
}

.correction-side-controls {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  padding-top: 4px;
}

.correction-text-zone {
  display: flex;
  flex-direction: column;
  gap: 14px;
  min-width: 0;
}

.correction-line {
  color: white;
  font-size: clamp(1.8rem, 4vw, 3.8rem);
  line-height: 1.22;
  font-weight: 800;
  letter-spacing: -0.055em;
}

.correction-word-unit {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  vertical-align: top;
  margin: 0 0.13em 0.25em;
  cursor: pointer;
  border-radius: 12px;
  transition: color 160ms ease;
}

.correction-word-unit .main-word {
  display: inline-block;
}

.correction-word-unit.native-word .main-word,
.correction-word-unit.native-word .translation {
  color: #bbf7d0;
}

.correction-word-unit.corrected-word .main-word,
.correction-word-unit.corrected-word .translation {
  color: #f87171;
}

.speech-review-card.perfect-card .correction-word-unit .main-word,
.speech-review-card.perfect-card .correction-word-unit .translation {
  color: #bbf7d0;
}

.correction-word-unit.active-word .main-word,
.correction-word-unit.active-word .translation,
.correction-word-unit.native-word.active-word .main-word,
.correction-word-unit.native-word.active-word .translation,
.correction-word-unit.corrected-word.active-word .main-word,
.correction-word-unit.corrected-word.active-word .translation {
  color: var(--accent) !important;
}

.correction-word-unit:hover .main-word,
.correction-word-unit:hover .translation {
  color: var(--accent);
}

.correction-word-unit .translation {
  display: block;
  font-size: clamp(0.8rem, 1.3vw, 1.05rem);
  letter-spacing: normal;
  line-height: 1.1;
  font-weight: 700;
  color: #fca5a5;
  margin-top: 0.25em;
  max-width: 220px;
  word-break: break-word;
}

.correction-word-unit.multi-word-token .main-word {
  white-space: nowrap;
}

/* Shared play / slow controls */

.message-audio-controls {
  display: inline-flex;
  align-items: center;
  gap: 14px;
  background: transparent;
  border: none;
  padding: 0;
  backdrop-filter: none;
}

.message-audio-panel {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  gap: 9px;
}

.bot-message-row .message-audio-controls {
  justify-self: end;
  align-self: start;
  padding-top: 0.35rem;
}

.message-play-button,
.correction-play-button {
  width: 76px;
  height: 76px;
  border-radius: 50%;
  border: 1px solid rgba(255, 255, 255, 0.24);
  background:
    radial-gradient(circle at 35% 25%, rgba(255, 255, 255, 0.22), transparent 28%),
    linear-gradient(145deg, rgba(255, 255, 255, 0.17), rgba(255, 255, 255, 0.06));
  color: white;
  cursor: pointer;
  box-shadow:
    0 0 0 1px rgba(255, 255, 255, 0.08),
    0 18px 55px rgba(0, 0, 0, 0.42),
    inset 0 0 28px rgba(255, 255, 255, 0.05);
  transition:
    transform 160ms ease,
    box-shadow 160ms ease,
    opacity 160ms ease;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0;
}

.message-play-button:hover,
.correction-play-button:hover {
  transform: translateY(-2px) scale(1.03);
  box-shadow:
    0 0 0 1px rgba(255, 255, 255, 0.14),
    0 24px 70px rgba(0, 0, 0, 0.52),
    0 0 34px rgba(96, 165, 250, 0.18),
    inset 0 0 28px rgba(255, 255, 255, 0.06);
}

.message-play-button.loading,
.correction-play-button.loading {
  opacity: 0.65;
  cursor: wait;
}

.message-play-button.playing,
.correction-play-button.playing {
  /* Intentionally no color change while playing. */
}

.playback-icon {
  width: 28px;
  height: 28px;
  fill: currentColor;
  display: block;
}

.message-slow-toggle,
.correction-slow-toggle {
  border: none;
  border-radius: 999px;
  padding: 8px 16px;
  background: rgba(255, 255, 255, 0.12);
  color: #d1d5db;
  font-weight: 900;
  cursor: pointer;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.message-slow-toggle.active,
.correction-slow-toggle.active {
  background: white;
  color: black;
}

/* Auth modal */

.auth-modal {
  position: fixed;
  inset: 0;
  z-index: 100;
  display: grid;
  place-items: center;
  padding: 22px;
}

.auth-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.72);
  backdrop-filter: blur(12px);
}

.auth-panel {
  position: relative;
  width: min(430px, 100%);
  height: min(680px, calc(100vh - 44px));
  background:
    radial-gradient(circle at top left, rgba(96, 165, 250, 0.16), transparent 34%),
    rgba(17, 24, 39, 0.96);
  border: 1px solid rgba(255, 255, 255, 0.16);
  border-radius: 28px;
  padding: 26px;
  box-shadow: 0 28px 90px rgba(0, 0, 0, 0.55);
  display: flex;
  flex-direction: column;
}

.auth-close-button {
  position: absolute;
  top: 14px;
  right: 14px;
  width: 34px;
  height: 34px;
  border: none;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.1);
  color: white;
  font-size: 1.3rem;
  cursor: pointer;
}

.auth-title {
  font-size: 1.35rem;
  font-weight: 950;
  letter-spacing: -0.03em;
}

.auth-subtitle {
  color: #9ca3af;
  margin-top: 6px;
  line-height: 1.4;
  font-size: 0.95rem;
}

.auth-tabs {
  display: inline-flex;
  margin-top: 20px;
  background: rgba(255, 255, 255, 0.08);
  border-radius: 999px;
  padding: 4px;

      return;

    function normalizeCorrectionCompare(text) {
  return String(text || "")
    .toLowerCase()
    .replace(/[’']/g, "")
    .replace(/[^\p{L}\p{M}\p{N}\s]/gu, " ")
    .replace(/\s+/g, " ")
    .trim();
}

function getNativeChatLanguageWordsFromParts(parts) {
  const nativeWords = [];

  for (const part of parts || []) {
    if (part && part.isChatLanguage === true) {
      const words = splitCorrectionTranslationWords(part.text);

      for (const word of words) {
        nativeWords.push(normalizeCorrectionCompare(word));
      }
    }
  }

  return nativeWords.filter(Boolean);
}

function buildCorrectionPairsFromCorrectedTextAndParts(correctedText, parts) {
  const correctedWords = splitCorrectionTranslationWords(correctedText);
  const nativeWords = getNativeChatLanguageWordsFromParts(parts);

  /*
    We consume native words in order. This avoids making every repeated word green
    merely because it appeared once in the user's chat-language speech.
  */
  let nativeIndex = 0;

  return correctedWords.map(word => {
    const normalizedWord = normalizeCorrectionCompare(word);
    const expectedNativeWord = nativeWords[nativeIndex];

    const wasNative =
      expectedNativeWord &&
      normalizedWord === expectedNativeWord;

    if (wasNative) {
      nativeIndex++;
    }

    return {
      correctedWord: word,
      originalWord: "",
      wasTranslated: !wasNative
    };
  });
}

}

function splitCorrectionTranslationWords(text) {
  return text.match(/[\p{L}\p{M}]+(?:['’][\p{L}\p{M}]+)?|[\p{N}]+/gu) || [];
}

function buildCorrectionPairsFromCorrectedText(correctedText) {
  return splitCorrectionTranslationWords(correctedText).map(word => ({
    correctedWord: word,
    originalWord: "",
    wasTranslated: false
  }));
}
    
function buildCorrectionWordPairs(parts) {
  const pairs = [];

  for (const part of parts) {
    if (!part) continue;

    if (part.isChatLanguage === false) {
      const wordTranslations = Array.isArray(part.wordTranslations)
        ? part.wordTranslations
        : [];

      if (wordTranslations.length) {
        for (const item of wordTranslations) {
          const original = String(item.original || "").trim();
          const translation = String(item.translation || "").trim();

          if (!translation) continue;

          /*
            Important:
            Do NOT split multi-word translations here.
            If one fluent-language word maps to multiple chat-language words,
            that whole translation should remain one token and be read together.
          */
          pairs.push({
            correctedWord: translation,
            originalWord: original,
            wasTranslated: true
          });
        }
      } else if (part.translation) {
        /*
          Fallback:
          If the backend did not provide wordTranslations,
          keep the full translated segment grouped.
        */
        pairs.push({
          correctedWord: String(part.translation || "").trim(),
          originalWord: String(part.text || "").trim(),
          wasTranslated: true
        });
      }
    } else {
      /*
        Native chat-language text can still be split into words,
        because those words were already spoken correctly.
      */
      const chatWords = splitCorrectionTranslationWords(part.text);

      for (const word of chatWords) {
        pairs.push({
          correctedWord: word,
          originalWord: "",
          wasTranslated: false
        });
      }
    }
  }

  return pairs;
}

function correctionPairsToText(pairs) {
  return pairs
    .map(pair => String(pair.correctedWord || "").trim())
    .filter(Boolean)
    .join(" ");
}

function createCorrectionTokensFromPairs(pairs, correctionId, correctionText) {
  return pairs
    .filter(pair => pair.correctedWord)
    .map((pair, index) => ({
      tokenId: `${correctionId}-tok-${index}`,
      word: pair.correctedWord,
      sentence: correctionText
    }));
}

function renderCorrectionLine(container, correctionId, pairs) {
  container.innerHTML = "";

  pairs.forEach((pair, index) => {
    if (!pair.correctedWord) return;

    const tokenId = `${correctionId}-tok-${index}`;

    const unit = document.createElement("span");
    unit.className = "correction-word-unit";
    unit.classList.add(pair.wasTranslated ? "corrected-word" : "native-word");

    if (String(pair.correctedWord).trim().includes(" ")) {
      unit.classList.add("multi-word-token");
    }

    unit.dataset.tokenId = tokenId;
    unit.dataset.word = pair.correctedWord;

    const mainWord = document.createElement("span");
    mainWord.className = "main-word";
    mainWord.textContent = pair.correctedWord;

    const translation = document.createElement("span");
    translation.className = "translation";
    translation.textContent = "";

    unit.appendChild(mainWord);
    unit.appendChild(translation);

    unit.addEventListener("click", () => {
      playCorrectionWord(correctionId, tokenId, unit).catch(error => {
        showSystemMessage(getReadableError(error));
      });
    });

    container.appendChild(unit);
    container.appendChild(document.createTextNode(" "));
  });
}

async function playCorrectionWord(correctionId, tokenId, unit) {
  const state = correctionState.get(correctionId);
  if (!state) return;

  stopAllSpeech();
  await unlockAudioContext();

  await getCorrectionWordClips(state);

  const clip = state.wordClipMap?.get(tokenId);

  if (!clip || !clip.audioBase64) {
    throw new Error("This correction word is not ready yet.");
  }

  const context = getAudioContext();

  let audioBuffer;

  if (clip.audioBuffer) {
    audioBuffer = clip.audioBuffer;
  } else {
    const arrayBuffer = base64ToArrayBuffer(clip.audioBase64);
    const rawBuffer = await context.decodeAudioData(arrayBuffer);
    audioBuffer = trimAudioBufferSilence(rawBuffer);
    clip.audioBuffer = audioBuffer;
  }

  unit.classList.add("active-word");

  const source = context.createBufferSource();
  source.buffer = audioBuffer;
  source.connect(context.destination);
  scheduledSources = [source];

  source.start(context.currentTime + 0.04);

  return new Promise(resolve => {
    source.addEventListener("ended", () => {
      scheduledSources = [];
      unit.classList.remove("active-word");
      resolve();
    });
  });
}

  function getReadableError(error) {
    if (!error) return "Unknown error";
    if (typeof error === "string") return error;
    if (error instanceof Error && error.message) return error.message;
    if (typeof error.message === "string") return error.message;
    if (typeof error.error === "string") return error.error;
    if (error.error && typeof error.error.message === "string") return error.error.message;
    if (typeof error.details === "string") return error.details;

    try {
      return JSON.stringify(error);
    } catch {
      return String(error);
    }
  }

  function throwApiError(data, fallback) {

}

async function getCorrectionWordClips(state) {

async function buildCorrectionWordSchedule(state) {
  const context = getAudioContext();
  const pause = getSlowPauseSeconds();

  await getCorrectionWordClips(state);

  const clipMap = state.wordClipMap || new Map();
  const schedule = [];
  let playhead = 0;

  for (const token of state.tokens || []) {
    const clip = clipMap.get(token.tokenId);

    if (!clip || !clip.audioBase64) {
      continue;
    }

    let audioBuffer;

    if (clip.audioBuffer) {
      audioBuffer = clip.audioBuffer;
    } else {
      const arrayBuffer = base64ToArrayBuffer(clip.audioBase64);
      const rawBuffer = await context.decodeAudioData(arrayBuffer);
      audioBuffer = trimAudioBufferSilence(rawBuffer);
      clip.audioBuffer = audioBuffer;
    }

    schedule.push({
      tokenId: token.tokenId,
      word: token.word,
      audioBuffer,
      duration: audioBuffer.duration,
      playStart: playhead,
      playEnd: playhead + audioBuffer.duration
    });

    playhead += audioBuffer.duration + pause;
  }

  return schedule;
}

async function playCorrection(correctionId) {
  const state = correctionState.get(correctionId);
  if (!state) return;

  const playButton = document.querySelector(`[data-correction-play="${correctionId}"]`);

  if (isSamePlayback(playButton, "correction", correctionId)) {
  stopAllSpeech();
  return;
}

  try {
    stopAllSpeech();
    setPlaybackButtonLoading(playButton);
    await unlockAudioContext();

    if (state.slow) {
      if (!state.wordSchedule) {
        state.wordSchedule = await buildCorrectionWordSchedule(state);
      }

      playCorrectionWordSchedule(state, playButton);
    } else {
      const speech = await getCorrectionFullSpeech(state);

      if (!speech.audioBuffer) {
        const arrayBuffer = base64ToArrayBuffer(speech.audioBase64);
        const context = getAudioContext();
        speech.audioBuffer = await context.decodeAudioData(arrayBuffer);
      }

      playFullAudioBuffer(speech.audioBuffer, playButton, "correction", correctionId);
    }
  } catch (error) {
    setPlaybackButtonStopped(playButton);
    showSystemMessage(getReadableError(error));
  }
}

function playCorrectionWordSchedule(state, button = null) {
  const context = getAudioContext();
  const playbackToken = currentPlaybackToken;
  const startAt = context.currentTime + 0.08;

  scheduledSources = [];

  if (button) {
    setPlaybackButtonPlaying(button, "correction", state.id);
  }

  const card = document.querySelector(`[data-correction-id="${state.id}"]`);
  const root = card || state.lineEl || document;

  const units = [...root.querySelectorAll(".correction-word-unit")];

  const unitsByTokenId = new Map(
    units
      .filter(unit => unit.dataset.tokenId)
      .map(unit => [unit.dataset.tokenId, unit])
  );

  units.forEach(unit => unit.classList.remove("active-word"));

  state.wordSchedule.forEach(item => {
    const source = context.createBufferSource();
    source.buffer = item.audioBuffer;
    source.connect(context.destination);

    source.start(startAt + item.playStart);
    scheduledSources.push(source);

    const unit = unitsByTokenId.get(item.tokenId);

    if (!unit) return;

    window.setTimeout(() => {
      if (playbackToken === currentPlaybackToken) {
        unit.classList.add("active-word");
      }
    }, Math.max(0, item.playStart * 1000 + 80));

    window.setTimeout(() => {
      if (playbackToken === currentPlaybackToken) {
        unit.classList.remove("active-word");
      }
    }, Math.max(0, item.playEnd * 1000 + 180));
  });

  const totalDuration =
    state.wordSchedule.length > 0
      ? state.wordSchedule[state.wordSchedule.length - 1].playEnd
      : 0;

  window.setTimeout(() => {
    if (playbackToken === currentPlaybackToken) {
      scheduledSources = [];

      units.forEach(unit => {
        unit.classList.remove("active-word");
      });

      if (button) {
        setPlaybackButtonStopped(button);
      }
    }
  }, totalDuration * 1000 + 1200);
}

  async function parseJsonResponse(response, label) {

    try {

    } catch {
      throw new Error(`${label} returned non-JSON response: ${rawText}`);
    }

    if (!response.ok) {
      throwApiError(data, `${label} failed with status ${response.status}`);
    }

    return data;
  }

  function base64ToArrayBuffer(base64) {
    const binary = atob(base64);
    const bytes = new Uint8Array(binary.length);

    }

  async function handleSpeechTranscript(transcript) {
  if (!transcript.trim()) return;

  const isCorrectionRetry = correctionRetryMode;
correctionRetryMode = false;

if (!isCorrectionRetry) {
  activeCorrectionUserMessageId = addUserMessage(transcript);

  /*
    The bot receives the original message immediately.
    Re-recording is only for practice.
  */
  pendingBackgroundBot = await prepareBotResponseInBackground(transcript);
} else {
  /*
    Retry should replace the original speech bubble, not create a new one.
  */
  if (activeCorrectionUserMessageId) {
    updateUserMessageText(activeCorrectionUserMessageId, transcript);
  }
}

  let analysis;

  try {
    analysis = await analyzeUserMessageLanguageParts(transcript);
  } catch {
    await revealPreparedBotResponse(pendingBackgroundBot);
    pendingBackgroundBot = null;
    return;
  }

  const parts = analysis.parts || [];
  const correctedText = analysis.correctedText || transcript;

  if (!hasForeignLanguageParts(parts)) {
    const prepared = pendingBackgroundBot;

    activeSpeechCorrection = null;
    pendingBackgroundBot = null;
    activeCorrectionUserMessageId = null;

    await showPerfectCorrectionThenRevealBot({
      transcript,
      parts,
      correctedText,
      prepared
    });

    return;
  }

  const suggestion = correctedText;

  activeSpeechCorrection = {
    transcript,
    parts,
    suggestion,
    correctedText,
    prepared: pendingBackgroundBot
  };

  const correctionCard = addSpeechReviewCard({
    transcript,
    suggestion,
    parts,
    correctedText,
    isPerfect: false,
    onRetry: () => {
      setSpeechStatus("Recording");
    },
    onContinue: async () => {
      const prepared = activeSpeechCorrection?.prepared || pendingBackgroundBot;

      activeSpeechCorrection = null;
      pendingBackgroundBot = null;
      activeCorrectionUserMessageId = null;

      if (prepared) {
        await revealPreparedBotResponse(prepared);
      }
    }
  });

  const correctionId = correctionCard.dataset.correctionId;

  if (correctionId) {
    playCorrection(correctionId).catch(() => {});
  }
}

  async function analyzeAndRenderUserMessageLanguage(userMessageId) {
  const state = userMessageState.get(userMessageId);
  if (!state) return;

  const analysis = await analyzeUserMessageLanguageParts(state.text);
  const parts = analysis.parts || [];

  if (!parts.length) return;

  function renderAnalyzedUserMessage(container, parts) {
    container.innerHTML = "";
    container.classList.add("user-annotated");

    for (const part of parts) {
      if (!part || typeof part.text !== "string") continue;

      if (part.isChatLanguage === false && part.translation) {
        const foreign = document.createElement("span");
        foreign.className = "user-foreign-part";

        const original = document.createElement("span");
        original.className = "user-foreign-original";
        original.textContent = part.text;

        const translation = document.createElement("span");
        translation.className = "user-foreign-translation";

        foreign.appendChild(original);

  function addBotMessage(text, options = {}) {
    const id = `bot-${++messageCounter}`;

    const card = document.createElement("div");
    card.className = "message-card bot-card";
    card.dataset.messageId = id;

    const wordsEl = document.createElement("div");

    messageState.set(id, {

      text,

      speakableTokens: [],

      fullSpeech: options.fullSpeech || null,
      fullSpeechPromise: options.fullSpeechPromise || null,

      wordClips: null,
      wordClipMap: null,
      wordClipsPromise: null,
      wordSchedule: null,

      loadingFullSpeech: false,
      loadingWordSpeech: false
    });

    const speakableTokens = renderWordsIntoElement(text, wordsEl, id);
    const state = messageState.get(id);
    if (state) state.speakableTokens = speakableTokens;

    const controls = createMessageAudioControls(id);

    const row = document.createElement("div");
row.className = "bot-message-row";

row.appendChild(wordsEl);
row.appendChild(controls);

card.appendChild(row);

messageHistory.appendChild(card);

  function renderWordsIntoElement(text, container, messageId) {
    container.innerHTML = "";

    const parts = splitTextIntoParts(text);
    const speakableTokens = [];
    let tokenIndex = 0;

    for (const part of parts) {
      if (/^\s+$/.test(part)) {
        container.appendChild(document.createTextNode(" "));
        continue;
      }

      if (isClickableWord(part)) {
        const tokenId = `${messageId}-tok-${tokenIndex}`;

        const unit = document.createElement("span");
        unit.className = "word-unit";
        unit.dataset.word = part;
        unit.dataset.tokenId = tokenId;

        const mainWord = document.createElement("span");
        mainWord.className = "main-word";
        mainWord.textContent = part;

        const translation = document.createElement("span");
        translation.className = "translation";

        unit.appendChild(mainWord);
        unit.appendChild(translation);

        unit.addEventListener("click", () => {
          handleBotWordClick(unit, part, messageId, text);
        });

        container.appendChild(unit);

        speakableTokens.push({
          tokenId,
          word: part,
          sentence: text
        });

        tokenIndex++;
      } else {
        const punct = document.createElement("span");
        punct.className = "punct";
        punct.textContent = part;
        container.appendChild(punct);
      }
    }

    return speakableTokens;
  }

  async function fetchFullSpeech(text) {
    const response = await fetch(`${SUPABASE_URL}/functions/v1/chat`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": SUPABASE_ANON_KEY,

      },

  async function fetchIndividualWordSpeechForTokens(tokens) {
    const response = await fetch(`${SUPABASE_URL}/functions/v1/chat`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": SUPABASE_ANON_KEY,
        "Authorization": `Bearer ${SUPABASE_ANON_KEY}`
      },
      body: JSON.stringify({
        action: "speak-words",
        items: tokens,

      })
    });

    const data = await parseJsonResponse(response, "Word speech");
    return data.clips || [];

  async function getFullSpeechForMessage(state) {
    if (state.fullSpeech) return state.fullSpeech;

    if (state.fullSpeechPromise) {
      state.fullSpeech = await state.fullSpeechPromise;
      return state.fullSpeech;
    }

    state.fullSpeechPromise = fetchFullSpeech(state.text);
    state.fullSpeech = await state.fullSpeechPromise;
    return state.fullSpeech;
  }

  async function preloadSlowSpeech(state) {
    if (state.wordClips || state.wordClipsPromise) return;

    const tokens = state.speakableTokens || [];
    if (!tokens.length) return;

    state.wordClipsPromise = fetchIndividualWordSpeechForTokens(tokens)
      .then(clips => {
        state.wordClips = clips;
        state.wordClipMap = new Map(
          clips
            .filter(clip => clip && clip.tokenId)
            .map(clip => [clip.tokenId, clip])
        );
        return clips;
      })
      .catch(error => {
        state.wordClipsPromise = null;
        throw error;
      });
  }

  async function getWordClipsForMessage(state) {
    if (state.wordClips) return state.wordClips;

    if (state.wordClipsPromise) {
      state.wordClips = await state.wordClipsPromise;
      state.wordClipMap = new Map(
        state.wordClips
          .filter(clip => clip && clip.tokenId)
          .map(clip => [clip.tokenId, clip])
      );
      return state.wordClips;
    }

    const tokens = state.speakableTokens || [];
    if (!tokens.length) {
      throw new Error("No speakable words were found for this message.");
    }

    state.wordClipsPromise = fetchIndividualWordSpeechForTokens(tokens);
    state.wordClips = await state.wordClipsPromise;
    state.wordClipMap = new Map(
      state.wordClips
        .filter(clip => clip && clip.tokenId)
        .map(clip => [clip.tokenId, clip])
    );

    return state.wordClips;
  }

  function playFullAudioBuffer(audioBuffer, button = null, type = null, id = null) {
  const context = getAudioContext();
  const playbackToken = currentPlaybackToken;
  const source = context.createBufferSource();

  source.buffer = audioBuffer;
  source.connect(context.destination);

  scheduledSources = [source];

  source.start(context.currentTime + 0.04);

  if (button && type && id) {
    setPlaybackButtonPlaying(button, type, id);
  }

  source.addEventListener("ended", () => {
    if (playbackToken === currentPlaybackToken) {
      scheduledSources = [];
      if (button) {
        setPlaybackButtonStopped(button);
      }
    }
  });
}

  async function playConversationalMessage(state, button = null) {
  await unlockAudioContext();

  clearActiveWords(state.wordsEl);

  const speech = await getFullSpeechForMessage(state);

  if (!speech.audioBuffer) {
    const arrayBuffer = base64ToArrayBuffer(speech.audioBase64);
    const context = getAudioContext();
    speech.audioBuffer = await context.decodeAudioData(arrayBuffer);
  }

  playFullAudioBuffer(speech.audioBuffer, button, "message", state.id);
}

  function trimAudioBufferSilence(audioBuffer, threshold = 0.012, paddingSeconds = 0.015) {
    const sampleRate = audioBuffer.sampleRate;
    const numberOfChannels = audioBuffer.numberOfChannels;
    const length = audioBuffer.length;

    let firstSound = 0;
    let lastSound = length - 1;

    function sampleIsSound(index) {
      for (let channel = 0; channel < numberOfChannels; channel++) {
        const data = audioBuffer.getChannelData(channel);
        if (Math.abs(data[index]) > threshold) return true;
      }
      return false;
    }

    while (firstSound < length && !sampleIsSound(firstSound)) firstSound++;
    while (lastSound > firstSound && !sampleIsSound(lastSound)) lastSound--;

    const paddingSamples = Math.floor(paddingSeconds * sampleRate);
    const start = Math.max(0, firstSound - paddingSamples);
    const end = Math.min(length, lastSound + paddingSamples);

    const trimmedLength = Math.max(1, end - start);
    const context = getAudioContext();

    const trimmedBuffer = context.createBuffer(
      numberOfChannels,
      trimmedLength,
      sampleRate
    );

    for (let channel = 0; channel < numberOfChannels; channel++) {
      const oldData = audioBuffer.getChannelData(channel);
      const newData = trimmedBuffer.getChannelData(channel);

      for (let i = 0; i < trimmedLength; i++) {
        newData[i] = oldData[start + i] || 0;
      }
    }

    return trimmedBuffer;
  }

  function getSlowPauseSeconds() {
    return 0.18;
  }

  async function buildIndividualWordScheduleForMessage(state) {
    const context = getAudioContext();
    const pause = getSlowPauseSeconds();

    await getWordClipsForMessage(state);

    const clipMap = state.wordClipMap || new Map();
    const schedule = [];
    let playhead = 0;

    for (const token of state.speakableTokens || []) {
      const clip = clipMap.get(token.tokenId);
      if (!clip || !clip.audioBase64) continue;

      let audioBuffer;

      if (clip.audioBuffer) {
        audioBuffer = clip.audioBuffer;
      } else {
        const arrayBuffer = base64ToArrayBuffer(clip.audioBase64);
        const rawBuffer = await context.decodeAudioData(arrayBuffer);
        audioBuffer = trimAudioBufferSilence(rawBuffer);
        clip.audioBuffer = audioBuffer;
      }

      schedule.push({
        tokenId: token.tokenId,
        word: token.word,
        audioBuffer,
        duration: audioBuffer.duration,
        playStart: playhead,
        playEnd: playhead + audioBuffer.duration
      });

      playhead += audioBuffer.duration + pause;
    }

    return schedule;
  }

  async function playSlowMessage(state, button = null) {
  await unlockAudioContext();

  if (!state.wordSchedule) {
    state.wordSchedule = await buildIndividualWordScheduleForMessage(state);
  }

  assignScheduleToVisibleWords(state.wordsEl, state.wordSchedule);
  playIndividualWordAudio(state.wordSchedule, state.wordsEl, button, "message", state.id);
}

  function clearActiveWords(container) {
    container.querySelectorAll(".word-unit").forEach(unit => {
      unit.classList.remove("active-word");
    });
  }

  function assignScheduleToVisibleWords(container, schedule) {
    const scheduleMap = new Map(
      schedule
        .filter(item => item && item.tokenId)
        .map(item => [item.tokenId, item])
    );

    const units = [...container.querySelectorAll(".word-unit")];

    units.forEach(unit => {
      const tokenId = unit.dataset.tokenId;
      const timing = scheduleMap.get(tokenId);

      if (timing) {
        unit.dataset.playStart = String(timing.playStart);
        unit.dataset.playEnd = String(timing.playEnd);
      } else {
        unit.dataset.playStart = "";
        unit.dataset.playEnd = "";
      }
    });
  }

  function playIndividualWordAudio(wordSchedule, wordsEl, button = null, type = null, id = null) {
  const context = getAudioContext();
  const playbackToken = currentPlaybackToken;
  const startAt = context.currentTime + 0.08;

  scheduledSources = [];

  if (button && type && id) {
    setPlaybackButtonPlaying(button, type, id);
  }

  wordSchedule.forEach(item => {
    const source = context.createBufferSource();
    source.buffer = item.audioBuffer;
    source.connect(context.destination);

    source.start(startAt + item.playStart);

    scheduledSources.push(source);
  });

  const visualStart = performance.now() + 80;

  function syncFrame() {
    if (playbackToken !== currentPlaybackToken) return;

    const elapsed = (performance.now() - visualStart) / 1000;
    const units = [...wordsEl.querySelectorAll(".word-unit")];

    for (const unit of units) {
      const start = Number(unit.dataset.playStart);
      const end = Number(unit.dataset.playEnd);

      if (!Number.isFinite(start) || !Number.isFinite(end)) {
        unit.classList.remove("active-word");
        continue;
      }

      if (elapsed >= start && elapsed <= end + 0.04) {
        unit.classList.add("active-word");
      } else {
        unit.classList.remove("active-word");
      }
    }

    const lastEnd =
      wordSchedule.length > 0
        ? wordSchedule[wordSchedule.length - 1].playEnd
        : 0;

    if (elapsed <= lastEnd + 0.5) {
      requestAnimationFrame(syncFrame);
    } else {
      clearActiveWords(wordsEl);
      if (button) {
        setPlaybackButtonStopped(button);
      }
    }
  }

  requestAnimationFrame(syncFrame);

  const totalDuration =
    wordSchedule.length > 0
      ? wordSchedule[wordSchedule.length - 1].playEnd
      : 0;

  setTimeout(() => {
    if (playbackToken === currentPlaybackToken) {
      scheduledSources = [];
      clearActiveWords(wordsEl);

      if (button) {
        setPlaybackButtonStopped(button);
      }
    }
  }, totalDuration * 1000 + 1000);
}

  async function playMessage(messageId) {
  const state = messageState.get(messageId);
  if (!state) return;

  const button = document.querySelector(`[data-message-play="${messageId}"]`);

  if (button) {
    await handleMessagePlayButton(messageId, button);
    return;
  }

  try {
    stopAllSpeech();

    if (state.mode === "slow") {
      await playSlowMessage(state);
    } else {
      await playConversationalMessage(state);
    }
  } catch (error) {
    showSystemMessage(getReadableError(error));
  }
}

  function handleBotWordClick(unit, word, messageId, fallbackSentence) {
    const existingTimer = wordClickTimers.get(unit);

    if (existingTimer) {
      clearTimeout(existingTimer);
      wordClickTimers.delete(unit);

      const state = messageState.get(messageId);
      handleBotWordDoubleClick(unit, word, messageId, state?.text || fallbackSentence);
      return;
    }

    const timer = setTimeout(() => {
      wordClickTimers.delete(unit);
      handleBotWordSingleClick(unit, word, messageId);
    }, WORD_DOUBLE_CLICK_DELAY);

    wordClickTimers.set(unit, timer);
  }

  async function handleBotWordSingleClick(unit, word, messageId) {
    try {
      unit.classList.add("active-word");

      await playPreloadedWord(unit, word, messageId);

      setTimeout(() => {
        unit.classList.remove("active-word");
      }, 250);
    } catch (error) {
      unit.classList.remove("active-word");
      showSystemMessage(getReadableError(error));
    }
  }

  async function handleBotWordDoubleClick(unit, word, messageId, sentence) {
    try {
      unit.classList.add("active-word");

      await Promise.allSettled([
        playPreloadedWord(unit, word, messageId),
        translateWordUnit(unit, word, sentence)
      ]);

      unit.classList.remove("active-word");
    } catch (error) {
      unit.classList.remove("active-word");
      showSystemMessage(getReadableError(error));
    }
  }

  async function playPreloadedWord(unit, word, messageId) {
    stopAllSpeech();
    await unlockAudioContext();

    const state = messageState.get(messageId);
    if (!state) throw new Error("Could not find this message.");

    const tokenId = unit.dataset.tokenId;
    if (!tokenId) throw new Error("Could not find this word token.");

    await getWordClipsForMessage(state);

    const clip = state.wordClipMap?.get(tokenId);
    if (!clip || !clip.audioBase64) {
      throw new Error("This word recording is not ready yet.");
    }

    const context = getAudioContext();

    let audioBuffer;

    if (clip.audioBuffer) {
      audioBuffer = clip.audioBuffer;
    } else {
      const arrayBuffer = base64ToArrayBuffer(clip.audioBase64);
      const rawBuffer = await context.decodeAudioData(arrayBuffer);
      audioBuffer = trimAudioBufferSilence(rawBuffer);
      clip.audioBuffer = audioBuffer;
    }

    const source = context.createBufferSource();
    source.buffer = audioBuffer;
    source.connect(context.destination);

    scheduledSources = [source];

    source.start(context.currentTime + 0.04);

    return new Promise(resolve => {
      source.addEventListener("ended", () => {
        scheduledSources = [];
        resolve();
      });
    });
  }

  async function translateWordUnit(unit, word, sentence) {
    const cleanWord = word.trim();
    if (!cleanWord) return;

    const translationEl = unit.querySelector(".translation");
    const chatLanguage = languageSelect.value;
    const fluentLanguage = fluentLanguageSelect.value;

    const cacheKey = `${cleanWord}|${chatLanguage}|${fluentLanguage}|${sentence}`;

    unit.classList.add("translating");

    if (translationEl && !translationEl.textContent) {
      translationEl.textContent = "…";
    }

    if (translationCache.has(cacheKey)) {
      if (translationEl) translationEl.textContent = translationCache.get(cacheKey);

      unit.classList.remove("translating");
      unit.classList.add("translated");
      return;
    }

    try {
      const response = await fetch(`${SUPABASE_URL}/functions/v1/chat`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "apikey": SUPABASE_ANON_KEY,
          "Authorization": `Bearer ${SUPABASE_ANON_KEY}`
        },
        body: JSON.stringify({
          action: "translate-word",
          word: cleanWord,
          sentence,
          chatLanguage,
          fluentLanguage
        })
      });

      const data = await parseJsonResponse(response, "Translation");

      const translated = data.translation || "";
      translationCache.set(cacheKey, translated);

      if (translationEl) translationEl.textContent = translated;

      unit.classList.remove("translating");
      unit.classList.add("translated");
    } catch (error) {
      if (translationEl) translationEl.textContent = "failed";

      unit.classList.remove("translating");
      unit.classList.add("translated");
      showSystemMessage(getReadableError(error));
    }
  }

  async function sendToBot(userText) {
    messages.push({
      role: "user",
      content: userText
    });

    addUserMessage(userText);

    const thinkingCard = addThinkingMessage();

    const response = await fetch(`${SUPABASE_URL}/functions/v1/chat`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": SUPABASE_ANON_KEY,
        "Authorization": `Bearer ${SUPABASE_ANON_KEY}`
      },
      body: JSON.stringify({
  messages,
  language: languageSelect.value,
  userGenderInstruction: getUserGenderInstruction()
})
    });

    const data = await parseJsonResponse(response, "Chat");

    messages.push({
      role: "assistant",
      content: data.reply
    });

    const fullSpeechPromise = fetchFullSpeech(data.reply);
    const fullSpeech = await fullSpeechPromise;

    thinkingCard.remove();

    const botMessageId = addBotMessage(data.reply, {
      fullSpeech,
      fullSpeechPromise
    });

    const state = messageState.get(botMessageId);

    if (state) {
      state.wordClipsPromise = fetchIndividualWordSpeechForTokens(state.speakableTokens)
        .then(clips => {
          state.wordClips = clips;
          state.wordClipMap = new Map(
            clips
              .filter(clip => clip && clip.tokenId)
              .map(clip => [clip.tokenId, clip])
          );
          return clips;
        })
        .catch(() => null);

      playConversationalMessage(state).catch(error => {
        showSystemMessage(getReadableError(error));
      });
    }
  }

  async function handleSend() {
  await unlockAudio();

  const userText = input.value.trim();
  if (!userText) return;

  input.value = "";
  sendButton.disabled = true;

  try {
    await sendToBot(userText);
  } catch (error) {
    showSystemMessage(getReadableError(error));
  } finally {
    sendButton.disabled = false;
    input.focus();
  }
}

  function getBestRecordingMimeType() {
  const candidates = [
    "audio/webm;codecs=opus",
    "audio/webm",
    "audio/mp4;codecs=mp4a.40.2",
    "audio/mp4",
    "audio/ogg;codecs=opus",
    "audio/ogg"
  ];

  if (!window.MediaRecorder || !MediaRecorder.isTypeSupported) return "";

  for (const type of candidates) {
    if (MediaRecorder.isTypeSupported(type)) return type;
  }

  return "";
}

function getAudioFileExtension(mimeType) {
  const type = (mimeType || "").toLowerCase();

  if (type.includes("webm")) return "webm";
  if (type.includes("mp4")) return "mp4";
  if (type.includes("mpeg")) return "mp3";
  if (type.includes("mp3")) return "mp3";
  if (type.includes("wav")) return "wav";
  if (type.includes("ogg")) return "ogg";

  return "webm";
}

function getAudioFileName(mimeType) {
  return `recording.${getAudioFileExtension(mimeType)}`;
}

async function transcribeAudioBlob(audioBlob, mimeType) {
  if (!audioBlob || audioBlob.size < 1000) {
    throw new Error("The recording was too short or empty.");
  }

  const finalMimeType = mimeType || audioBlob.type || "audio/webm";
  const fileName = getAudioFileName(finalMimeType);

  const audioFile = new File([audioBlob], fileName, {
    type: finalMimeType
  });

  const formData = new FormData();
  formData.append("audio", audioFile);
  formData.append("chatLanguage", languageSelect.value);
  formData.append("fluentLanguage", fluentLanguageSelect.value);
  formData.append(
    "transcriptionPrompt",
    `The speaker may switch between languages, especially ${languageSelect.value} and ${fluentLanguageSelect.value}. Transcribe exactly what is spoken. Do not translate. Preserve mixed-language speech.`
  );

  const response = await fetch(`${SUPABASE_URL}/functions/v1/transcribe-audio`, {
    method: "POST",
    headers: {
      "apikey": SUPABASE_ANON_KEY,
      "Authorization": `Bearer ${SUPABASE_ANON_KEY}`
    },
    body: formData
  });

  const rawText = await response.text();

  let data;
  try {
    data = JSON.parse(rawText);
  } catch {
    throw new Error(`Transcription returned non-JSON response: ${rawText}`);
  }

  if (!response.ok) {
    throw new Error(
      data.error ||
      data.message ||
      data?.openai?.error?.message ||
      `Transcription failed with status ${response.status}`
    );
  }

  const transcript =
    data.text ||
    data.transcript ||
    data.transcription ||
    "";

  if (!transcript.trim()) {
    throw new Error("No transcript was returned.");
  }

  return transcript.trim();
}

async function startRecording() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    showSystemMessage("Audio recording is not supported in this browser.");
    return;
  }

  if (!window.MediaRecorder) {
    showSystemMessage("MediaRecorder is not supported in this browser.");
    return;
  }

  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

  recordedChunks = [];

  const mimeType = getBestRecordingMimeType();
  const options = mimeType ? { mimeType } : {};

  try {
    mediaRecorder = new MediaRecorder(stream, options);
  } catch {
    mediaRecorder = new MediaRecorder(stream);
  }

  mediaRecorder.addEventListener("dataavailable", event => {
    if (event.data && event.data.size > 0) {
      recordedChunks.push(event.data);
    }
  });

  mediaRecorder.addEventListener("start", () => {
    isRecording = true;

    speechRecordButton.classList.add("recording");
    speechRecordButton.classList.remove("processing");
    speechRecordButton.innerHTML = `<span class="mic-symbol">■</span>`;

    setSpeechStatus("Recording");
  });

  mediaRecorder.addEventListener("stop", async () => {
  speechRecordButton.disabled = true;
  speechRecordButton.classList.remove("recording");
  speechRecordButton.classList.add("processing");
  speechRecordButton.innerHTML = `<span class="mic-symbol">…</span>`;
  setSpeechStatus("Transcribing");

  try {
    const actualMimeType =
      mediaRecorder.mimeType ||
      mimeType ||
      recordedChunks[0]?.type ||
      "audio/webm";

    const audioBlob = new Blob(recordedChunks, {
      type: actualMimeType
    });

    const transcript = await transcribeAudioBlob(audioBlob, actualMimeType);

    if (inputMode === "speech") {
      setSpeechStatus("Checking language");

      await handleSpeechTranscript(transcript);

      setSpeechStatus("Tap to speak");
    } else {
      input.value = transcript;
      input.focus();
      setSpeechStatus("Tap to speak");
    }
  } catch (error) {
    showSystemMessage(getReadableError(error));
    setSpeechStatus("Tap to speak");
  } finally {
    stream.getTracks().forEach(track => track.stop());

    isRecording = false;
    resetSpeechButton();
  }
});

  mediaRecorder.start();
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state === "recording") {
    mediaRecorder.stop();
  }
}

async function handleSpeechRecordButtonClick(event) {
  event.preventDefault();
  event.stopPropagation();

  try {
    await unlockAudio();

    if (isRecording) {
      stopRecording();
      return;
    }

    /*
      If a correction is active and the user taps the main mic,
      behave exactly like Re-record:
      hide the correction box, start recording, and replace the original bubble.
    */
    if (activeSpeechCorrection) {
      await startCorrectionRetryRecording();
      return;
    }

    await startRecording();
  } catch (error) {
    showSystemMessage(getReadableError(error));

    isRecording = false;
    resetSpeechButton();
    setSpeechStatus("Tap to speak");
  }
}

  function attachUiHandlers() {
  if (form) {
    form.addEventListener("submit", event => {
      event.preventDefault();
      event.stopPropagation();
      return false;
    });

  if (sendButton) {
    sendButton.addEventListener("click", event => {
      event.preventDefault();
      event.stopPropagation();

      handleSend().catch(error => {
        showSystemMessage(getReadableError(error));
      });
    });
  }

  if (input) {
    input.addEventListener("keydown", event => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();

        handleSend().catch(error => {
          showSystemMessage(getReadableError(error));
        });
      }
    });
  }

  if (writingModeButton) {
    writingModeButton.addEventListener("click", () => {
      setInputMode("writing");
    });
  }

  if (speechModeButton) {
    speechModeButton.addEventListener("click", () => {
      setInputMode("speech");

  if (speechRecordButton) {
    speechRecordButton.addEventListener("click", handleSpeechRecordButtonClick);
