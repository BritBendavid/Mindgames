<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Language Chat</title>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #030303;
      --panel: rgba(255, 255, 255, 0.07);
      --text: #f8fafc;
      --muted: #9ca3af;
      --accent: #60a5fa;
      --translated: #facc15;
      --danger: #ef4444;
    }

    body {
  margin: 0;
  min-height: 100vh;
  background:
    radial-gradient(circle at top left, rgba(37, 99, 235, 0.18), transparent 30%),
    radial-gradient(circle at bottom right, rgba(250, 204, 21, 0.08), transparent 25%),
    var(--bg);
  color: var(--text);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

  /* Important: allow normal page scrolling */
  overflow-y: auto;
  overflow-x: hidden;
}

.app {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 24px;
  gap: 18px;
}

/* Header stays accessible at the top */
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 18px;
  flex-wrap: wrap;
  z-index: 5;
}

/* Chat history no longer traps scrolling */
.message-history {
  width: 100%;
  flex: 1;
  padding: 22px 4vw 130px;
  display: flex;
  flex-direction: column;
  gap: 28px;
  scroll-behavior: smooth;
}

/* Composer stays visible at the bottom */
.composer-shell {
  position: sticky;
  bottom: 0;
  display: flex;
  justify-content: center;
  z-index: 10;
  padding: 12px 0 4px;
  background:
    linear-gradient(
      to top,
      rgba(3, 3, 3, 0.98),
      rgba(3, 3, 3, 0.82),
      rgba(3, 3, 3, 0)
    );
}

    .brand h1 {
      margin: 0 0 4px;
      font-size: 1.05rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 800;
    }

    .brand p {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .control-card {
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 9px;
      backdrop-filter: blur(16px);
    }

    .control-card label {
      color: var(--muted);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    select {
      appearance: none;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text);
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      padding-right: 18px;
    }

    select option {
      background: #111827;
      color: white;
    }

    .select-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .select-wrap::after {
      content: "⌄";
      position: absolute;
      right: 0;
      color: var(--muted);
      pointer-events: none;
      transform: translateY(-2px);
    }

    .message-card {
      width: min(1100px, 100%);
      margin: 0 auto;
    }

    .user-card {
      display: flex;
      justify-content: flex-end;
    }

    .user-bubble {
      max-width: 760px;
      background: rgba(255, 255, 255, 0.12);
      color: #e5e7eb;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 22px;
      padding: 16px 20px;
      font-size: 1.05rem;
      line-height: 1.45;
    }

    .bot-card {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 14px;
    }

    .bot-words {
      color: white;
      font-size: clamp(2rem, 5vw, 4.8rem);
      line-height: 1.22;
      font-weight: 800;
      letter-spacing: -0.055em;
    }

    .word-unit {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      vertical-align: top;
      margin: 0 0.13em 0.25em;
      cursor: pointer;
      border-radius: 12px;
      transition: color 160ms ease;
    }

    .main-word {
      display: inline-block;
    }

    .word-unit:hover .main-word {
      color: var(--accent);
    }

    .word-unit.active-word .main-word {
      color: var(--accent);
    }

    .word-unit.translated .main-word {
      color: var(--translated);
    }

    .translation {
      display: none;
      font-size: clamp(0.8rem, 1.3vw, 1.05rem);
      letter-spacing: normal;
      line-height: 1.1;
      font-weight: 600;
      color: var(--translated);
      margin-top: 0.25em;
      max-width: 180px;
      word-break: break-word;
    }

    .word-unit.translated .translation,
    .word-unit.translating .translation {
      display: block;
    }

    .message-audio-controls {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 999px;
      padding: 8px;
      backdrop-filter: blur(14px);
    }

    .mode-toggle {
      display: inline-flex;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      padding: 3px;
    }

    .mode-option {
      border: none;
      border-radius: 999px;
      padding: 8px 13px;
      background: transparent;
      color: #9ca3af;
      font-weight: 800;
      cursor: pointer;
    }

    .mode-option.active {
      background: white;
      color: black;
    }

    .message-play-button {
      border: none;
      border-radius: 999px;
      padding: 8px 14px;
      background: rgba(255, 255, 255, 0.14);
      color: white;
      font-weight: 800;
      cursor: pointer;
    }

    .message-play-button:hover {
      background: rgba(255, 255, 255, 0.22);
    }

    .thinking-card {
      color: #9ca3af;
      font-size: 1.1rem;
      font-weight: 600;
      text-align: center;
      padding: 20px;
    }

    form {
      width: min(960px, 100%);
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 999px;
      padding: 10px;
      backdrop-filter: blur(16px);
    }

    #userInput {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      color: white;
      font-size: 1.05rem;
      padding: 12px 10px;
      min-width: 0;
    }

    #userInput::placeholder {
      color: #6b7280;
    }

    .icon-button,
    .send-button {
      border: none;
      border-radius: 999px;
      height: 46px;
      cursor: pointer;
      font-weight: 800;
      transition: transform 160ms ease, background 160ms ease, opacity 160ms ease;
    }

    .icon-button {
      width: 46px;
      min-width: 46px;
      background: rgba(255, 255, 255, 0.12);
      color: white;
      font-size: 1.1rem;
    }

    .send-button {
      padding: 0 24px;
      background: white;
      color: black;
      font-size: 0.95rem;
    }

    .icon-button:hover,
    .send-button:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.2);
    }

    .send-button:hover {
      background: #e5e7eb;
    }

    .send-button:disabled,
    .icon-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .recording {
      background: var(--danger);
      animation: pulse 1s infinite;
    }

    .system-message {
      position: fixed;
      left: 50%;
      bottom: 98px;
      transform: translateX(-50%);
      background: rgba(17, 24, 39, 0.94);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 0.9rem;
      z-index: 20;
      box-shadow: 0 16px 50px rgba(0, 0, 0, 0.35);
      max-width: min(700px, 90vw);
      text-align: center;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.42); }
      70% { box-shadow: 0 0 0 12px rgba(239, 68, 68, 0); }
      100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
    }

    @media (max-width: 760px) {
      .app {
        padding: 16px;
      }

      .top-bar {
        flex-direction: column;
      }

      .controls {
        width: 100%;
        justify-content: flex-start;
      }

      .control-card {
        width: 100%;
        justify-content: space-between;
      }

      .bot-words {
        font-size: clamp(2rem, 11vw, 4rem);
      }

      .message-audio-controls {
        flex-wrap: wrap;
        border-radius: 20px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <header class="top-bar">
      <div class="brand">
        <h1>Language Chat</h1>
        <p>Read, listen, click words, and learn in context.</p>
      </div>

      <div class="controls">
        <div class="control-card">
          <label for="languageSelect">Chat</label>
          <div class="select-wrap">
            <select id="languageSelect">
              <option value="English" selected>🇺🇸 English</option>
              <option value="Hebrew">🇮🇱 Hebrew</option>
              <option value="Spanish">🇪🇸 Spanish</option>
              <option value="French">🇫🇷 French</option>
              <option value="German">🇩🇪 German</option>
              <option value="Arabic">🇸🇦 Arabic</option>
              <option value="Russian">🇷🇺 Russian</option>
              <option value="Italian">🇮🇹 Italian</option>
              <option value="Portuguese">🇵🇹 Portuguese</option>
              <option value="Chinese">🇨🇳 Chinese</option>
              <option value="Japanese">🇯🇵 Japanese</option>
              <option value="Korean">🇰🇷 Korean</option>
            </select>
          </div>
        </div>

        <div class="control-card">
          <label for="fluentLanguageSelect">Fluent</label>
          <div class="select-wrap">
            <select id="fluentLanguageSelect">
              <option value="English" selected>🇺🇸 English</option>
              <option value="Hebrew">🇮🇱 Hebrew</option>
              <option value="Spanish">🇪🇸 Spanish</option>
              <option value="French">🇫🇷 French</option>
              <option value="German">🇩🇪 German</option>
              <option value="Arabic">🇸🇦 Arabic</option>
              <option value="Russian">🇷🇺 Russian</option>
              <option value="Italian">🇮🇹 Italian</option>
              <option value="Portuguese">🇵🇹 Portuguese</option>
              <option value="Chinese">🇨🇳 Chinese</option>
              <option value="Japanese">🇯🇵 Japanese</option>
              <option value="Korean">🇰🇷 Korean</option>
            </select>
          </div>
        </div>
      </div>
    </header>

    <main id="messageHistory" class="message-history"></main>

    <div class="composer-shell">
      <form id="chatForm">
        <button id="transcribeButton" class="icon-button" type="button" title="Record speech">
          🎤
        </button>

        <input id="userInput" autocomplete="off" placeholder="Ask something..." />

        <button id="sendButton" class="send-button" type="submit">Send</button>
      </form>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://tyzvxrlimbhmvmjenjxy.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_BdJd1R8Pkbggf5X_oOZL3w_DgoDyhNH";

    const form = document.getElementById("chatForm");
    const input = document.getElementById("userInput");
    const sendButton = document.getElementById("sendButton");
    const transcribeButton = document.getElementById("transcribeButton");
    const messageHistory = document.getElementById("messageHistory");
    const languageSelect = document.getElementById("languageSelect");
    const fluentLanguageSelect = document.getElementById("fluentLanguageSelect");

    const messages = [];
    const translationCache = new Map();
    const messageState = new Map();

    let messageCounter = 0;

    let mediaRecorder = null;
    let recordedChunks = [];
    let isRecording = false;

    let audioContext = null;
    let scheduledSources = [];
    let currentPlaybackToken = 0;
    let currentFullAudio = null;

    function getReadableError(error) {
      if (!error) return "Unknown error";

      if (typeof error === "string") {
        return error;
      }

      if (error instanceof Error && error.message) {
        return error.message;
      }

      if (typeof error.message === "string") {
        return error.message;
      }

      if (typeof error.error === "string") {
        return error.error;
      }

      if (error.error && typeof error.error.message === "string") {
        return error.error.message;
      }

      if (error.details && typeof error.details === "string") {
        return error.details;
      }

      try {
        return JSON.stringify(error);
      } catch {
        return String(error);
      }
    }

    function throwApiError(data, fallback) {
      throw new Error(getReadableError(data) || fallback);
    }

    function showSystemMessage(text) {
      const existing = document.querySelector(".system-message");
      if (existing) existing.remove();

      const div = document.createElement("div");
      div.className = "system-message";
      div.textContent = getReadableError(text);
      document.body.appendChild(div);

      setTimeout(() => div.remove(), 5200);
    }

    function scrollMessagesToBottom() {
      messageHistory.scrollTop = messageHistory.scrollHeight;
    }

    function getAudioContext() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }

      return audioContext;
    }

    async function unlockAudioContext() {
      const context = getAudioContext();

      if (context.state === "suspended") {
        await context.resume();
      }
    }

    async function unlockAudio() {
      try {
        await unlockAudioContext();
      } catch {
        // Browser may still require another user gesture.
      }
    }

    function base64ToArrayBuffer(base64) {
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);

      for (let i = 0; i < binary.length; i++) {
        bytes[i] = binary.charCodeAt(i);
      }

      return bytes.buffer;
    }

    function stopAllSpeech() {
  if (currentFullAudio) {
    currentFullAudio.pause();
    currentFullAudio.currentTime = 0;
    currentFullAudio = null;
  }

  scheduledSources.forEach(source => {
    try {
      source.stop();
    } catch {}
  });

  scheduledSources = [];
  currentPlaybackToken++;
}

    function splitTextIntoParts(text) {
      return text.match(/[\p{L}\p{M}]+(?:['’][\p{L}\p{M}]+)?|[\p{N}]+|[^\s\p{L}\p{M}\p{N}]|\s+/gu) || [];
    }

    function isClickableWord(part) {
      return /[\p{L}\p{M}]/u.test(part);
    }

    function getSpeakableWords(text) {
      return text.match(/[\p{L}\p{M}]+(?:['’][\p{L}\p{M}]+)?|[\p{N}]+/gu) || [];
    }

    function addUserMessage(text) {
      const card = document.createElement("div");
      card.className = "message-card user-card";

      const bubble = document.createElement("div");
      bubble.className = "user-bubble";
      bubble.textContent = text;

      card.appendChild(bubble);
      messageHistory.appendChild(card);
      scrollMessagesToBottom();
    }

    function addThinkingMessage() {
      const card = document.createElement("div");
      card.className = "message-card thinking-card";
      card.textContent = "Thinking…";
      messageHistory.appendChild(card);
      scrollMessagesToBottom();
      return card;
    }

    function addBotMessage(text, options = {}) {
      const id = `bot-${++messageCounter}`;

      const card = document.createElement("div");
      card.className = "message-card bot-card";
      card.dataset.messageId = id;

      const wordsEl = document.createElement("div");
      wordsEl.className = "bot-words";
      wordsEl.setAttribute("dir", "auto");

      renderWordsIntoElement(text, wordsEl, id);

      const controls = createMessageAudioControls(id);

      card.appendChild(wordsEl);
      card.appendChild(controls);

      messageHistory.appendChild(card);

      messageState.set(id, {
        id,
        text,
        wordsEl,
        mode: "conversational",

        fullSpeech: options.fullSpeech || null,
        fullSpeechPromise: options.fullSpeechPromise || null,

        wordClips: null,
        wordClipsPromise: options.wordClipsPromise || null,
        wordSchedule: null,

        loadingFullSpeech: false,
        loadingWordSpeech: false
      });

      scrollMessagesToBottom();
      return id;
    }

    function renderWordsIntoElement(text, container, messageId) {
      container.innerHTML = "";

      const parts = splitTextIntoParts(text);

      for (const part of parts) {
        if (/^\s+$/.test(part)) {
          container.appendChild(document.createTextNode(" "));
          continue;
        }

        if (isClickableWord(part)) {
          const unit = document.createElement("span");
          unit.className = "word-unit";
          unit.dataset.word = part;

          const mainWord = document.createElement("span");
          mainWord.className = "main-word";
          mainWord.textContent = part;

          const translation = document.createElement("span");
          translation.className = "translation";

          unit.appendChild(mainWord);
          unit.appendChild(translation);

          unit.addEventListener("click", () => {
            const state = messageState.get(messageId);
            translateWordUnit(unit, part, state?.text || text);
          });

          container.appendChild(unit);
        } else {
          const punct = document.createElement("span");
          punct.className = "punct";
          punct.textContent = part;
          container.appendChild(punct);
        }
      }
    }

    function createMessageAudioControls(messageId) {
      const wrapper = document.createElement("div");
      wrapper.className = "message-audio-controls";

      const toggle = document.createElement("div");
      toggle.className = "mode-toggle";

      const slowButton = document.createElement("button");
      slowButton.type = "button";
      slowButton.className = "mode-option";
      slowButton.textContent = "Slow";

      const conversationalButton = document.createElement("button");
      conversationalButton.type = "button";
      conversationalButton.className = "mode-option active";
      conversationalButton.textContent = "Conversational";

      const playButton = document.createElement("button");
      playButton.type = "button";
      playButton.className = "message-play-button";
      playButton.textContent = "Play";

      slowButton.addEventListener("click", () => setMessageMode(messageId, "slow"));
      conversationalButton.addEventListener("click", () => setMessageMode(messageId, "conversational"));

      playButton.addEventListener("click", async () => {
        await playMessage(messageId);
      });

      toggle.appendChild(slowButton);
      toggle.appendChild(conversationalButton);

      wrapper.appendChild(toggle);
      wrapper.appendChild(playButton);

      return wrapper;
    }

    function setMessageMode(messageId, mode) {
      const state = messageState.get(messageId);
      if (!state) return;

      state.mode = mode;

      const card = document.querySelector(`[data-message-id="${messageId}"]`);
      if (!card) return;

      const buttons = card.querySelectorAll(".mode-option");

      buttons.forEach(button => {
        button.classList.toggle(
          "active",
          button.textContent.toLowerCase() === mode
        );
      });

      if (mode === "slow") {
        preloadSlowSpeech(state).catch(error => {
          showSystemMessage(getReadableError(error));
        });
      }
    }

    async function parseJsonResponse(response, label) {
      const rawText = await response.text();

      let data;
      try {
        data = JSON.parse(rawText);
      } catch {
        throw new Error(`${label} returned non-JSON response: ${rawText}`);
      }

      if (!response.ok) {
        throwApiError(data, `${label} failed with status ${response.status}`);
      }

      return data;
    }

    async function fetchFullSpeech(text) {
  const response = await fetch(`${SUPABASE_URL}/functions/v1/chat`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "apikey": SUPABASE_ANON_KEY,
      "Authorization": `Bearer ${SUPABASE_ANON_KEY}`
    },
    body: JSON.stringify({
      action: "speak-full",
      text,
      language: languageSelect.value
    })
  });

  const data = await parseJsonResponse(response, "Speech");

  return {
    ...data,
    audioBuffer: null
  };
}

    async function fetchIndividualWordSpeech(text) {
      const words = getSpeakableWords(text);

      const response = await fetch(`${SUPABASE_URL}/functions/v1/chat`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "apikey": SUPABASE_ANON_KEY,
          "Authorization": `Bearer ${SUPABASE_ANON_KEY}`
        },
        body: JSON.stringify({
          action: "speak-words",
          words,
          language: languageSelect.value
        })
      });

      const data = await parseJsonResponse(response, "Word speech");
      return data.clips || [];
    }

    async function getFullSpeechForMessage(state) {
      if (state.fullSpeech) return state.fullSpeech;

      if (state.fullSpeechPromise) {
        state.fullSpeech = await state.fullSpeechPromise;
        return state.fullSpeech;
      }

      if (state.loadingFullSpeech) {
        throw new Error("Voice is already loading for this message.");
      }

      state.loadingFullSpeech = true;

      try {
        state.fullSpeechPromise = fetchFullSpeech(state.text);
        state.fullSpeech = await state.fullSpeechPromise;
        return state.fullSpeech;
      } finally {
        state.loadingFullSpeech = false;
      }
    }

    async function preloadSlowSpeech(state) {
      if (state.wordClips || state.wordClipsPromise) return;

      state.wordClipsPromise = fetchIndividualWordSpeech(state.text)
        .then(clips => {
          state.wordClips = clips;
          return clips;
        })
        .catch(error => {
          state.wordClipsPromise = null;
          throw error;
        });
    }

    async function getWordClipsForMessage(state) {
      if (state.wordClips) return state.wordClips;

      if (state.wordClipsPromise) {
        state.wordClips = await state.wordClipsPromise;
        return state.wordClips;
      }

      state.wordClipsPromise = fetchIndividualWordSpeech(state.text);
      state.wordClips = await state.wordClipsPromise;
      return state.wordClips;
    }

    async function playConversationalMessage(state) {
  stopAllSpeech();
  await unlockAudioContext();

  clearActiveWords(state.wordsEl);

  const speech = await getFullSpeechForMessage(state);

  if (!speech.audioBuffer) {
    const arrayBuffer = base64ToArrayBuffer(speech.audioBase64);
    const context = getAudioContext();
    speech.audioBuffer = await context.decodeAudioData(arrayBuffer);
  }

  playFullAudioBuffer(speech.audioBuffer);
}

    function playFullAudioBuffer(audioBuffer) {
  const context = getAudioContext();
  const token = currentPlaybackToken;
  const source = context.createBufferSource();

  source.buffer = audioBuffer;
  source.connect(context.destination);

  scheduledSources = [source];

  source.start(context.currentTime + 0.04);

  source.addEventListener("ended", () => {
    if (token === currentPlaybackToken) {
      scheduledSources = [];
    }
  });
}

    function trimAudioBufferSilence(audioBuffer, threshold = 0.012, paddingSeconds = 0.015) {
      const sampleRate = audioBuffer.sampleRate;
      const numberOfChannels = audioBuffer.numberOfChannels;
      const length = audioBuffer.length;

      let firstSound = 0;
      let lastSound = length - 1;

      function sampleIsSound(index) {
        for (let channel = 0; channel < numberOfChannels; channel++) {
          const data = audioBuffer.getChannelData(channel);

          if (Math.abs(data[index]) > threshold) {
            return true;
          }
        }

        return false;
      }

      while (firstSound < length && !sampleIsSound(firstSound)) {
        firstSound++;
      }

      while (lastSound > firstSound && !sampleIsSound(lastSound)) {
        lastSound--;
      }

      const paddingSamples = Math.floor(paddingSeconds * sampleRate);

      const start = Math.max(0, firstSound - paddingSamples);
      const end = Math.min(length, lastSound + paddingSamples);

      const trimmedLength = Math.max(1, end - start);
      const context = getAudioContext();

      const trimmedBuffer = context.createBuffer(
        numberOfChannels,
        trimmedLength,
        sampleRate
      );

      for (let channel = 0; channel < numberOfChannels; channel++) {
        const oldData = audioBuffer.getChannelData(channel);
        const newData = trimmedBuffer.getChannelData(channel);

        for (let i = 0; i < trimmedLength; i++) {
          newData[i] = oldData[start + i] || 0;
        }
      }

      return trimmedBuffer;
    }

    function getSlowPauseSeconds() {
      return 0.18;
    }

    async function buildIndividualWordSchedule(clips) {
      const context = getAudioContext();
      const pause = getSlowPauseSeconds();

      const schedule = [];
      let playhead = 0;

      for (let i = 0; i < clips.length; i++) {
        const clip = clips[i];

        if (!clip || !clip.audioBase64) {
          continue;
        }

        const arrayBuffer = base64ToArrayBuffer(clip.audioBase64);
        const rawBuffer = await context.decodeAudioData(arrayBuffer);
        const audioBuffer = trimAudioBufferSilence(rawBuffer);

        schedule.push({
          word: clip.word,
          index: i,
          audioBuffer,
          duration: audioBuffer.duration,
          playStart: playhead,
          playEnd: playhead + audioBuffer.duration
        });

        playhead += audioBuffer.duration + pause;
      }

      return schedule;
    }

    async function playSlowMessage(state) {
      stopAllSpeech();
      await unlockAudioContext();

      const clips = await getWordClipsForMessage(state);

      if (!state.wordSchedule) {
        state.wordSchedule = await buildIndividualWordSchedule(clips);
      }

      assignScheduleToVisibleWords(state.wordsEl, state.wordSchedule);
      playIndividualWordAudio(state.wordSchedule, state.wordsEl);
    }

    function clearActiveWords(container) {
      container.querySelectorAll(".word-unit").forEach(unit => {
        unit.classList.remove("active-word");
      });
    }

    function assignScheduleToVisibleWords(container, schedule) {
      const units = [...container.querySelectorAll(".word-unit")];

      units.forEach((unit, index) => {
        const timing = schedule[index];

        if (timing) {
          unit.dataset.playStart = String(timing.playStart);
          unit.dataset.playEnd = String(timing.playEnd);
        } else {
          unit.dataset.playStart = "";
          unit.dataset.playEnd = "";
        }
      });
    }

    function playIndividualWordAudio(wordSchedule, wordsEl) {
      const context = getAudioContext();
      const token = currentPlaybackToken;
      const startAt = context.currentTime + 0.08;

      scheduledSources = [];

      wordSchedule.forEach(item => {
        const source = context.createBufferSource();
        source.buffer = item.audioBuffer;
        source.connect(context.destination);

        source.start(startAt + item.playStart);

        scheduledSources.push(source);
      });

      const visualStart = performance.now() + 80;

      function syncFrame() {
        if (token !== currentPlaybackToken) return;

        const elapsed = (performance.now() - visualStart) / 1000;
        const units = [...wordsEl.querySelectorAll(".word-unit")];

        for (const unit of units) {
          const start = Number(unit.dataset.playStart);
          const end = Number(unit.dataset.playEnd);

          if (!Number.isFinite(start) || !Number.isFinite(end)) {
            unit.classList.remove("active-word");
            continue;
          }

          if (elapsed >= start && elapsed <= end + 0.04) {
            unit.classList.add("active-word");
          } else {
            unit.classList.remove("active-word");
          }
        }

        const lastEnd =
          wordSchedule.length > 0
            ? wordSchedule[wordSchedule.length - 1].playEnd
            : 0;

        if (elapsed <= lastEnd + 0.5) {
          requestAnimationFrame(syncFrame);
        } else {
          clearActiveWords(wordsEl);
        }
      }

      requestAnimationFrame(syncFrame);

      const totalDuration =
        wordSchedule.length > 0
          ? wordSchedule[wordSchedule.length - 1].playEnd
          : 0;

      setTimeout(() => {
        if (token === currentPlaybackToken) {
          scheduledSources = [];
          clearActiveWords(wordsEl);
        }
      }, totalDuration * 1000 + 1000);
    }

    async function playMessage(messageId) {
      const state = messageState.get(messageId);
      if (!state) return;

      try {
        if (state.mode === "slow") {
          await playSlowMessage(state);
        } else {
          await playConversationalMessage(state);
        }
      } catch (error) {
        showSystemMessage(getReadableError(error));
      }
    }

    async function translateWordUnit(unit, word, sentence) {
      const cleanWord = word.trim();
      if (!cleanWord) return;

      const translationEl = unit.querySelector(".translation");
      const chatLanguage = languageSelect.value;
      const fluentLanguage = fluentLanguageSelect.value;

      const cacheKey = `${cleanWord}|${chatLanguage}|${fluentLanguage}|${sentence}`;

      unit.classList.remove("translated");
      unit.classList.add("translating");
      translationEl.textContent = "…";

      if (translationCache.has(cacheKey)) {
        translationEl.textContent = translationCache.get(cacheKey);
        unit.classList.remove("translating");
        unit.classList.add("translated");
        return;
      }

      try {
        const response = await fetch(`${SUPABASE_URL}/functions/v1/chat`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "apikey": SUPABASE_ANON_KEY,
            "Authorization": `Bearer ${SUPABASE_ANON_KEY}`
          },
          body: JSON.stringify({
            action: "translate-word",
            word: cleanWord,
            sentence,
            chatLanguage,
            fluentLanguage
          })
        });

        const data = await parseJsonResponse(response, "Translation");

        const translated = data.translation || "";
        translationCache.set(cacheKey, translated);

        translationEl.textContent = translated;
        unit.classList.remove("translating");
        unit.classList.add("translated");
      } catch (error) {
        translationEl.textContent = "failed";
        unit.classList.remove("translating");
        unit.classList.add("translated");
        showSystemMessage(getReadableError(error));
      }
    }

    async function sendToBot(userText) {
  messages.push({
    role: "user",
    content: userText
  });

  addUserMessage(userText);

  const thinkingCard = addThinkingMessage();

  const response = await fetch(`${SUPABASE_URL}/functions/v1/chat`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "apikey": SUPABASE_ANON_KEY,
      "Authorization": `Bearer ${SUPABASE_ANON_KEY}`
    },
    body: JSON.stringify({
      messages,
      language: languageSelect.value
    })
  });

  const data = await parseJsonResponse(response, "Chat");

  messages.push({
    role: "assistant",
    content: data.reply
  });

  const fullSpeechPromise = fetchFullSpeech(data.reply);
  const wordClipsPromise = fetchIndividualWordSpeech(data.reply)
    .catch(() => null);

  const fullSpeech = await fullSpeechPromise;

  thinkingCard.remove();

  const botMessageId = addBotMessage(data.reply, {
    fullSpeech,
    fullSpeechPromise,
    wordClipsPromise
  });

  const state = messageState.get(botMessageId);

  if (state) {
    await playConversationalMessage(state);
  }
}

    form.addEventListener("submit", async event => {
  event.preventDefault();

  await unlockAudio();

  const userText = input.value.trim();
  if (!userText) return;

  input.value = "";
  sendButton.disabled = true;
  transcribeButton.disabled = true;

  try {
    await sendToBot(userText);
  } catch (error) {
    showSystemMessage(getReadableError(error));
  } finally {
    sendButton.disabled = false;
    transcribeButton.disabled = false;
    input.focus();
  }
});

    function getBestRecordingMimeType() {
  const candidates = [
    "audio/webm;codecs=opus",
    "audio/webm",
    "audio/mp4;codecs=mp4a.40.2",
    "audio/mp4",
    "audio/ogg;codecs=opus",
    "audio/ogg"
  ];

  if (!window.MediaRecorder || !MediaRecorder.isTypeSupported) {
    return "";
  }

  for (const type of candidates) {
    if (MediaRecorder.isTypeSupported(type)) {
      return type;
    }
  }

  return "";
}

function getAudioFileExtension(mimeType) {
  const type = (mimeType || "").toLowerCase();

  if (type.includes("webm")) return "webm";
  if (type.includes("mp4")) return "mp4";
  if (type.includes("mpeg")) return "mp3";
  if (type.includes("mp3")) return "mp3";
  if (type.includes("wav")) return "wav";
  if (type.includes("ogg")) return "ogg";

  return "webm";
}

function getAudioFileName(mimeType) {
  return `recording.${getAudioFileExtension(mimeType)}`;
}

async function transcribeAudioBlob(audioBlob, mimeType) {
  if (!audioBlob || audioBlob.size < 1000) {
    throw new Error("The recording was too short or empty.");
  }

  const finalMimeType = mimeType || audioBlob.type || "audio/webm";
  const fileName = getAudioFileName(finalMimeType);

  const audioFile = new File(
    [audioBlob],
    fileName,
    {
      type: finalMimeType
    }
  );

  const formData = new FormData();
formData.append("audio", audioFile);
formData.append("chatLanguage", languageSelect.value);
formData.append("fluentLanguage", fluentLanguageSelect.value);
formData.append(
  "transcriptionPrompt",
  `The speaker may switch between languages, especially ${languageSelect.value} and ${fluentLanguageSelect.value}. Transcribe exactly what is spoken. Do not translate. Preserve mixed-language speech.`
);

  const response = await fetch(`${SUPABASE_URL}/functions/v1/transcribe-audio`, {
    method: "POST",
    headers: {
      "apikey": SUPABASE_ANON_KEY,
      "Authorization": `Bearer ${SUPABASE_ANON_KEY}`
    },
    body: formData
  });

  const data = await parseJsonResponse(response, "Transcription");

  const transcript =
    data.text ||
    data.transcript ||
    data.transcription ||
    "";

  if (!transcript.trim()) {
    throw new Error("No transcript was returned.");
  }

  return transcript.trim();
}

async function startRecording() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    showSystemMessage("Audio recording is not supported in this browser.");
    return;
  }

  if (!window.MediaRecorder) {
    showSystemMessage("MediaRecorder is not supported in this browser.");
    return;
  }

  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

  recordedChunks = [];

  const mimeType = getBestRecordingMimeType();

  const options = mimeType
    ? { mimeType }
    : {};

  try {
    mediaRecorder = new MediaRecorder(stream, options);
  } catch {
    mediaRecorder = new MediaRecorder(stream);
  }

  mediaRecorder.addEventListener("dataavailable", event => {
    if (event.data && event.data.size > 0) {
      recordedChunks.push(event.data);
    }
  });

  mediaRecorder.addEventListener("stop", async () => {
    transcribeButton.disabled = true;
    transcribeButton.textContent = "…";
    input.placeholder = "Transcribing...";

    try {
      const actualMimeType =
        mediaRecorder.mimeType ||
        mimeType ||
        recordedChunks[0]?.type ||
        "audio/webm";

      const audioBlob = new Blob(recordedChunks, {
        type: actualMimeType
      });

      const transcript = await transcribeAudioBlob(audioBlob, actualMimeType);

      input.value = transcript;
      input.focus();
    } catch (error) {
      showSystemMessage(getReadableError(error));
    } finally {
      stream.getTracks().forEach(track => track.stop());

      isRecording = false;
      transcribeButton.disabled = false;
      transcribeButton.classList.remove("recording");
      transcribeButton.textContent = "🎤";
      input.placeholder = "Ask something...";
    }
  });

  mediaRecorder.start();

  isRecording = true;
  transcribeButton.classList.add("recording");
  transcribeButton.textContent = "■";
  input.placeholder = "Recording... click again to stop";
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state === "recording") {
    mediaRecorder.stop();
  }
}

transcribeButton.addEventListener("click", async () => {
  unlockAudio();

  try {
    if (isRecording) {
      stopRecording();
    } else {
      await startRecording();
    }
  } catch (error) {
    showSystemMessage(getReadableError(error));

    isRecording = false;
    transcribeButton.classList.remove("recording");
    transcribeButton.textContent = "🎤";
    input.placeholder = "Ask something...";
  }
});
