<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Language Chat</title>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #030303;
      --panel: rgba(255, 255, 255, 0.06);
      --panel-strong: rgba(255, 255, 255, 0.1);
      --text: #f8fafc;
      --muted: #9ca3af;
      --accent: #60a5fa;
      --translated: #facc15;
      --danger: #ef4444;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.16), transparent 30%),
        radial-gradient(circle at bottom right, rgba(250, 204, 21, 0.08), transparent 25%),
        var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 28px;
      gap: 22px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 22px;
      z-index: 5;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .brand h1 {
      margin: 0;
      font-size: 1.05rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .brand p {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .control-card {
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 9px;
      backdrop-filter: blur(16px);
    }

    .control-card label {
      color: var(--muted);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    select {
      appearance: none;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      padding-right: 18px;
    }

    select option {
      background: #111827;
      color: white;
    }

    .select-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .select-wrap::after {
      content: "⌄";
      position: absolute;
      right: 0;
      color: var(--muted);
      pointer-events: none;
      transform: translateY(-2px);
    }

    .speed-card {
      min-width: 260px;
    }

    .speed-number {
      color: var(--text);
      font-weight: 700;
      min-width: 46px;
      text-align: right;
      font-size: 0.85rem;
    }

    input[type="range"] {
      width: 130px;
      accent-color: white;
      cursor: pointer;
    }

    .stage {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
      position: relative;
      padding: 28px 3vw;
    }

    .last-user {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
      opacity: 0.8;
      padding: 0 20px;
    }

    .word-display {
      max-width: 1200px;
      width: 100%;
      text-align: center;
      line-height: 1.25;
      font-size: clamp(2.4rem, 7vw, 7rem);
      font-weight: 800;
      letter-spacing: -0.06em;
    }

    .word-unit {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      vertical-align: top;
      margin: 0 0.13em 0.24em;
      opacity: 0;
      transform: translateY(18px);
      transition:
        opacity 420ms ease,
        transform 420ms ease,
        color 180ms ease;
      cursor: pointer;
      border-radius: 12px;
      padding: 0 0.03em;
      position: relative;
    }

    .word-unit.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .word-unit:hover .main-word {
      color: var(--accent);
    }

    .word-unit.translating .main-word {
      color: var(--accent);
    }

    .word-unit.translated .main-word {
      color: var(--translated);
    }

    .word-unit.loading .translation {
      opacity: 0.7;
    }

    .main-word {
      display: inline-block;
      transition: color 180ms ease;
    }

    .translation {
      display: none;
      font-size: clamp(0.8rem, 1.5vw, 1.15rem);
      line-height: 1.1;
      letter-spacing: normal;
      font-weight: 600;
      color: var(--translated);
      margin-top: 0.25em;
      max-width: 180px;
      word-break: break-word;
    }

    .word-unit.translated .translation,
    .word-unit.translating .translation {
      display: block;
    }

    .punct,
    .space {
      opacity: 0;
      transition: opacity 420ms ease;
    }

    .punct.visible,
    .space.visible {
      opacity: 1;
    }

    .composer-shell {
      display: flex;
      justify-content: center;
      z-index: 5;
    }

    form {
      width: min(960px, 100%);
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 999px;
      padding: 10px;
      backdrop-filter: blur(16px);
    }

    #userInput {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      color: white;
      font-size: 1.05rem;
      padding: 12px 10px;
      min-width: 0;
    }

    #userInput::placeholder {
      color: #6b7280;
    }

    .icon-button,
    .send-button {
      border: none;
      border-radius: 999px;
      height: 46px;
      cursor: pointer;
      font-weight: 800;
      transition:
        transform 160ms ease,
        background 160ms ease,
        opacity 160ms ease;
    }

    .icon-button {
      width: 46px;
      min-width: 46px;
      background: rgba(255, 255, 255, 0.12);
      color: white;
      font-size: 1.1rem;
    }

    .icon-button:hover,
    .send-button:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.2);
    }

    .send-button {
      padding: 0 24px;
      background: white;
      color: black;
      font-size: 0.95rem;
    }

    .send-button:hover {
      background: #e5e7eb;
    }

    .send-button:disabled,
    .icon-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .system-message {
      position: fixed;
      left: 50%;
      bottom: 98px;
      transform: translateX(-50%);
      background: rgba(17, 24, 39, 0.94);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 0.9rem;
      z-index: 20;
      box-shadow: 0 16px 50px rgba(0, 0, 0, 0.35);
      max-width: min(700px, 90vw);
      text-align: center;
    }

    .recording {
      background: var(--danger);
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.42);
      }

      70% {
        box-shadow: 0 0 0 12px rgba(239, 68, 68, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
      }
    }

    @media (max-width: 760px) {
      body {
        overflow-y: auto;
      }

      .app {
        min-height: 100svh;
        padding: 18px;
      }

      .top-bar {
        align-items: flex-start;
        flex-direction: column;
      }

      .controls {
        justify-content: flex-start;
        width: 100%;
      }

      .control-card {
        width: 100%;
        justify-content: space-between;
      }

      .speed-card {
        min-width: 0;
      }

      input[type="range"] {
        width: 100px;
      }

      .stage {
        padding: 24px 0;
      }

      .word-display {
        font-size: clamp(2.3rem, 13vw, 5rem);
      }

      .send-button {
        padding: 0 18px;
      }
    }

    .voice-toggle-button {
  border: none;
  border-radius: 999px;
  padding: 8px 13px;
  background: white;
  color: black;
  font-weight: 800;
  cursor: pointer;
}

.voice-toggle-button.off {
  background: rgba(255, 255, 255, 0.12);
  color: #d1d5db;
}

    .word-unit.active-word .main-word {
  color: #60a5fa;
}
  </style>

  <script>
    const SUPABASE_URL = "https://tyzvxrlimbhmvmjenjxy.supabase.co";

const voiceToggleButton = document.getElementById("voiceToggleButton");

let voiceEnabled = true;
let currentAudio = null;
    
    let animationTimers = [];
    let mediaRecorder = null;
    let recordedChunks = [];
    let isRecording = false;

    let audioContext = null;
let scheduledSources = [];
let currentPlaybackToken = 0;

    function getSpeakableWords(text) {
  return text.match(/[\p{L}\p{M}]+(?:['’][\p{L}\p{M}]+)?|[\p{N}]+/gu) || [];
}

    async function fetchIndividualWordSpeech(text) {
  const words = getSpeakableWords(text);

  const response = await fetch(`${SUPABASE_URL}/functions/v1/chat`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "apikey": SUPABASE_ANON_KEY,
      "Authorization": `Bearer ${SUPABASE_ANON_KEY}`
    },
    body: JSON.stringify({
      action: "speak-words",
      words,
      language: languageSelect.value
    })
  });

  const rawText = await response.text();

  let data;
  try {
    data = JSON.parse(rawText);
  } catch {
    throw new Error(`Word speech returned non-JSON response: ${rawText}`);
  }

  if (!response.ok) {
    throw new Error(data.error || `Word speech failed with status ${response.status}`);
  }

  return data.clips || [];
}

function trimAudioBufferSilence(audioBuffer, threshold = 0.012, paddingSeconds = 0.015) {
  const sampleRate = audioBuffer.sampleRate;
  const numberOfChannels = audioBuffer.numberOfChannels;
  const length = audioBuffer.length;

  let firstSound = 0;
  let lastSound = length - 1;

  function sampleIsSound(index) {
    for (let channel = 0; channel < numberOfChannels; channel++) {
      const data = audioBuffer.getChannelData(channel);
      if (Math.abs(data[index]) > threshold) {
        return true;
      }
    }

    return false;
  }

  while (firstSound < length && !sampleIsSound(firstSound)) {
    firstSound++;
  }

  while (lastSound > firstSound && !sampleIsSound(lastSound)) {
    lastSound--;
  }

  const paddingSamples = Math.floor(paddingSeconds * sampleRate);

  const start = Math.max(0, firstSound - paddingSamples);
  const end = Math.min(length, lastSound + paddingSamples);

  const trimmedLength = Math.max(1, end - start);
  const context = getAudioContext();

  const trimmedBuffer = context.createBuffer(
    numberOfChannels,
    trimmedLength,
    sampleRate
  );

  for (let channel = 0; channel < numberOfChannels; channel++) {
    const oldData = audioBuffer.getChannelData(channel);
    const newData = trimmedBuffer.getChannelData(channel);

    for (let i = 0; i < trimmedLength; i++) {
      newData[i] = oldData[start + i] || 0;
    }
  }

  return trimmedBuffer;
}

async function buildIndividualWordSchedule(clips) {
  const context = getAudioContext();
  const pause = getWordPauseSeconds();

  const schedule = [];
  let playhead = 0;

  for (let i = 0; i < clips.length; i++) {
    const clip = clips[i];
    const arrayBuffer = base64ToArrayBuffer(clip.audioBase64);
    const rawBuffer = await context.decodeAudioData(arrayBuffer);

    const audioBuffer = trimAudioBufferSilence(rawBuffer);

    schedule.push({
      word: clip.word,
      index: i,
      audioBuffer,
      duration: audioBuffer.duration,
      playStart: playhead,
      playEnd: playhead + audioBuffer.duration
    });

    playhead += audioBuffer.duration + pause;
  }

  return schedule;
}

    function playIndividualWordAudio(wordSchedule) {
  const context = getAudioContext();
  const token = currentPlaybackToken;
  const startAt = context.currentTime + 0.08;

  scheduledSources = [];

  wordSchedule.forEach(item => {
    const source = context.createBufferSource();
    source.buffer = item.audioBuffer;
    source.connect(context.destination);

    source.start(startAt + item.playStart);

    scheduledSources.push(source);
  });

  const totalDuration =
    wordSchedule.length > 0
      ? wordSchedule[wordSchedule.length - 1].playEnd
      : 0;

  setTimeout(() => {
    if (token === currentPlaybackToken) {
      scheduledSources = [];
    }
  }, totalDuration * 1000 + 1000);
}

    async function prepareAndPlayBotReplyIndividualWords(text) {
  if (!voiceEnabled) {
    renderBotReply(text);
    return;
  }

  try {
    stopScheduledSpeech();
    await unlockAudioContext();

    const clips = await fetchIndividualWordSpeech(text);
    const wordSchedule = await buildIndividualWordSchedule(clips);

    renderBotReplyWithSchedule(text, [], wordSchedule);
    playIndividualWordAudio(wordSchedule);
  } catch (error) {
    console.error("Individual word speech error:", error);
    showSystemMessage(error.message || "Could not play individual word speech.");
    renderBotReply(text);
  }
}

async function unlockAudio() {
  try {
    await unlockAudioContext();
  } catch {
    // Browser may still require another user gesture.
  }
}

    function getWordDelay() {
  const speed = Number(speedSlider.value);

  const delays = {
    1: 520,
    2: 460,
    3: 400,
    4: 340,
    5: 290,
    6: 240,
    7: 200,
    8: 165,
    9: 135,
    10: 110
  };

  return delays[speed] || 240;
}

    speedSlider.addEventListener("input", () => {
      speedLabel.textContent = speedSlider.value;
    });

    voiceToggleButton.addEventListener("click", () => {
  voiceEnabled = !voiceEnabled;

  if (!voiceEnabled && currentAudio) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
  }

  voiceToggleButton.textContent = voiceEnabled ? "Voice On" : "Voice Off";
  voiceToggleButton.classList.toggle("off", !voiceEnabled);
});

    function showSystemMessage(text) {
      const existing = document.querySelector(".system-message");
      if (existing) existing.remove();

      const div = document.createElement("div");
      div.className = "system-message";
      div.textContent = text;
      document.body.appendChild(div);

      setTimeout(() => {
        div.remove();
      }, 4200);
    }

    function clearAnimationTimers() {
      animationTimers.forEach(timer => clearTimeout(timer));
      animationTimers = [];
    }

    function splitTextIntoParts(text) {
      return text.match(/[\p{L}\p{M}]+(?:['’][\p{L}\p{M}]+)?|[\p{N}]+|[^\s\p{L}\p{M}\p{N}]|\s+/gu) || [];
    }

    function isClickableWord(part) {
      return /[\p{L}\p{M}]/u.test(part);
    }

function normalizeForSync(text) {
  return text
    .toLowerCase()
    .replace(/[’']/g, "")
    .replace(/[^\p{L}\p{M}\p{N}]/gu, "")
    .trim();
}

function renderBotReply(text) {
  clearAnimationTimers();
  translationCache.clear();
  wordDisplay.innerHTML = "";
  wordDisplay.setAttribute("dir", "auto");

  const parts = splitTextIntoParts(text);
  let wordIndex = 0;
  const delay = getWordDelay();

  for (const part of parts) {
    if (/^\s+$/.test(part)) {
      wordDisplay.appendChild(document.createTextNode(" "));
      continue;
    }

    if (isClickableWord(part)) {
      const unit = document.createElement("span");
      unit.className = "word-unit";
      unit.dataset.word = part;

      const mainWord = document.createElement("span");
      mainWord.className = "main-word";
      mainWord.textContent = part;

      const translation = document.createElement("span");
      translation.className = "translation";

      unit.appendChild(mainWord);
      unit.appendChild(translation);

      unit.addEventListener("click", () => {
        translateWordUnit(unit, part, text);
      });

      wordDisplay.appendChild(unit);

      const timer = setTimeout(() => {
        unit.classList.add("visible");
      }, wordIndex * delay);

      animationTimers.push(timer);
      wordIndex += 1;
    } else {
      const punct = document.createElement("span");
      punct.className = "punct";
      punct.textContent = part;
      wordDisplay.appendChild(punct);

      const timer = setTimeout(() => {
        punct.classList.add("visible");
      }, wordIndex * delay);

      animationTimers.push(timer);
    }
  }
}

function renderBotReplyWithSchedule(text, timestampWords, wordSchedule) {
  clearAnimationTimers();
  translationCache.clear();
  wordDisplay.innerHTML = "";
  wordDisplay.setAttribute("dir", "auto");

  const parts = splitTextIntoParts(text);
  const visibleWordUnits = [];

  for (const part of parts) {
    if (/^\s+$/.test(part)) {
      wordDisplay.appendChild(document.createTextNode(" "));
      continue;
    }

    if (isClickableWord(part)) {
      const unit = document.createElement("span");
      unit.className = "word-unit";
      unit.dataset.word = part;

      const mainWord = document.createElement("span");
      mainWord.className = "main-word";
      mainWord.textContent = part;

      const translation = document.createElement("span");
      translation.className = "translation";

      unit.appendChild(mainWord);
      unit.appendChild(translation);

      unit.addEventListener("click", () => {
        translateWordUnit(unit, part, text);
      });

      wordDisplay.appendChild(unit);
      visibleWordUnits.push(unit);
    } else {
      const punct = document.createElement("span");
      punct.className = "punct";
      punct.textContent = part;
      wordDisplay.appendChild(punct);
    }
  }

  visibleWordUnits.forEach((unit, index) => {
    const timing = wordSchedule[index];

    if (timing) {
      unit.dataset.playStart = String(timing.playStart);
      unit.dataset.playEnd = String(timing.playEnd);
    } else {
      unit.dataset.playStart = String(index * 0.4);
      unit.dataset.playEnd = String(index * 0.4 + 0.3);
    }
  });

  const startTime = performance.now();

  function syncFrame() {
    const elapsed = (performance.now() - startTime) / 1000;

    for (const unit of visibleWordUnits) {
      const start = Number(unit.dataset.playStart);
      const end = Number(unit.dataset.playEnd);

      if (!Number.isFinite(start)) continue;

      if (elapsed >= start) {
        unit.classList.add("visible");
      }

      if (elapsed >= start && elapsed <= end + 0.04) {
        unit.classList.add("active-word");
      } else {
        unit.classList.remove("active-word");
      }
    }

    const lastEnd =
      wordSchedule.length > 0
        ? wordSchedule[wordSchedule.length - 1].playEnd
        : 0;

    if (elapsed <= lastEnd + 0.5) {
      requestAnimationFrame(syncFrame);
    } else {
      visibleWordUnits.forEach(unit => {
        unit.classList.add("visible");
        unit.classList.remove("active-word");
      });
    }
  }

  requestAnimationFrame(syncFrame);
}

    function waitForAudioMetadata(audio) {
  return new Promise((resolve, reject) => {
    if (Number.isFinite(audio.duration) && audio.duration > 0) {
      resolve(audio.duration);
      return;
    }

    audio.addEventListener("loadedmetadata", () => {
      resolve(audio.duration);
    }, { once: true });

    audio.addEventListener("error", () => {
      reject(new Error("Could not load speech audio."));
    }, { once: true });

    audio.load();
  });
}

    async function translateWordUnit(unit, word, sentence) {
      const cleanWord = word.trim();
      if (!cleanWord) return;

      const translationEl = unit.querySelector(".translation");
      const chatLanguage = languageSelect.value;
      const fluentLanguage = fluentLanguageSelect.value;

      const cacheKey = `${cleanWord}|${chatLanguage}|${fluentLanguage}|${sentence}`;

      unit.classList.remove("translated");
      unit.classList.add("translating");
      translationEl.textContent = "…";

      if (translationCache.has(cacheKey)) {
        translationEl.textContent = translationCache.get(cacheKey);
        unit.classList.remove("translating");
        unit.classList.add("translated");
        return;
      }

      try {
        const response = await fetch(`${SUPABASE_URL}/functions/v1/chat`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "apikey": SUPABASE_ANON_KEY,
            "Authorization": `Bearer ${SUPABASE_ANON_KEY}`
          },
          body: JSON.stringify({
            action: "translate-word",
            word: cleanWord,
            sentence,
            chatLanguage,
            fluentLanguage
          })
        });

        const rawText = await response.text();

        let data;
        try {
          data = JSON.parse(rawText);
        } catch {
          throw new Error(`Translation returned non-JSON response: ${rawText}`);
        }

        if (!response.ok) {
          throw new Error(data.error || `Translation failed with status ${response.status}`);
        }

        const translated = data.translation || "";
        translationCache.set(cacheKey, translated);

        translationEl.textContent = translated;
        unit.classList.remove("translating");
        unit.classList.add("translated");
      } catch (error) {
        translationEl.textContent = "failed";
        unit.classList.remove("translating");
        unit.classList.add("translated");
        showSystemMessage(error.message || "Translation failed.");
      }
    }

    async function sendToBot(userText) {
      messages.push({
        role: "user",
        content: userText
      });

      lastUser.textContent = userText;
      renderBotReply("Thinking");

      const response = await fetch(`${SUPABASE_URL}/functions/v1/chat`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "apikey": SUPABASE_ANON_KEY,
          "Authorization": `Bearer ${SUPABASE_ANON_KEY}`
        },
        body: JSON.stringify({
          messages,
          language: languageSelect.value
        })
      });

      const rawText = await response.text();

      let data;
      try {
        data = JSON.parse(rawText);
      } catch {
        throw new Error(`Chat returned non-JSON response: ${rawText}`);
      }

      if (!response.ok) {
        throw new Error(data.error || `Request failed with status ${response.status}`);
      }

      messages.push({
        role: "assistant",
        content: data.reply
      });

      await prepareAndPlayBotReplyIndividualWords(data.reply);
    }

    form.addEventListener("submit", async event => {
      event.preventDefault();

      unlockAudio();

      const userText = input.value.trim();
      if (!userText) return;

      input.value = "";
      sendButton.disabled = true;
      transcribeButton.disabled = true;

      try {
        await sendToBot(userText);
      } catch (error) {
        console.error(error);
        renderBotReply("Something went wrong");
        showSystemMessage(error.message || "The bot could not answer.");
      } finally {
        sendButton.disabled = false;
        transcribeButton.disabled = false;
        input.focus();
      }
    });

    async function transcribeAudioBlob(audioBlob) {
      const formData = new FormData();
      formData.append("audio", audioBlob, "chunk.webm");

      const response = await fetch(`${SUPABASE_URL}/functions/v1/transcribe-audio`, {
        method: "POST",
        headers: {
          "apikey": SUPABASE_ANON_KEY,
          "Authorization": `Bearer ${SUPABASE_ANON_KEY}`
        },
        body: formData
      });

      const rawText = await response.text();

      let data;
      try {
        data = JSON.parse(rawText);
      } catch {
        throw new Error(`Transcription returned non-JSON response: ${rawText}`);
      }

      if (!response.ok) {
        throw new Error(data.error || `Transcription failed with status ${response.status}`);
      }

      const transcript =
        data.text ||
        data.transcript ||
        data.transcription ||
        "";

      if (!transcript.trim()) {
        throw new Error("No transcript was returned.");
      }

      return transcript.trim();
    }

    async function startRecording() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        showSystemMessage("Audio recording is not supported in this browser.");
        return;
      }

      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

      recordedChunks = [];

      const options = MediaRecorder.isTypeSupported("audio/webm")
        ? { mimeType: "audio/webm" }
        : {};

      mediaRecorder = new MediaRecorder(stream, options);

      mediaRecorder.addEventListener("dataavailable", event => {
        if (event.data && event.data.size > 0) {
          recordedChunks.push(event.data);
        }
      });

      mediaRecorder.addEventListener("stop", async () => {
        transcribeButton.disabled = true;
        transcribeButton.textContent = "…";
        input.placeholder = "Transcribing...";

        try {
          const audioBlob = new Blob(recordedChunks, {
            type: mediaRecorder.mimeType || "audio/webm"
          });

          const transcript = await transcribeAudioBlob(audioBlob);

          input.value = transcript;
          input.focus();
        } catch (error) {
          console.error("Transcription error:", error);
          showSystemMessage(error.message || "Transcription failed.");
        } finally {
          stream.getTracks().forEach(track => track.stop());

          isRecording = false;
          transcribeButton.disabled = false;
          transcribeButton.classList.remove("recording");
          transcribeButton.textContent = "🎤";
          input.placeholder = "Ask something...";
        }
      });

      mediaRecorder.start();

      isRecording = true;
      transcribeButton.classList.add("recording");
      transcribeButton.textContent = "■";
      input.placeholder = "Recording... click again to stop";
    }

    function stopRecording() {
      if (mediaRecorder && mediaRecorder.state === "recording") {
        mediaRecorder.stop();
      }
    }

    transcribeButton.addEventListener("click", async () => {
      unlockAudio();
      try {
        if (isRecording) {
          stopRecording();
        } else {
          await startRecording();
        }
      } catch (error) {
        console.error("Recording error:", error);
        showSystemMessage(error.message || "Could not start recording.");

        isRecording = false;
        transcribeButton.classList.remove("recording");
        transcribeButton.textContent = "🎤";
        input.placeholder = "Ask something...";
      }
    });

 function getSpeechSpeedLabel() {
  const speed = Number(speedSlider.value);

  if (speed <= 2) return "slow and clear";
  if (speed <= 4) return "a little slow";
  if (speed <= 6) return "natural";
  if (speed <= 8) return "a little fast";
  return "fast but still clear";
}

async function fetchSpeechAudio(text) {
  const response = await fetch(`${SUPABASE_URL}/functions/v1/chat`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "apikey": SUPABASE_ANON_KEY,
      "Authorization": `Bearer ${SUPABASE_ANON_KEY}`
    },
    body: JSON.stringify({
      action: "speak",
      text,
      language: languageSelect.value,
      speedLabel: getSpeechSpeedLabel()
    })
  });

  const rawText = await response.text();

  let data;
  try {
    data = JSON.parse(rawText);
  } catch {
    throw new Error(`Speech returned non-JSON response: ${rawText}`);
  }

  if (!response.ok) {
    throw new Error(data.error || `Speech failed with status ${response.status}`);
  }

  const audioUrl = `data:${data.mimeType || "audio/mpeg"};base64,${data.audioBase64}`;
  return new Audio(audioUrl);
}

async function prepareAndPlayBotReply(text) {
  if (!voiceEnabled) {
    renderBotReply(text);
    return;
  }

  try {
    stopScheduledSpeech();
    await unlockAudioContext();

    const speech = await fetchSyncedSpeech(text);

    const arrayBuffer = base64ToArrayBuffer(speech.audioBase64);
    const context = getAudioContext();
    const audioBuffer = await context.decodeAudioData(arrayBuffer);

    const wordSchedule = buildWordAudioSchedule(
      speech.words || [],
      audioBuffer.duration
    );

    renderBotReplyWithSchedule(text, speech.words || [], wordSchedule);

    playScheduledWordAudio(audioBuffer, wordSchedule);
  } catch (error) {
    console.error("Synced speech error:", error);
    showSystemMessage(error.message || "Could not play synced speech.");
    renderBotReply(text);
  }
}

function getAudioPlaybackRate() {
  const speed = Number(speedSlider.value);

  if (speed <= 2) return 0.82;
  if (speed <= 4) return 0.92;
  if (speed <= 6) return 1.0;
  if (speed <= 8) return 1.08;
  return 1.16;
}

    async function fetchSyncedSpeech(text) {
  const response = await fetch(`${SUPABASE_URL}/functions/v1/chat`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "apikey": SUPABASE_ANON_KEY,
      "Authorization": `Bearer ${SUPABASE_ANON_KEY}`
    },
    body: JSON.stringify({
      action: "speak-synced",
      text,
      language: languageSelect.value,
      speedLabel: getSpeechSpeedLabel()
    })
  });

  const rawText = await response.text();

  let data;
  try {
    data = JSON.parse(rawText);
  } catch {
    throw new Error(`Speech returned non-JSON response: ${rawText}`);
  }

  if (!response.ok) {
    throw new Error(data.error || `Speech failed with status ${response.status}`);
  }

  return data;
}

function getAudioContext() {
  if (!audioContext) {
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
  }

  return audioContext;
}

async function unlockAudioContext() {
  const context = getAudioContext();

  if (context.state === "suspended") {
    await context.resume();
  }
}

function base64ToArrayBuffer(base64) {
  const binary = atob(base64);
  const bytes = new Uint8Array(binary.length);

  for (let i = 0; i < binary.length; i++) {
    bytes[i] = binary.charCodeAt(i);
  }

  return bytes.buffer;
}

function stopScheduledSpeech() {
  scheduledSources.forEach(source => {
    try {
      source.stop();
    } catch {
      // Already stopped.
    }
  });

  scheduledSources = [];
  currentPlaybackToken++;
}

function getWordPauseSeconds() {
  const speed = Number(speedSlider.value);

  const pauses = {
    1: 1.20,
    2: 0.95,
    3: 0.72,
    4: 0.52,
    5: 0.35,
    6: 0.22,
    7: 0.13,
    8: 0.07,
    9: 0.025,
    10: 0
  };

  return pauses[speed] ?? 0.22;
}

function buildWordAudioSchedule(timestampWords, audioDuration) {
  const pause = getWordPauseSeconds();
  const padding = 0.025;

  const cleanWords = timestampWords
    .filter(item => item && item.word)
    .map(item => ({
      word: item.word,
      start: Number(item.start),
      end: Number(item.end)
    }))
    .filter(item =>
      Number.isFinite(item.start) &&
      Number.isFinite(item.end) &&
      item.end > item.start
    );

  const schedule = [];
  let playhead = 0;

  cleanWords.forEach((item, index) => {
    const sourceStart = Math.max(0, item.start - padding);
    const sourceEnd = Math.min(audioDuration, item.end + padding);
    const duration = Math.max(0.03, sourceEnd - sourceStart);

    schedule.push({
      word: item.word,
      index,
      sourceStart,
      sourceEnd,
      duration,
      playStart: playhead,
      playEnd: playhead + duration
    });

    playhead += duration + pause;
  });

  return schedule;
}

function playScheduledWordAudio(audioBuffer, wordSchedule) {
  const context = getAudioContext();
  const token = currentPlaybackToken;
  const startAt = context.currentTime + 0.08;

  scheduledSources = [];

  wordSchedule.forEach(item => {
    const source = context.createBufferSource();
    source.buffer = audioBuffer;
    source.connect(context.destination);

    source.start(
      startAt + item.playStart,
      item.sourceStart,
      item.duration
    );

    scheduledSources.push(source);
  });

  const totalDuration =
    wordSchedule.length > 0
      ? wordSchedule[wordSchedule.length - 1].playEnd
      : 0;

  setTimeout(() => {
    if (token === currentPlaybackToken) {
      scheduledSources = [];
    }
  }, totalDuration * 1000 + 1000);
}
