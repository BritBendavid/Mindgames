<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>shiiboulet</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;600&family=Cormorant+Garamond:wght@500&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{

font-family:'Inter', sans-serif;
min-height:100vh;
overflow:hidden;

/* abstract black / white background */

background:
radial-gradient(circle at 10% 20%, rgba(0,0,0,0.06) 0%, transparent 40%),
radial-gradient(circle at 90% 80%, rgba(0,0,0,0.08) 0%, transparent 45%),
radial-gradient(circle at 70% 30%, rgba(0,0,0,0.04) 0%, transparent 50%),
linear-gradient(180deg,#ffffff,#f4f4f4);

}

/* navigation */

.topbar{

position:absolute;
top:30px;
left:40px;
right:40px;

display:flex;
justify-content:space-between;

font-weight:600;
z-index:10;

}

.topbar a{

text-decoration:none;
color:#111;
transition:opacity .2s;

}

.topbar a:hover{
opacity:.6;
}

/* title */

.brand{

position:absolute;
top:90px;
width:100%;

text-align:center;

font-family:'Playfair Display', serif;
font-size:3.2rem;
letter-spacing:.08em;

color:#111;

}

/* center */

.center{

display:flex;
justify-content:center;
align-items:center;

height:100vh;

}

/* content area */

.language-box{

text-align:center;
margin-top:120px;

padding:40px 50px;

background:rgba(255,255,255,0.7);
backdrop-filter:blur(6px);

border-radius:18px;

box-shadow:0 20px 50px rgba(0,0,0,0.08);

opacity:0;
transform:translateY(20px);
transition:opacity 1.2s ease, transform 1.2s ease;

}

.language-box.show{

opacity:1;
transform:translateY(0);

}

.language-title{

font-family:'Cormorant Garamond', serif;
font-size:2rem;
margin-bottom:32px;

}

/* language buttons */

.languages{

display:flex;
gap:28px;

}

.lang-btn{

width:180px;
height:120px;

border:2px solid #111;
border-radius:12px;

background:white;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

font-size:1.1rem;
font-weight:600;

cursor:pointer;

transition:
transform .25s,
background .25s,
color .25s,
box-shadow .25s;

}

.lang-btn span{

font-size:28px;
margin-bottom:8px;

}

.lang-btn:hover{

background:#111;
color:white;

transform:translateY(-4px);

box-shadow:0 12px 24px rgba(0,0,0,.18);

}

/* responsive */

@media (max-width:700px){

.languages{
flex-direction:column;
}

}

</style>
</head>

<body>

<div class="topbar">
<a href="#">About Us</a>
<a href="#">Sign In</a>
</div>

<div class="brand">shiiboulet</div>

<div class="center">

<div class="language-box" id="languageBox">

<div class="language-title">
Select Language
</div>

<div class="languages">

<div class="lang-btn">
<span>🇺🇸</span>
English
</div>

<div class="lang-btn">
<span>🇮🇱</span>
עברית
</div>

</div>

</div>

</div>

<script>

window.addEventListener("load",()=>{

setTimeout(()=>{
document.getElementById("languageBox").classList.add("show")
},400)

})

</script>

</body>
</html>
