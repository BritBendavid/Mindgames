<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BritChat</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&display=swap');

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html,
body {
  min-height: 100%;
}

body {
  font-family: 'Inter', sans-serif;
  color: #ffffff;
  background:
    radial-gradient(circle at 15% 20%, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 18%, transparent 38%),
    radial-gradient(circle at 85% 30%, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.015) 16%, transparent 34%),
    radial-gradient(circle at 50% 78%, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 20%, transparent 40%),
    linear-gradient(135deg, #050505 0%, #111111 38%, #1a1a1a 58%, #0a0a0a 100%);
  overflow-x: hidden;
  position: relative;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.035) 20%, transparent 40%),
    linear-gradient(300deg, transparent 0%, rgba(255,255,255,0.025) 18%, transparent 36%);
  pointer-events: none;
  z-index: 0;
}

.top-bar {
  position: relative;
  z-index: 1000;
  width: 100%;
  padding: 28px 42px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.top-left,
.top-right {
  display: flex;
  align-items: center;
}

.top-link,
.signin-link {
  font-family: 'Inter', sans-serif;
  font-size: 0.98rem;
  font-weight: 500;
  color: #f5f5f5;
  text-decoration: none;
  letter-spacing: 0.02em;
  transition: opacity 0.2s ease, transform 0.2s ease;
}

.top-link:hover,
.signin-link:hover {
  opacity: 0.78;
  transform: translateY(-1px);
}

#signin-button,
#user-menu-button {
  background: none;
  border: none;
  color: #f5f5f5;
  font: inherit;
  cursor: pointer;
}

.hero {
  position: relative;
  z-index: 2;
  min-height: calc(100vh - 90px);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 40px 24px 90px;
  text-align: center;
}

.site-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(4.2rem, 10vw, 6.8rem);
  font-weight: 700;
  letter-spacing: 0.04em;
  color: #ffffff;
  line-height: 0.95;
  text-shadow: 0 4px 24px rgba(0, 0, 0, 0.22);
  opacity: 0;
  transform: translateY(18px);
  animation: fadeRise 0.9s ease forwards;
}

.language-prompt {
  margin-top: 38px;
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.4rem, 3vw, 2rem);
  font-weight: 600;
  color: #f1f1f1;
  letter-spacing: 0.03em;
  opacity: 0;
  transform: translateY(18px);
  animation: fadeRise 0.9s ease 0.22s forwards;
}

.language-buttons {
  margin-top: 30px;
  display: flex;
  gap: 18px;
  flex-wrap: wrap;
  justify-content: center;
  opacity: 0;
  transform: translateY(18px);
  animation: fadeRise 0.9s ease 0.42s forwards;
}

.language-btn {
  min-width: 185px;
  padding: 16px 24px;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.18);
  background: rgba(255,255,255,0.1);
  color: #ffffff;
  font-family: 'Inter', sans-serif;
  font-size: 1rem;
  font-weight: 600;
  letter-spacing: 0.02em;
  backdrop-filter: blur(7px);
  -webkit-backdrop-filter: blur(7px);
  box-shadow: 0 10px 28px rgba(0,0,0,0.22);
  cursor: pointer;
  transition:
    transform 0.2s ease,
    background 0.2s ease,
    border-color 0.2s ease,
    box-shadow 0.2s ease;
}

.language-btn:hover {
  transform: translateY(-2px);
  background: rgba(255,255,255,0.16);
  border-color: rgba(255,255,255,0.34);
  box-shadow: 0 14px 34px rgba(0,0,0,0.26);
}

.language-btn:active {
  transform: translateY(0);
}

@keyframes fadeRise {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@media (max-width: 700px) {
  .top-bar {
    padding: 22px 20px;
  }

  .hero {
    padding: 30px 18px 72px;
  }

  .language-buttons {
    gap: 12px;
  }

  .language-btn {
    min-width: 150px;
    padding: 14px 18px;
    font-size: 0.95rem;
  }

  .language-prompt {
    margin-top: 30px;
  }
}

.hidden {
  display: none !important;
}

/* Keep dropdown anchored to the same top-right auth area */
.top-right {
  position: relative;
  z-index: 1001;
}

#signin-button,
#user-menu-button {
  background: none;
  border: none;
  padding: 0;
  font: inherit;
  color: inherit;
  cursor: pointer;
}

/* Modal overlay */
#signin-modal-overlay {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  background: rgba(0, 0, 0, 0.42);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.28s ease;
  z-index: 5000;
}

#signin-modal-overlay.active {
  opacity: 1;
  pointer-events: auto;
}

/* Modal box */
#signin-modal {
  position: relative;
  width: min(92vw, 380px);
  background: rgba(255, 255, 255, 0.96);
  color: #111;
  border: 1px solid rgba(0, 0, 0, 0.08);
  border-radius: 20px;
  padding: 40px 24px 20px;
  box-shadow: 0 18px 60px rgba(0, 0, 0, 0.22);
  backdrop-filter: blur(10px);
  transform: translateY(14px) scale(0.985);
  transition: transform 0.28s ease;
  box-sizing: border-box;
}

#signin-modal-overlay.active #signin-modal {
  transform: translateY(0) scale(1);
}

#signin-close {
  position: absolute;
  top: 8px;
  right: 14px;
  width: 34px;
  height: 34px;
  border: none;
  border-radius: 999px;
  background: transparent;
  color: #222;
  font-size: 24px;
  line-height: 1;
  cursor: pointer;
}

#signin-close:hover {
  background: rgba(0, 0, 0, 0.06);
}

#signin-modal h2 {
  margin: 4px 0 18px;
  text-align: center;
  font-size: 1.5rem;
  font-weight: 700;
}

#auth-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 18px;
}

.auth-tab {
  flex: 1;
  padding: 10px 14px;
  border: 1px solid #d6d6d6;
  border-radius: 12px;
  background: #fff;
  color: #111;
  font: inherit;
  cursor: pointer;
  transition: 0.2s ease;
}

.auth-tab.active {
  background: #111;
  color: #fff;
  border-color: #111;
}

.auth-view input {
  width: 100%;
  box-sizing: border-box;
  margin-bottom: 12px;
  padding: 12px 13px;
  border: 1px solid #dddddd;
  border-radius: 12px;
  background: #fff;
  color: #111;
  font: inherit;
  outline: none;
}

.auth-view input:focus {
  border-color: #777;
}

#signin-submit,
#signup-submit,
.google-btn {
  width: 100%;
  padding: 12px 14px;
  border-radius: 12px;
  font: inherit;
  cursor: pointer;
  transition: 0.2s ease;
  box-sizing: border-box;
}

#signin-submit,
#signup-submit {
  border: none;
  background: #111;
  color: #fff;
  margin-bottom: 8px;
}

#signin-submit:hover,
#signup-submit:hover {
  opacity: 0.92;
}

.google-btn {
  border: 1px solid #d9d9d9;
  background: #fff;
  color: #111;
}

.google-btn:hover {
  background: #f7f7f7;
}

.auth-divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 10px 0 12px;
  color: #666;
  font-size: 0.92rem;
}

.auth-divider::before,
.auth-divider::after {
  content: "";
  flex: 1;
  height: 1px;
  background: #e5e5e5;
}

#auth-message {
  min-height: 22px;
  margin: 12px 0 2px;
  text-align: center;
  font-size: 0.92rem;
  color: #333;
}

/* User dropdown */
#user-menu-container {
  position: relative;
  z-index: 1002;
}

#user-dropdown {
  position: absolute;
  top: calc(100% + 10px);
  right: 0;
  z-index: 1003;
  min-width: 170px;
  background: rgba(255, 255, 255, 0.98);
  border: 1px solid rgba(0, 0, 0, 0.08);
  border-radius: 14px;
  box-shadow: 0 14px 40px rgba(0, 0, 0, 0.14);
  padding: 8px;
  z-index: 4500;
  backdrop-filter: blur(10px);
}

#user-dropdown button {
  width: 100%;
  border: none;
  background: transparent;
  color: #111;
  text-align: left;
  padding: 11px 12px;
  border-radius: 10px;
  font: inherit;
  cursor: pointer;
}

#user-dropdown button:hover {
  background: rgba(0, 0, 0, 0.06);
}

.auth-show-password {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin: -2px 0 10px;
  font-size: 0.78rem;
  color: #444;
  cursor: pointer;
  user-select: none;
}

.auth-show-password input {
  width: 13px;
  height: 13px;
  margin: 0;
}

.auth-show-password span {
  line-height: 1;
}

</style>
</head>
<body>
  <header class="top-bar">
    <div class="top-left">
      <a href="about.html" class="top-link">About Us</a>
    </div>

    <div class="top-right">
      <!-- This keeps the same auth position -->
      <button id="signin-button" class="top-link signin-link">Sign In</button>

      <div id="user-menu-container" class="hidden">
        <button id="user-menu-button" class="top-link signin-link"></button>

        <div id="user-dropdown" class="hidden">
          <button id="my-progress-button">My Progress</button>
          <button id="logout-button">Lg Out</button>
        </div>
      </div>
    </div>
  </header>

  <main class="hero">
    <h1 class="site-title">BritChat</h1>
    <p class="language-prompt">Select a language</p>

    <div class="language-buttons">
      <button class="language-btn">🇺🇸 English</button>
      <button class="language-btn">🇮🇱 Hebrew</button>
    </div>
  </main>

  <!-- Sign in / create account modal -->
  <div id="signin-modal-overlay">
    <div id="signin-modal">
      <button id="signin-close" type="button" aria-label="Close">&times;</button>

      <div id="auth-tabs">
        <button id="tab-signin" class="auth-tab active" type="button">Sign In</button>
        <button id="tab-signup" class="auth-tab" type="button">Create Account</button>
      </div>

      <div id="signin-view" class="auth-view">
        <h2>Sign In</h2>

        <input id="signin-email" type="email" placeholder="Email" autocomplete="email" />
        <input id="signin-password" type="password" placeholder="Password" autocomplete="current-password" />
<label class="auth-show-password">
  <input id="signin-show-password" type="checkbox" />
  <span>Show password</span>
</label>

        <button id="signin-submit" type="button">Sign In</button>

        <div class="auth-divider"><span>or</span></div>

        <button id="google-signin-button" class="google-btn" type="button">
          Sign in with Google
        </button>
      </div>

      <div id="signup-view" class="auth-view hidden">
        <h2>Create Account</h2>

        <input id="signup-username" type="text" placeholder="Username" autocomplete="username" />
        <input id="signup-email" type="email" placeholder="Email" autocomplete="email" />
        <input id="signup-password" type="password" placeholder="Password" autocomplete="new-password" />

<label class="auth-show-password">
  <input id="signup-show-password" type="checkbox" />
  <span>Show password</span>
</label>

        <button id="signup-submit" type="button">Create Account</button>

        <div class="auth-divider"><span>or</span></div>

        <button id="google-signin-signup-button" class="google-btn" type="button">
          Continue with Google
        </button>
      </div>

      <p id="auth-message"></p>
    </div>
  </div>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- New auth JS -->
  <script>

const SUPABASE_URL = "https://tyzvxrlimbhmvmjenjxy.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_BdJd1R8Pkbggf5X_oOZL3w_DgoDyhNH";

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* Header elements */
const signinButton = document.getElementById("signin-button");
const userMenuContainer = document.getElementById("user-menu-container");
const userMenuButton = document.getElementById("user-menu-button");
const userDropdown = document.getElementById("user-dropdown");
const myProgressButton = document.getElementById("my-progress-button");
const logoutButton = document.getElementById("logout-button");

/* Modal elements */
const modal = document.getElementById("signin-modal-overlay");
const closeButton = document.getElementById("signin-close");
const authMessage = document.getElementById("auth-message");

const tabSignin = document.getElementById("tab-signin");
const tabSignup = document.getElementById("tab-signup");
const signinView = document.getElementById("signin-view");
const signupView = document.getElementById("signup-view");

const signinEmail = document.getElementById("signin-email");
const signinPassword = document.getElementById("signin-password");
const signinShowPassword = document.getElementById("signin-show-password");
const signinSubmit = document.getElementById("signin-submit");

const signupUsername = document.getElementById("signup-username");
const signupEmail = document.getElementById("signup-email");
const signupPassword = document.getElementById("signup-password");
const signupShowPassword = document.getElementById("signup-show-password");
const signupSubmit = document.getElementById("signup-submit");

const googleSigninButton = document.getElementById("google-signin-button");
const googleSigninSignupButton = document.getElementById("google-signin-signup-button");

function setMessage(message, isError = false) {
  authMessage.textContent = message;
  authMessage.style.color = isError ? "#b00020" : "#333";
}

function openModal() {
  modal.classList.add("active");
  setMessage("");
}

function closeModal() {
  modal.classList.remove("active");
  setMessage("");
}

function showSigninTab() {
  tabSignin.classList.add("active");
  tabSignup.classList.remove("active");
  signinView.classList.remove("hidden");
  signupView.classList.add("hidden");
  setMessage("");
}

function showSignupTab() {
  tabSignup.classList.add("active");
  tabSignin.classList.remove("active");
  signupView.classList.remove("hidden");
  signinView.classList.add("hidden");
  setMessage("");
}

function cleanUsernameValue(username) {
  return username.trim();
}

function normalizeGoogleUsername(base) {
  return (base || "user")
    .toLowerCase()
    .replace(/\s+/g, "_")
    .replace(/[^a-z0-9_]/g, "")
    .slice(0, 24) || "user";
}

async function getProfile(userId) {
  const { data, error } = await supabaseClient
    .from("profiles")
    .select("username")
    .eq("id", userId)
    .maybeSingle();

  if (error) {
    console.error("Profile fetch error:", error);
    return null;
  }

  return data;
}

async function createProfile(userId, username) {
  const { error } = await supabaseClient
    .from("profiles")
    .insert({
      id: userId,
      username: cleanUsernameValue(username)
    });

  return error;
}

async function usernameExists(username) {
  const { data, error } = await supabaseClient
    .from("profiles")
    .select("username")
    .eq("username", username)
    .maybeSingle();

  if (error) {
    console.error("Username check error:", error);
    return false;
  }

  return !!data;
}

async function createUniqueGoogleProfile(user) {
  const rawBase =
    user.user_metadata?.user_name ||
    user.user_metadata?.full_name ||
    user.email?.split("@")[0] ||
    "user";

  const base = normalizeGoogleUsername(rawBase);
  let candidate = base;
  let count = 1;

  while (true) {
    const error = await createProfile(user.id, candidate);

    if (!error) {
      return candidate;
    }

    const errorText = String(error.message || "").toLowerCase();

    if (!errorText.includes("duplicate")) {
      console.error("Google profile creation error:", error);
      return user.email?.split("@")[0] || "Account";
    }

    candidate = `${base}${count}`;
    count += 1;
  }
}

async function getDisplayUsername(user) {
  let profile = await getProfile(user.id);

  if (profile?.username) {
    return profile.username;
  }

  return await createUniqueGoogleProfile(user);
}

async function updateAuthUI() {
  const {
    data: { user }
  } = await supabaseClient.auth.getUser();

  if (!user) {
    signinButton.classList.remove("hidden");
    userMenuContainer.classList.add("hidden");
    userDropdown.classList.add("hidden");
    return;
  }

  const username = await getDisplayUsername(user);

  userMenuButton.textContent = username || "Account";
  signinButton.classList.add("hidden");
  userMenuContainer.classList.remove("hidden");
}

async function signInWithGoogle() {
  const { error } = await supabaseClient.auth.signInWithOAuth({
    provider: "google",
    options: {
      redirectTo: window.location.href
    }
  });

  if (error) {
    setMessage(error.message, true);
  }
}

/* Open/close modal */
signinButton?.addEventListener("click", openModal);

closeButton?.addEventListener("click", closeModal);

userDropdown?.addEventListener("click", (e) => {
  e.stopPropagation();
});

modal?.addEventListener("click", (e) => {
  if (e.target === modal) {
    closeModal();
  }
});

/* Tab switching */
tabSignin?.addEventListener("click", showSigninTab);
tabSignup?.addEventListener("click", showSignupTab);

signinShowPassword?.addEventListener("change", () => {
  signinPassword.type = signinShowPassword.checked ? "text" : "password";
});

signupShowPassword?.addEventListener("change", () => {
  signupPassword.type = signupShowPassword.checked ? "text" : "password";
});

/* Sign in */
signinSubmit?.addEventListener("click", async () => {
  const email = signinEmail.value.trim();
  const password = signinPassword.value;
  
  if (!email || !password) {
    setMessage("Please enter your email and password.", true);
    return;
  }

  setMessage("Signing in...");

  const { error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    setMessage(error.message, true);
    return;
  }

  closeModal();
  await updateAuthUI();
});

/* Create account */
signupSubmit?.addEventListener("click", async () => {
  const username = cleanUsernameValue(signupUsername.value);
  const email = signupEmail.value.trim();
  const password = signupPassword.value;

  if (!username || !email || !password) {
    setMessage("Please fill in username, email, and password.", true);
    return;
  }

  if (!/^[a-zA-Z0-9_]{3,24}$/.test(username)) {
    setMessage(
      "Username must be 3–24 characters and use only letters, numbers, or underscores.",
      true
    );
    return;
  }

  setMessage("Creating account...");

  const taken = await usernameExists(username);

  if (taken) {
    setMessage("That username is already taken.", true);
    return;
  }

const { error } = await supabaseClient.auth.signUp({
  email,
  password,
  options: {
    emailRedirectTo: window.location.href,
    data: {
      username
    }
  }
});

if (error) {
  setMessage(error.message, true);
  return;
}
  
  setMessage("Account created. Check your email if confirmation is enabled.");
  showSigninTab();
});

/* Google sign in */
googleSigninButton?.addEventListener("click", signInWithGoogle);
googleSigninSignupButton?.addEventListener("click", signInWithGoogle);

/* Dropdown */
userMenuButton?.addEventListener("click", (e) => {
  e.stopPropagation();
  userDropdown.classList.toggle("hidden");
});

document.addEventListener("click", (e) => {
  if (!userMenuContainer.contains(e.target)) {
    userDropdown.classList.add("hidden");
  }
});

/* My progress */
myProgressButton?.addEventListener("click", () => {
  window.location.href = "my-progress.html";
});

/* Log out */
  logoutButton?.addEventListener("click", async () => {
  const { error } = await supabaseClient.auth.signOut({ scope: "local" });

  if (error) {
    console.error("Logout error:", error);
    return;
  }

  userDropdown.classList.add("hidden");
  showSignedOutUI();
  window.location.reload();
});

function showSignedOutUI() {
  signinButton.classList.remove("hidden");
  userMenuContainer.classList.add("hidden");
  userDropdown.classList.add("hidden");
  userMenuButton.textContent = "";
}

async function showSignedInUIFromSession(session) {
  const user = session?.user;

  if (!user) {
    showSignedOutUI();
    return;
  }

  const username = await getDisplayUsername(user);

  userMenuButton.textContent = username || "Account";
  signinButton.classList.add("hidden");
  userMenuContainer.classList.remove("hidden");
}

async function initializeAuthUI() {
  const { data, error } = await supabaseClient.auth.getSession();

  if (error) {
    console.error("Session load error:", error);
    showSignedOutUI();
    return;
  }

  if (data.session?.user) {
    await showSignedInUIFromSession(data.session);
  } else {
    showSignedOutUI();
  }
}

supabaseClient.auth.onAuthStateChange((event, session) => {
  setTimeout(async () => {
    if (session?.user) {
      await showSignedInUIFromSession(session);
    } else {
      showSignedOutUI();
    }
  }, 0);
});

initializeAuthUI();
    
  </script>
</body>
</html>
